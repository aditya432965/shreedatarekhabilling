<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>View Items</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Segoe UI, Arial;
}

body{
  min-height:100vh;
  background:linear-gradient(135deg,#2b000f,#5c0a2e,#8e1446);
  display:flex;
  justify-content:center;
  padding:20px;
  color:white;
}

.container{
  width:100%;
  max-width:1200px;
  background:rgba(0,0,0,.65);
  border-radius:22px;
  padding:25px;
}

h1{
  text-align:center;
  margin-bottom:18px;
}

/* FILTER BAR */
.filters{
  display:flex;
  gap:12px;
  justify-content:center;
  flex-wrap:wrap;
  margin-bottom:20px;
}
.filters input,
.filters select{
  padding:12px;
  border-radius:14px;
  border:none;
  outline:none;
  min-width:220px;
}

/* GROUP BOX */
.group{
  margin-bottom:28px;
  border:1px solid #ff9fc555;
  border-radius:18px;
  overflow:hidden;
}

.group-title{
  background:#ff2f92;
  padding:12px;
  text-align:center;
  font-weight:700;
  font-size:16px;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
}
th,td{
  padding:10px;
  border-bottom:1px solid rgba(255,255,255,.12);
  text-align:center;
  font-size:13px;
}
th{
  background:rgba(0,0,0,.6);
}
td{
  background:rgba(0,0,0,.35);
}
tr:hover td{
  background:rgba(255,255,255,.08);
}

/* BACK */
.back{
  margin-top:15px;
  text-align:center;
}
.back button{
  padding:12px 30px;
  border:none;
  border-radius:14px;
  background:#444;
  color:white;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
}

@media(max-width:900px){
  table{font-size:12px;}
}
</style>
</head>

<body>

<div class="container">

<h1>View Item Master</h1>

<!-- FILTERS -->
<div class="filters">
  <input id="search" placeholder="Search item code or name" oninput="applyFilters()">
  <select id="groupFilter" onchange="applyFilters()">
    <option value="">All Groups</option>
  </select>
</div>

<!-- ITEM VIEW -->
<div id="itemView"></div>

<div class="back">
  <button onclick="goBack()">Back</button>
</div>

</div>

<script type="module">
/* 1. FIREBASE IMPORTS */
import { db } from './firebase-config.js';
import { 
    collection, 
    getDocs, 
    query, 
    orderBy 
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

/* ===== AUTH CHECK ===== */
if(localStorage.getItem("loggedIn") !== "true"){
    window.location.href = "index.html";
}

/* ===== STATE MANAGEMENT ===== */
let items = [];
let groups = [];

/* ===== LOAD ALL DATA FROM CLOUD ===== */
async function loadAllData() {
    const box = document.getElementById("itemView");
    box.innerHTML = "<p style='text-align:center; padding:20px;'>Loading inventory from cloud...</p>";

    try {
        // 1. Fetch Groups for Filtering and Headers
        const groupSnap = await getDocs(query(collection(db, "brandGroups"), orderBy("name", "asc")));
        groups = groupSnap.docs.map(doc => doc.data());
        loadGroupFilterUI();

        // 2. Fetch Items
        const itemSnap = await getDocs(query(collection(db, "items"), orderBy("name", "asc")));
        items = itemSnap.docs.map(doc => doc.data());
        
        // 3. Initial Render
        renderItems(items);
    } catch (err) {
        console.error("Fetch Error:", err);
        box.innerHTML = "<p style='color:red; text-align:center;'>Error loading data. Check internet.</p>";
    }
}

/* ===== UI: LOAD GROUP FILTER DROPDOWN ===== */
function loadGroupFilterUI(){
    const filterSelect = document.getElementById("groupFilter");
    if(!filterSelect) return;
    
    filterSelect.innerHTML = `<option value="">All Groups</option>`;
    groups.forEach(g => {
        filterSelect.innerHTML += `<option value="${g.name}">${g.name}</option>`;
    });
}

/* ===== RENDER ITEMS (GROUP-WISE TABLES) ===== */
function renderItems(filteredItems){
    const box = document.getElementById("itemView");
    if(!box) return;
    box.innerHTML = "";

    if(filteredItems.length === 0) {
        box.innerHTML = "<p style='text-align:center; padding:20px;'>No items match your search.</p>";
        return;
    }

    groups.forEach(g => {
        const list = filteredItems.filter(i => i.group === g.name);
        if(list.length === 0) return;

        let html = `
            <div class="group" style="margin-bottom: 30px;">
                <div class="group-title" style="background:#ff2f92; color:white; padding:10px; font-weight:bold; border-radius:8px 8px 0 0;">
                    ${g.name}
                </div>
                <table style="width:100%; border-collapse: collapse; background: rgba(255,255,255,0.05);">
                    <thead>
                        <tr style="border-bottom: 2px solid #ff2f92;">
                            <th>Code</th><th>Name</th><th>HSN</th>
                            <th>MRP</th><th>Sale</th><th>Purchase</th>
                            <th>GST %</th><th>Qty</th>
                        </tr>
                    </thead>
                    <tbody>
        `;

        list.forEach(i => {
            html += `
                <tr style="border-bottom: 1px solid rgba(255,159,197,0.2);">
                    <td>${i.code}</td>
                    <td>${i.name}</td>
                    <td>${i.hsn || "-"}</td>
                    <td>${i.mrp || 0}</td>
                    <td>${i.sale || 0}</td>
                    <td>${i.purchase || 0}</td>
                    <td>${i.gst || 0}</td>
                    <td>${i.qty || 0}</td>
                </tr>
            `;
        });

        html += `</tbody></table></div>`;
        box.innerHTML += html;
    });
}

/* ===== WINDOW BRIDGE (FILTER & NAV) ===== */

window.applyFilters = function(){
    const q = document.getElementById("search").value.toLowerCase();
    const g = document.getElementById("groupFilter").value;

    const filtered = items.filter(i => {
        const textMatch = 
            i.code.toLowerCase().includes(q) || 
            i.name.toLowerCase().includes(q);
        const groupMatch = !g || i.group === g;
        return textMatch && groupMatch;
    });

    renderItems(filtered);
};

window.goBack = function(){
    window.location.href = "master-entry.html";
};

/* ===== INITIALIZE ===== */
loadAllData();

</script>

</body>
</html>

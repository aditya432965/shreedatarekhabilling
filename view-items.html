<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>View Item Master | Shree Datarekha Enterprises</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Segoe UI', Arial, sans-serif;
}

body{
  min-height:100vh;
  background:linear-gradient(135deg,#2b000f,#5c0a2e,#8e1446);
  display:flex;
  justify-content:center;
  padding:15px;
  color:white;
}

.container{
  width:100%;
  max-width:1200px;
  background:rgba(0,0,0,.7);
  backdrop-filter: blur(10px);
  border-radius:26px;
  padding:20px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.6);
}

h1{
  text-align:center;
  margin-bottom:20px;
  font-size: 1.8rem;
  letter-spacing: 1px;
}

/* ACTIVE SEARCH & FILTER */
.filters{
  display:flex;
  gap:12px;
  margin-bottom:25px;
  flex-wrap:wrap;
}

.search-wrapper {
  flex: 2;
  min-width: 280px;
}

#search {
  width: 100%;
  padding: 14px 22px;
  border-radius: 50px;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(0,0,0,0.4);
  color: white;
  outline: none;
  font-size: 15px;
  transition: all 0.3s ease;
}

#search:focus {
  border-color: #ff2f92;
  box-shadow: 0 0 15px rgba(255, 47, 146, 0.4);
}

#groupFilter {
  flex: 1;
  min-width: 150px;
  padding: 12px;
  border-radius: 50px;
  background: rgba(0,0,0,0.4);
  color: white;
  border: 1px solid rgba(255,255,255,0.2);
  outline: none;
}

/* ITEM GROUP BOXES */
.group-section {
  margin-bottom: 30px;
  background: rgba(255,255,255,0.03);
  border-radius: 18px;
  overflow: hidden;
  border: 1px solid rgba(255, 47, 146, 0.2);
}

.group-title {
  background: #ff2f92;
  padding: 12px;
  text-align: center;
  font-weight: 700;
  font-size: 15px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* MOBILE FRIENDLY TABLE */
.table-wrapper {
  overflow-x: auto; 
  -webkit-overflow-scrolling: touch;
}

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 800px; 
}

th, td {
  padding: 12px 10px;
  text-align: center;
  font-size: 13px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

th {
  background: rgba(0,0,0,0.5);
  color: #ffb3d9;
  text-transform: uppercase;
  font-size: 11px;
}

td {
  background: rgba(0,0,0,0.2);
}

tr:hover td {
  background: rgba(255, 255, 255, 0.08);
}

/* BACK BUTTON */
.back-btn {
  display: block;
  width: 180px;
  margin: 20px auto 0;
  padding: 13px;
  border: none;
  border-radius: 15px;
  background: #444;
  color: white;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: 0.3s;
}

.back-btn:hover {
  background: #555;
  transform: translateY(-2px);
}

@media(max-width: 480px){
  h1 { font-size: 1.4rem; }
  .container { padding: 15px; }
}
</style>
</head>

<body>

<div class="container">
  <h1>View Item Master</h1>

  <div class="filters">
    <div class="search-wrapper">
      <input id="search" placeholder="Search by item name..." oninput="applyFilters()">
    </div>
    <select id="groupFilter" onchange="applyFilters()">
      <option value="">All Groups</option>
    </select>
  </div>

  <div id="itemView">
    </div>

  <button class="back-btn" onclick="goBack()">Back</button>
</div>

<script type="module">
import { db } from './firebase-config.js';
import { 
    collection, 
    getDocs, 
    query, 
    orderBy 
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

if(localStorage.getItem("loggedIn") !== "true"){
    window.location.href = "index.html";
}

let items = [];
let groups = [];

async function loadAllData() {
    const box = document.getElementById("itemView");
    box.innerHTML = "<p style='text-align:center; padding:20px;'>Syncing cloud data...</p>";

    try {
        const groupSnap = await getDocs(query(collection(db, "brandGroups"), orderBy("name", "asc")));
        groups = groupSnap.docs.map(doc => doc.data());
        loadGroupFilterUI();

        const itemSnap = await getDocs(query(collection(db, "items"), orderBy("name", "asc")));
        items = itemSnap.docs.map(doc => doc.data());
        
        renderItems(items);
    } catch (err) {
        console.error("Fetch Error:", err);
        box.innerHTML = "<p style='color:#ff6b6b; text-align:center;'>Connection Error. Please check your data.</p>";
    }
}

function loadGroupFilterUI(){
    const filterSelect = document.getElementById("groupFilter");
    filterSelect.innerHTML = `<option value="">All Groups</option>`;
    groups.forEach(g => {
        filterSelect.innerHTML += `<option value="${g.name}">${g.name}</option>`;
    });
}

function renderItems(filteredItems){
    const box = document.getElementById("itemView");
    box.innerHTML = "";

    if(filteredItems.length === 0) {
        box.innerHTML = "<p style='text-align:center; padding:40px; color:#ffb3d9;'>No items found.</p>";
        return;
    }

    groups.forEach(g => {
        const list = filteredItems.filter(i => i.group === g.name);
        if(list.length === 0) return;

        let html = `
            <div class="group-section">
                <div class="group-title">${g.name}</div>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th style="text-align:left;">Item Name</th>
                                <th>HSN</th>
                                <th>MRP</th>
                                <th>Purchase</th>
                                <th>GST %</th>
                                <th>Sale (Basic)</th>
                                <th>Sale (Incl. GST)</th>
                                <th>Stock</th>
                            </tr>
                        </thead>
                        <tbody>
        `;

        list.forEach(i => {
            // Handle legacy data where gst might have been cgst+sgst
            const displayGst = i.gst || (parseFloat(i.cgst || 0) + parseFloat(i.sgst || 0)) || 0;
            
            html += `
                <tr>
                    <td style="text-align:left; font-weight:600; color:#fff;">${i.name}</td>
                    <td>${i.hsn || "-"}</td>
                    <td>${i.mrp || 0}</td>
                    <td>${i.purchase || 0}</td>
                    <td style="color:#ffb3d9;">${displayGst}%</td>
                    <td>${i.sale || 0}</td>
                    <td style="color:#ff2f92; font-weight:bold;">${i.totalSale || 0}</td>
                    <td style="font-weight:bold; color:#4CAF50;">${i.qty || 0}</td>
                </tr>
            `;
        });

        html += `</tbody></table></div></div>`;
        box.innerHTML += html;
    });
}

window.applyFilters = function(){
    const q = document.getElementById("search").value.toLowerCase();
    const g = document.getElementById("groupFilter").value;

    const filtered = items.filter(i => {
        const nameMatch = i.name.toLowerCase().includes(q);
        const groupMatch = !g || i.group === g;
        return nameMatch && groupMatch;
    });

    renderItems(filtered);
};

window.goBack = function(){
    window.location.href = "master-entry.html";
};

loadAllData();
</script>

</body>
</html>

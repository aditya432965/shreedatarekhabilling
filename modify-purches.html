<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modify Purchase Entry | Shree Datarekha Enterprises</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;}

body{
background:linear-gradient(135deg,#2b000f,#5c0a2e,#8e1446);
color:#fff;
padding:15px;
min-height: 100vh;
}

.container{
max-width:1700px;
margin:auto;
background:rgba(0,0,0,.75);
border-radius:20px;
padding:20px;
box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.title{
background:#ff2f92;
padding:12px;
border-radius:8px;
text-align:center;
font-weight:700;
margin-bottom:15px;
text-transform: uppercase;
letter-spacing: 1px;
}

.filters{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:12px;
margin-bottom:15px;
background: rgba(255,255,255,0.05);
padding: 15px;
border-radius: 10px;
}

.filters label { font-size: 11px; color: #ffb3d9; display: block; margin-bottom: 4px; }

input, select{
padding:10px;
border:none;
border-radius:6px;
width:100%;
background: #eee;
color: #000;
outline: none;
}

.main{
display:grid;
grid-template-columns:350px 1fr;
gap:20px;
}

.list{
background:rgba(0,0,0,.45);
padding:10px;
border-radius:15px;
max-height:650px;
overflow-y:auto;
border: 1px solid rgba(255,255,255,0.1);
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid rgba(255,255,255,.1);
padding:8px;
font-size:12px;
text-align:center;
}

th{background:#ff2f92; position: sticky; top: 0;}

tr:hover{
background:rgba(255,47,146,.2);
cursor:pointer;
}

.paid-row { border-left: 5px solid #4CAF50; }
.unpaid-row { border-left: 5px solid #f44336; }

.form-section{
background:rgba(0,0,0,.45);
padding:20px;
border-radius:15px;
border: 1px solid rgba(255, 47, 146, 0.2);
}

h3 { color: #ff2f92; margin: 15px 0 10px 0; font-size: 16px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px;}

.form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
}

.item-table-container { 
    background: rgba(255,255,255,0.05); 
    border-radius: 8px; 
    margin: 10px 0;
    overflow-x: auto;
}

.buttons{
margin-top:20px;
display:flex;
gap:12px;
}

button{
padding:12px 20px;
border:none;
border-radius:8px;
cursor:pointer;
color:white;
font-weight:600;
transition: 0.3s;
}

button:hover { opacity: 0.8; transform: translateY(-2px); }
.green{background:#2ecc71}
.red{background:#e74c3c}
.gray{background:#7f8c8d}

@media(max-width:900px){
.main{grid-template-columns:1fr}
}
</style>
</head>

<body>
<div class="container">

<div class="title">Modify Purchase Entry</div>

<div class="filters">
    <div><label>Search Bill / Supplier</label><input type="text" id="searchBill" placeholder="Search..." oninput="applyFilters()"></div>
    <div><label>From Date</label><input type="date" id="fromDate" onchange="applyFilters()"></div>
    <div><label>To Date</label><input type="date" id="toDate" onchange="applyFilters()"></div>
</div>

<div class="main">

<div class="list">
<table>
<thead>
<tr>
<th>Bill</th>
<th>Supplier</th>
<th>Net Amt</th>
</tr>
</thead>
<tbody id="purchaseList">
    <tr><td colspan="3" style="padding:20px">Loading cloud data...</td></tr>
</tbody>
</table>
</div>

<div class="form-section" id="editForm" style="opacity: 0.5; pointer-events: none;">

<h3>1. Header Information</h3>
<div class="form-grid">
    <div><label>Bill No</label><input id="billNo"></div>
    <div><label>Bill Date</label><input id="billDate"></div>
    <div><label>Supplier Name</label><input id="supplier"></div>
    <div><label>Payment Mode</label>
        <select id="payment"><option>Cash</option><option>Credit</option></select>
    </div>
</div>

<h3>2. Items in this Bill</h3>
<div class="item-table-container">
<table id="itemTable">
<thead>
<tr>
<th>Group</th>
<th>Item Name</th>
<th>Qty</th>
<th>Net Amt</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<h3>3. Payment Summary</h3>
<div class="form-grid">
    <div><label>Grand Total</label><input id="netAmt" readonly style="background:#ccc"></div>
    <div><label>Paid Amount</label><input id="paidAmt" type="number" oninput="calculateNewBalance()"></div>
    <div><label>Balance Amount</label><input id="balanceAmt" readonly style="background:#ccc"></div>
</div>

<div class="buttons">
<button class="green" onclick="updatePurchase()">Update Record</button>
<button class="red" onclick="deletePurchase()">Delete Bill</button>
<button class="gray" onclick="goBack()">Back</button>
</div>

</div>
</div>
</div>

<script type="module">
import { db } from './firebase-config.js';
import { 
    collection, 
    getDocs, 
    doc, 
    updateDoc, 
    deleteDoc, 
    query, 
    orderBy 
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

let purchases = [];
let selectedDocId = null;

// Helper to convert DD-MM-YYYY string to Date Object for filtering
function parseDate(dateStr) {
    if(!dateStr) return new Date(0);
    const [d, m, y] = dateStr.split('-');
    return new Date(y, m - 1, d);
}

/* ☁️ LOAD PURCHASES FROM CLOUD */
async function loadPurchases() {
    try {
        const q = query(collection(db, "purchases"), orderBy("createdAt", "desc"));
        const querySnapshot = await getDocs(q);
        
        purchases = querySnapshot.docs.map(d => ({
            id: d.id, 
            ...d.data()
        }));
        
        renderList(purchases);
    } catch (err) {
        console.error("Cloud Fetch Error:", err);
    }
}

/* 📊 RENDER LEFT SIDE LIST */
function renderList(list) {
    const tbody = document.getElementById("purchaseList");
    tbody.innerHTML = "";
    
    if(list.length === 0) {
        tbody.innerHTML = "<tr><td colspan='3'>No records found</td></tr>";
        return;
    }

    list.forEach(p => {
        const balance = parseFloat(p.summary?.balance || 0);
        const statusClass = balance <= 0 ? "paid-row" : "unpaid-row";

        tbody.innerHTML += `
            <tr class="${statusClass}" onclick="selectPurchase('${p.id}')">
                <td>${p.header?.billNo || 'N/A'}</td>
                <td style="text-align:left">${p.header?.supplier || 'N/A'}</td>
                <td>${p.summary?.grandTotal || 0}</td>
            </tr>`;
    });
}

/* 🔍 FILTER LOGIC */
window.applyFilters = function() {
    let search = document.getElementById("searchBill").value.toLowerCase();
    let from = document.getElementById("fromDate").value; // YYYY-MM-DD
    let to = document.getElementById("toDate").value;

    let filtered = purchases.filter(p => {
        let matchText = (p.header?.billNo || "").toString().toLowerCase().includes(search) || 
                        (p.header?.supplier || "").toLowerCase().includes(search);

        let billDate = parseDate(p.header?.date);
        let matchFrom = !from || billDate >= new Date(from);
        let matchTo = !to || billDate <= new Date(to);

        return matchText && matchFrom && matchTo;
    });

    renderList(filtered);
};

/* 🖱️ SELECT BILL TO EDIT */
window.selectPurchase = function(id) {
    const p = purchases.find(item => item.id === id);
    if (!p) return;

    selectedDocId = id;
    document.getElementById("editForm").style.opacity = "1";
    document.getElementById("editForm").style.pointerEvents = "auto";

    // Fill Header
    document.getElementById("billNo").value = p.header?.billNo || "";
    document.getElementById("billDate").value = p.header?.date || "";
    document.getElementById("supplier").value = p.header?.supplier || "";
    document.getElementById("payment").value = p.header?.payment || "Cash";
    
    // Fill Summary
    document.getElementById("netAmt").value = p.summary?.grandTotal || 0;
    document.getElementById("paidAmt").value = p.summary?.paid || 0;
    document.getElementById("balanceAmt").value = p.summary?.balance || 0;

    // Fill Items (Read only names for modification safety)
    let tbody = document.querySelector("#itemTable tbody");
    tbody.innerHTML = "";
    (p.items || []).forEach(item => {
        tbody.innerHTML += `
            <tr>
                <td><input value="${item.group || ''}" readonly></td>
                <td><input value="${item.name || ''}" readonly style="text-align:left"></td>
                <td><input value="${item.qty || 0}"></td>
                <td><input value="${item.net || 0}"></td>
            </tr>`;
    });
};

window.calculateNewBalance = function() {
    const total = parseFloat(document.getElementById("netAmt").value) || 0;
    const paid = parseFloat(document.getElementById("paidAmt").value) || 0;
    document.getElementById("balanceAmt").value = (total - paid).toFixed(2);
};

/* 🆙 UPDATE FIREBASE */
window.updatePurchase = async function() {
    if (!selectedDocId) return alert("Select a bill first");

    // Re-collect items from table
    let updatedItems = [];
    document.querySelectorAll("#itemTable tbody tr").forEach(row => {
        const inputs = row.querySelectorAll("input");
        updatedItems.push({
            group: inputs[0].value,
            name: inputs[1].value,
            qty: inputs[2].value,
            net: inputs[3].value
        });
    });

    const updatedData = {
        "header.billNo": document.getElementById("billNo").value,
        "header.date": document.getElementById("billDate").value,
        "header.supplier": document.getElementById("supplier").value,
        "header.payment": document.getElementById("payment").value,
        "summary.grandTotal": document.getElementById("netAmt").value,
        "summary.paid": document.getElementById("paidAmt").value,
        "summary.balance": document.getElementById("balanceAmt").value,
        "items": updatedItems
    };

    try {
        const docRef = doc(db, "purchases", selectedDocId);
        await updateDoc(docRef, updatedData);
        alert("Bill Updated Successfully! ✅");
        loadPurchases(); // Refresh list
    } catch (e) {
        alert("Update Failed: " + e.message);
    }
};

/* 🗑️ DELETE FROM FIREBASE */
window.deletePurchase = async function() {
    if (!selectedDocId) return alert("Select a bill first");

    if (confirm("Permanently delete this purchase record?")) {
        try {
            await deleteDoc(doc(db, "purchases", selectedDocId));
            alert("Bill Deleted ❌");
            location.reload();
        } catch (e) {
            alert("Delete Failed: " + e.message);
        }
    }
};

window.goBack = () => location.href = "purchase-entry.html";

// Start
loadPurchases();
</script>
</body>
</html>

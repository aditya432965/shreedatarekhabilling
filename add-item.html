<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Item Master Entry</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
}

body{
  min-height:100vh;
  background:linear-gradient(135deg,#2b000f,#5c0a2e,#8e1446);
  display:flex;
  justify-content:center;
  padding:15px;
  color:white;
}

.container{
  width:100%;
  max-width:1200px;
  background:rgba(0,0,0,.7);
  backdrop-filter: blur(10px);
  border-radius:22px;
  padding:20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

h1{
  text-align:center;
  margin-bottom:20px;
  font-size: 1.6rem;
  letter-spacing: 1px;
}

/* ===== FORM SEQUENCE ===== */
.form{
  display:grid;
  grid-template-columns: repeat(12, 1fr);
  gap:12px;
}

.form div{
  display:flex;
  flex-direction:column;
}

label{
  font-size:12px;
  color:#ffb3d9;
  margin-bottom:5px;
  text-transform: uppercase;
  font-weight: 600;
}

input, select{
  padding:14px;
  border:none;
  border-radius:12px;
  outline:none;
  font-size:15px;
  background: #fff;
  color: #333;
}

/* Responsive Grid Logic */
.col-12 { grid-column: span 12; }
.col-6 { grid-column: span 6; }
.col-4 { grid-column: span 4; }

/* ===== BUTTONS ===== */
.buttons{
  grid-column: span 12;
  display:grid;
  grid-template-columns: repeat(2, 1fr);
  gap:10px;
  margin-top:15px;
}

button{
  padding:14px;
  border:none;
  border-radius:14px;
  font-size:14px;
  font-weight:700;
  cursor:pointer;
  color:white;
  transition: transform 0.2s, opacity 0.2s;
}

button:active { transform: scale(0.96); }

.add{ background:#ff2f92; }
.save{ background:#4CAF50; }
.cancel{ background:#777; }
.exit{ background:#444; }

/* ===== DATA VIEW ===== */
.group-box{
  margin-top:30px;
}

.group-section {
  margin-bottom: 25px;
  background: rgba(255,255,255,0.05);
  border-radius: 16px;
  overflow: hidden;
  border: 1px solid rgba(255, 47, 146, 0.3);
}

.group-header {
  background:#ff2f92;
  color:white;
  padding:12px;
  font-weight:700;
  font-size: 14px;
  text-align: center;
}

.table-wrapper {
  overflow-x: auto; /* Critical for mobile */
}

table{
  width:100%;
  border-collapse:collapse;
  min-width: 700px; /* Keeps columns readable */
}

th, td{
  padding:12px 8px;
  border-bottom:1px solid rgba(255,255,255,.05);
  text-align:center;
  font-size:13px;
}

th{
  background:rgba(0,0,0,.4);
  color: #ffb3d9;
  font-weight: 600;
}

/* ===== MOBILE ADAPTATION ===== */
@media(max-width:768px){
  .col-4 { grid-column: span 6; } /* 3-column items become 2-column */
  .container { padding: 15px; }
}

@media(max-width:480px){
  .col-6, .col-4 { grid-column: span 12; } /* All items become full width */
  .buttons { grid-template-columns: 1fr; } /* Stack buttons */
}
</style>
</head>

<body>

<div class="container">

<h1>Item Master Entry</h1>

<div class="form">
  <div class="col-12">
    <label>Select Brand Group</label>
    <select id="groupSelect"></select>
  </div>

  <div class="col-12">
    <label>Item Name</label>
    <input id="itemName" placeholder="e.g. Milk 1L">
  </div>

  <div class="col-6">
    <label>HSN Code</label>
    <input id="hsn" placeholder="Optional">
  </div>

  <div class="col-6">
    <label>GST %</label>
    <input type="number" id="gst" value="0">
  </div>

  <div class="col-4">
    <label>Purchase Rate</label>
    <input type="number" id="purchase" placeholder="0.00">
  </div>

  <div class="col-4">
    <label>Sale Rate</label>
    <input type="number" id="sale" placeholder="0.00">
  </div>

  <div class="col-4">
    <label>MRP Rate</label>
    <input type="number" id="mrp" placeholder="0.00">
  </div>

  <div class="col-12">
    <label>Opening Stock Quantity</label>
    <input type="number" id="qty" placeholder="0">
  </div>

  <div class="buttons">
    <button class="add" onclick="newItem()">Add New</button>
    <button class="save" onclick="saveItem()">Save Product</button>
    <button class="cancel" onclick="newItem()">Clear Form</button>
    <button class="exit" onclick="goBack()">Exit</button>
  </div>
</div>

<div class="group-box" id="groupBox"></div>

</div>

<script type="module">
import { db } from './firebase-config.js';
import { 
    collection, 
    addDoc, 
    getDocs, 
    query, 
    orderBy, 
    serverTimestamp 
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

if(localStorage.getItem("loggedIn") !== "true"){
    window.location.href = "index.html";
}

let brandGroups = [];
let items = [];

async function loadAllData() {
    try {
        const groupSnap = await getDocs(collection(db, "brandGroups"));
        brandGroups = groupSnap.docs.map(doc => ({
            id: doc.id,
            ...doc.data()
        }));
        loadGroupDropdown();

        const itemQuery = query(collection(db, "items"), orderBy("createdAt", "desc"));
        const itemSnap = await getDocs(itemQuery);
        items = itemSnap.docs.map(doc => ({
            id: doc.id,
            ...doc.data()
        }));
        
        renderItems();
    } catch (err) {
        console.error("Cloud Connection Error:", err);
    }
}

function loadGroupDropdown(){
    const sel = document.getElementById("groupSelect");
    if(!sel) return;
    sel.innerHTML = "<option value=''>-- Select Group --</option>";
    brandGroups.forEach(g => {
        sel.innerHTML += `<option value="${g.name}">${g.name}</option>`;
    });
}

function renderItems(){
    const box = document.getElementById("groupBox");
    if(!box) return;
    box.innerHTML = "";

    brandGroups.forEach(g => {
        const filteredItems = items.filter(i => i.group === g.name);
        if(filteredItems.length === 0) return;

        let tableHtml = `
            <div class="group-section">
                <div class="group-header">${g.name}</div>
                <div class="table-wrapper">
                  <table>
                      <thead>
                          <tr>
                              <th>Name</th><th>MRP</th><th>Sale</th><th>Pur.</th><th>GST%</th><th>Qty</th>
                          </tr>
                      </thead>
                      <tbody>
        `;

        filteredItems.forEach(i => {
            tableHtml += `
                <tr>
                    <td style="text-align:left; font-weight:600;">${i.name}</td>
                    <td>${i.mrp || '0'}</td>
                    <td>${i.sale || '0'}</td>
                    <td>${i.purchase || '0'}</td>
                    <td>${i.gst || '0'}%</td>
                    <td>${i.qty || '0'}</td>
                </tr>`;
        });

        tableHtml += `</tbody></table></div></div>`;
        box.innerHTML += tableHtml;
    });
}

window.newItem = function(){
    document.querySelectorAll("input").forEach(i => i.value = "");
    const select = document.getElementById("groupSelect");
    if(select) select.value = "";
    document.getElementById("groupSelect").focus();
};

window.saveItem = async function(){
    const name = document.getElementById("itemName").value.trim();
    const group = document.getElementById("groupSelect").value;

    if(!name || !group){
        alert("Please select a Group and enter Item Name.");
        return;
    }

    const itemData = {
        name: name,
        group: group,
        hsn: document.getElementById("hsn").value.trim(),
        mrp: document.getElementById("mrp").value.trim(),
        sale: document.getElementById("sale").value.trim(),
        purchase: document.getElementById("purchase").value.trim(),
        gst: document.getElementById("gst").value.trim(),
        qty: document.getElementById("qty").value.trim(),
        createdAt: serverTimestamp()
    };

    try {
        await addDoc(collection(db, "items"), itemData);
        alert("Saved Successfully! ✅");
        await loadAllData(); 
        window.newItem();
    } catch (e) {
        alert("Error: " + e.message);
    }
};

window.goBack = function(){
    window.location.href = "master-entry.html";
};

loadAllData();
</script>
</body>
</html>

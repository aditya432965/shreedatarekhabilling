<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Item Master Entry</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Segoe UI, Arial;
}

body{
  min-height:100vh;
  background:linear-gradient(135deg,#2b000f,#5c0a2e,#8e1446);
  display:flex;
  justify-content:center;
  padding:20px;
  color:white;
}

.container{
  width:100%;
  max-width:1200px;
  background:rgba(0,0,0,.65);
  border-radius:22px;
  padding:25px;
}

h1{
  text-align:center;
  margin-bottom:20px;
}

/* ===== FORM ===== */
.form{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:14px;
}

.form div{
  display:flex;
  flex-direction:column;
}

label{
  font-size:13px;
  color:#ffb3d9;
  margin-bottom:4px;
}

input, select{
  padding:12px;
  border:none;
  border-radius:12px;
  outline:none;
  font-size:14px;
}

.buttons{
  grid-column:1 / -1;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(130px,1fr));
  gap:12px;
  margin-top:10px;
}

button{
  padding:12px;
  border:none;
  border-radius:14px;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
  color:white;
}

.add{background:#ff2f92;}
.save{background:#4CAF50;}
.cancel{background:#777;}
.exit{background:#444;}

/* ===== GROUP VIEW ===== */
.group-box{
  margin-top:35px;
}

.group-section {
  margin-bottom: 30px;
  overflow-x: auto; /* Mobile scroll */
}

table{
  width:100%;
  border-collapse:collapse;
  min-width: 600px; /* Ensures data is visible on mobile */
}

th,td{
  padding:10px;
  border-bottom:1px solid rgba(255,255,255,.1);
  text-align:center;
  font-size:13px;
}

th{
  background:rgba(0,0,0,.6);
}

td{
  background:rgba(0,0,0,.35);
}

/* ===== MOBILE ===== */
@media(max-width:900px){
  .form{grid-template-columns:1fr;}
  .container{padding: 15px;}
}
</style>
</head>

<body>

<div class="container">

<h1>Item Master Entry</h1>

<div class="form">

  <div style="grid-column: span 2;"><label>Item Name</label><input id="itemName"></div>
  <div><label>HSN Code</label><input id="hsn"></div>

  <div><label>MRP Rate</label><input type="number" id="mrp"></div>
  <div><label>Sale Rate</label><input type="number" id="sale"></div>
  <div><label>Purchase Rate</label><input type="number" id="purchase"></div>

  <div><label>GST %</label><input type="number" id="gst"></div>
  <div><label>Opening Qty</label><input type="number" id="qty"></div>

  <div>
    <label>Group Name</label>
    <select id="groupSelect"></select>
  </div>

  <div class="buttons">
    <button class="add" onclick="newItem()">Add New</button>
    <button class="save" onclick="saveItem()">Save</button>
    <button class="cancel" onclick="newItem()">Cancel</button>
    <button class="exit" onclick="goBack()">Exit</button>
  </div>

</div>

<div class="group-box" id="groupBox"></div>

</div>

<script type="module">
import { db } from './firebase-config.js';
import { 
    collection, 
    addDoc, 
    getDocs, 
    query, 
    orderBy, 
    serverTimestamp 
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

if(localStorage.getItem("loggedIn") !== "true"){
    window.location.href = "index.html";
}

let brandGroups = [];
let items = [];

async function loadAllData() {
    try {
        const groupSnap = await getDocs(collection(db, "brandGroups"));
        brandGroups = groupSnap.docs.map(doc => ({
            id: doc.id,
            ...doc.data()
        }));
        loadGroupDropdown();

        const itemQuery = query(collection(db, "items"), orderBy("createdAt", "desc"));
        const itemSnap = await getDocs(itemQuery);
        items = itemSnap.docs.map(doc => ({
            id: doc.id,
            ...doc.data()
        }));
        
        renderItems();
    } catch (err) {
        console.error("Cloud Connection Error:", err);
    }
}

function loadGroupDropdown(){
    const sel = document.getElementById("groupSelect");
    if(!sel) return;
    sel.innerHTML = "<option value=''>Select Brand Group</option>";
    brandGroups.forEach(g => {
        sel.innerHTML += `<option value="${g.name}">${g.name}</option>`;
    });
}

function renderItems(){
    const box = document.getElementById("groupBox");
    if(!box) return;
    box.innerHTML = "";

    brandGroups.forEach(g => {
        const filteredItems = items.filter(i => i.group === g.name);
        if(filteredItems.length === 0) return;

        let tableHtml = `
            <div class="group-section">
                <h3 style="background:#ff2f92; color:white; padding:8px; border-radius:8px 8px 0 0;">${g.name}</h3>
                <table>
                    <thead>
                        <tr style="border-bottom: 2px solid #ff2f92;">
                            <th>Name</th><th>Brand</th><th>MRP</th>
                            <th>Sale</th><th>Purchase</th><th>GST%</th><th>Qty</th>
                        </tr>
                    </thead>
                    <tbody>
        `;

        filteredItems.forEach(i => {
            tableHtml += `
                <tr style="border-bottom: 1px solid rgba(255,159,197,0.3);">
                    <td>${i.name}</td>
                    <td>${i.brand || '-'}</td>
                    <td>${i.mrp}</td>
                    <td>${i.sale}</td>
                    <td>${i.purchase}</td>
                    <td>${i.gst}</td>
                    <td>${i.qty}</td>
                </tr>`;
        });

        tableHtml += `</tbody></table></div>`;
        box.innerHTML += tableHtml;
    });
}

window.newItem = function(){
    document.querySelectorAll("input").forEach(i => i.value = "");
    const select = document.getElementById("groupSelect");
    if(select) select.value = "";
    document.getElementById("itemName").focus();
};

window.saveItem = async function(){
    const name = document.getElementById("itemName").value.trim();
    const group = document.getElementById("groupSelect").value;
    const brand = document.getElementById("brand") ? document.getElementById("brand").value.trim() : "";

    if(!name || !group){
        alert("Please fill Item Name and Group.");
        return;
    }

    const itemData = {
        name: name,
        brand: brand,
        group: group,
        hsn: document.getElementById("hsn").value.trim(),
        mrp: document.getElementById("mrp").value.trim(),
        sale: document.getElementById("sale").value.trim(),
        purchase: document.getElementById("purchase").value.trim(),
        gst: document.getElementById("gst").value.trim(),
        qty: document.getElementById("qty").value.trim(),
        createdAt: serverTimestamp()
    };

    try {
        await addDoc(collection(db, "items"), itemData);
        alert("Product saved to Cloud! ✅");
        await loadAllData(); 
        window.newItem();
    } catch (e) {
        alert("Error saving: " + e.message);
    }
};

window.goBack = function(){
    window.location.href = "master-entry.html";
};

loadAllData();
</script>
</body>
</html>

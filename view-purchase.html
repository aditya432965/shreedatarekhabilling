<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Full Purchase Register | Shree Datarekha Enterprises</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

    body {
        background: linear-gradient(135deg, #1a000a, #3d071e, #610d30);
        color: #fff;
        padding: 20px;
        min-height: 100vh;
    }

    .container {
        max-width: 100%;
        margin: auto;
        background: rgba(0, 0, 0, 0.9);
        border-radius: 15px;
        padding: 20px;
        border: 1px solid #ff2f92;
    }

    .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        padding-bottom: 10px;
        border-bottom: 2px solid #ff2f92;
    }

    .title { font-size: 22px; font-weight: 700; color: #ffb3d9; text-transform: uppercase; }

    .search-box { display: flex; gap: 10px; }
    .search-box input {
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid #ff2f92;
        padding: 8px 15px;
        border-radius: 5px;
        color: white;
    }

    /* TABLE STYLES - Optimized for many columns */
    .table-container {
        overflow-x: auto;
        max-height: 75vh;
        border-radius: 8px;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        min-width: 1800px; /* Forces scroll for many columns */
        font-size: 12px;
    }

    th {
        background: #ff2f92;
        color: white;
        padding: 12px 8px;
        position: sticky;
        top: 0;
        z-index: 10;
        text-align: left;
        white-space: nowrap;
    }

    td {
        padding: 10px 8px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        color: #e0e0e0;
    }

    tr:nth-child(even) { background: rgba(255, 255, 255, 0.03); }
    tr:hover { background: rgba(255, 47, 146, 0.1); }

    .bill-info-row {
        background: rgba(255, 47, 146, 0.2) !important;
        font-weight: bold;
        color: #ffb3d9;
    }

    .text-green { color: #00ff88; font-weight: bold; }
    .text-orange { color: #ff9800; }
    
    .btn-back {
        background: #ff2f92;
        color: white;
        border: none;
        padding: 8px 15px;
        border-radius: 5px;
        cursor: pointer;
        text-decoration: none;
        font-weight: bold;
    }

    @media print {
        body { background: white; color: black; padding: 0; }
        .container { border: none; width: 100%; max-width: 100%; }
        .search-box, .btn-back { display: none; }
        th { background: #eee !important; color: black; border: 1px solid #000; }
        td { border: 1px solid #ddd; color: black; }
    }
</style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="title">Purchase Detail Register</div>
        <div class="search-box">
            <input type="text" id="searchBill" placeholder="Search Bill/Supplier..." onkeyup="filterData()">
            <input type="date" id="searchDate" onchange="filterData()">
            <button class="btn-back" onclick="window.print()">Print Register</button>
            <a href="add-purchase.html" class="btn-back">Back to Entry</a>
        </div>
    </div>

    <div class="table-container">
        <table id="fullRegisterTable">
            <thead>
                <tr>
                    <th>Bill No</th>
                    <th>Date</th>
                    <th>Supplier</th>
                    <th>Item Group</th>
                    <th>Item Name</th>
                    <th>MRP</th>
                    <th>Pur Rate</th>
                    <th>Sale Rate</th>
                    <th>Qty</th>
                    <th>Free</th>
                    <th>Unit</th>
                    <th>Basic Amt</th>
                    <th>GST%</th>
                    <th>CGST</th>
                    <th>GST%</th>
                    <th>SGST</th>
                    <th>Net Total</th>
                </tr>
            </thead>
            <tbody id="registerBody">
                </tbody>
        </table>
    </div>
</div>

<script type="module">
import { db } from './firebase-config.js';
import { collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

let allPurchases = [];

async function loadData() {
    const tbody = document.getElementById("registerBody");
    tbody.innerHTML = "<tr><td colspan='17' style='text-align:center;'>Loading detailed records...</td></tr>";

    try {
        const q = query(collection(db, "purchases"), orderBy("createdAt", "desc"));
        const snap = await getDocs(q);
        
        allPurchases = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        renderData(allPurchases);
    } catch (e) {
        tbody.innerHTML = `<tr><td colspan='17' style='color:red;'>Error: ${e.message}</td></tr>`;
    }
}

function renderData(data) {
    const tbody = document.getElementById("registerBody");
    tbody.innerHTML = "";

    if(data.length === 0) {
        tbody.innerHTML = "<tr><td colspan='17' style='text-align:center;'>No records found.</td></tr>";
        return;
    }

    data.forEach(bill => {
        // We display a summary row for the bill header
        tbody.innerHTML += `
            <tr class="bill-info-row">
                <td>${bill.header.billNo}</td>
                <td>${bill.header.date}</td>
                <td colspan="14">${bill.header.supplier} (Total: ₹ ${bill.totals.grandTotal})</td>
                <td>₹ ${bill.totals.grandTotal}</td>
            </tr>
        `;

        // Then list every item inside that bill with full columns
        bill.items.forEach(item => {
            // Note: Since individual item GST breakdown isn't always saved in the items array, 
            // we calculate the visual display logic based on the 5% standard if specific fields are missing.
            const basic = parseFloat(item.net) / 1.18; // Example fallback if basic is not saved
            
            tbody.innerHTML += `
                <tr>
                    <td></td> <td></td> <td></td> <td>${item.group || '-'}</td>
                    <td>${item.name}</td>
                    <td>${item.mrp || '0'}</td>
                    <td>${item.rate || '-'}</td>
                    <td>${item.saleRate || '-'}</td>
                    <td>${item.qty}</td>
                    <td>${item.free || '0'}</td>
                    <td>${item.unit}</td>
                    <td>${item.basic || '-'}</td>
                    <td>${item.gstP || '9'}%</td>
                    <td>${item.cgst || '-'}</td>
                    <td>${item.gstP || '9'}%</td>
                    <td>${item.sgst || '-'}</td>
                    <td class="text-green">${item.net}</td>
                </tr>
            `;
        });
    });
}

window.filterData = function() {
    const billQuery = document.getElementById("searchBill").value.toLowerCase();
    const dateQuery = document.getElementById("searchDate").value;

    const filtered = allPurchases.filter(b => {
        const matchesBill = b.header.billNo.toString().includes(billQuery) || 
                            b.header.supplier.toLowerCase().includes(billQuery);
        const matchesDate = !dateQuery || b.header.date === dateQuery;
        return matchesBill && matchesDate;
    });

    renderData(filtered);
};

loadData();
</script>

</body>
</html>

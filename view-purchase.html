<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purchase Registry | Shree Datarekha Enterprises</title>
    <style>
        :root {
            --brand-pink: #ff2f92;
            --dark-bg: #1a0510;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            background: linear-gradient(135deg, #2b000f, #5c0a2e, #8e1446);
            color: #fff;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1800px;
            margin: auto;
            background: rgba(0, 0, 0, 0.85);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            border: 1px solid rgba(255, 47, 146, 0.3);
        }

        .header-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--brand-pink);
            padding-bottom: 15px;
        }

        .title { font-size: 24px; font-weight: 800; color: #ffb3d9; text-transform: uppercase; }

        .controls { display: flex; gap: 10px; flex-wrap: wrap; }
        
        input {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 10px 15px;
            border-radius: 8px;
            color: white;
            outline: none;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-entry { background: var(--brand-pink); color: white; }
        .btn-return { background: #ff9800; color: white; }

        .table-viewport {
            overflow-x: auto;
            max-height: 70vh;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1600px;
        }

        thead th {
            background: var(--brand-pink);
            color: white;
            padding: 12px 8px;
            font-size: 11px;
            text-transform: uppercase;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        tbody td {
            padding: 10px 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 13px;
            text-align: center;
        }

        .bill-group-row {
            background: rgba(255, 47, 146, 0.15);
            font-weight: bold;
            color: #ffb3d9;
        }

        .bill-group-row td { text-align: left; padding-left: 15px; border-left: 4px solid var(--brand-pink); }

        .qty-updated {
            color: #00ff88; /* Highlights that Qty is dynamic */
            font-weight: bold;
        }

        @media print {
            body { background: white !important; color: black; padding: 0; }
            .container { border: 1px solid #000; width: 100%; }
            .controls { display: none !important; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-box">
        <div class="title">Purchase Detail Registry</div>
        <div class="controls">
            <input type="text" id="searchBox" placeholder="Search Bill / Supplier..." onkeyup="filterRegistry()">
            <input type="date" id="dateFilter" onchange="filterRegistry()">
            <a href="purchase-return.html" class="btn btn-return">Process Return</a>
            <a href="add-purchase.html" class="btn btn-entry">New Purchase</a>
        </div>
    </div>

    <div class="table-viewport">
        <table id="registryTable">
            <thead>
                <tr>
                    <th>Bill Info</th>
                    <th>Item Group</th>
                    <th>Item Name</th>
                    <th>MRP</th>
                    <th>Pur Rate</th>
                    <th>Sale Rate</th>
                    <th>Qty</th>
                    <th>Free</th>
                    <th>Unit</th>
                    <th>Basic Amt</th>
                    <th>GST%</th>
                    <th>CGST</th>
                    <th>GST%</th>
                    <th>SGST</th>
                    <th>Net Total</th>
                </tr>
            </thead>
            <tbody id="registryBody"></tbody>
        </table>
    </div>
</div>

<script type="module">
    import { db } from './firebase-config.js';
    import { collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    let localRegistry = [];

    // REAL-TIME CONNECTION: Uses onSnapshot so Qty changes from Returns show instantly
    function syncRegistry() {
        const body = document.getElementById("registryBody");
        const q = query(collection(db, "purchases"), orderBy("createdAt", "desc"));

        // This listener stays open and waits for database updates
        onSnapshot(q, (snapshot) => {
            localRegistry = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderRegistry(localRegistry);
        }, (error) => {
            body.innerHTML = `<tr><td colspan='15' style='color:red;'>Connection Error: ${error.message}</td></tr>`;
        });
    }

    function renderRegistry(data) {
        const body = document.getElementById("registryBody");
        body.innerHTML = "";

        if(data.length === 0) {
            body.innerHTML = "<tr><td colspan='15'>No records found.</td></tr>";
            return;
        }

        data.forEach(bill => {
            // Summary Header Row
            const headerRow = document.createElement("tr");
            headerRow.className = "bill-group-row";
            headerRow.innerHTML = `
                <td colspan="14">
                    Bill No: ${bill.header.billNo} | Date: ${bill.header.date} | Supplier: ${bill.header.supplier} | Pay: ${bill.header.payment}
                </td>
                <td style="color: #00ff88; font-weight:bold;">₹${bill.totals.grandTotal}</td>
            `;
            body.appendChild(headerRow);

            // Item Rows
            bill.items.forEach(item => {
                const row = document.createElement("tr");
                row.innerHTML = `
                    <td style="font-size:10px; opacity:0.6;">${bill.header.billNo}</td>
                    <td>${item.group || '-'}</td>
                    <td style="text-align:left; font-weight:600;">${item.name}</td>
                    <td>${item.mrp || '-'}</td>
                    <td>${item.rate || '-'}</td>
                    <td>${item.saleRate || '-'}</td>
                    <td class="qty-updated">${item.qty}</td> <td>${item.free || '0'}</td>
                    <td>${item.unit || 'PCS'}</td>
                    <td>${item.basic || '-'}</td>
                    <td style="color: #cbd5e0; font-size: 11px;">${item.gstP || '9'}%</td>
                    <td style="color: #cbd5e0; font-size: 11px;">${item.cgst || '-'}</td>
                    <td style="color: #cbd5e0; font-size: 11px;">${item.gstP || '9'}%</td>
                    <td style="color: #cbd5e0; font-size: 11px;">${item.sgst || '-'}</td>
                    <td style="font-weight:bold;">${item.net}</td>
                `;
                body.appendChild(row);
            });
        });
    }

    window.filterRegistry = function() {
        const text = document.getElementById("searchBox").value.toLowerCase();
        const date = document.getElementById("dateFilter").value;

        const filtered = localRegistry.filter(b => {
            const matchText = b.header.billNo.toString().includes(text) || 
                              b.header.supplier.toLowerCase().includes(text);
            const matchDate = !date || b.header.date === date;
            return matchText && matchDate;
        });

        renderRegistry(filtered);
    };

    // Start real-time sync
    syncRegistry();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Purchase Register</title>
    <style>
        /* [Keeping your original CSS exactly as it was] */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #2b000f, #5c0a2e, #8e1446); color: #fff; padding: 20px; min-height: 100vh; }
        .container { max-width: 1600px; margin: auto; background: rgba(0, 0, 0, 0.85); border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 25px; border-bottom: 2px solid #ff2f92; padding-bottom: 15px; }
        .title { font-size: 24px; font-weight: 700; color: #ffb3d9; }
        .search-box { display: flex; gap: 15px; flex-wrap: wrap; }
        .search-box input { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); padding: 10px 15px; border-radius: 8px; color: white; outline: none; }
        .table-container { overflow-x: auto; background: rgba(0, 0, 0, 0.3); border-radius: 12px; max-height: 70vh; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 1200px; }
        th { background: #ff2f92; color: white; padding: 12px; position: sticky; top: 0; z-index: 10; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); font-size: 14px; color: #ddd; }
        tr:hover { background: rgba(255, 47, 146, 0.15); }
        td input, td select { background: transparent; border: 1px solid transparent; color: white; padding: 4px; width: 100%; border-radius: 4px; }
        td input:focus, td select:focus { background: rgba(0,0,0,0.5); border-color: #ff2f92; }
        .btn { padding: 6px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold; color: white; margin-right: 5px; transition: 0.3s; }
        .btn-view { background: #2196F3; } .btn-update { background: #4CAF50; } .btn-delete { background: #e53935; } .btn-back { background: #555; padding: 10px 20px; font-size: 14px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #1a0510; padding: 25px; border-radius: 15px; width: 90%; max-width: 900px; border: 1px solid #ff2f92; max-height: 90vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .close-modal { background: none; border: none; color: #ff2f92; font-size: 24px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="title">📋 View Purchase Registry</div>
        <div class="search-box">
            <input type="text" id="searchBill" placeholder="🔍 Search Bill or Supplier..." onkeyup="filterData()">
            <input type="date" id="searchDate" onchange="filterData()">
            <button class="btn btn-back" onclick="location.href='add-purchase.html'">⬅ Back to Entry</button>
        </div>
    </div>

    <div class="table-container">
        <table id="purchaseTable">
            <thead>
                <tr>
                    <th width="5%">S.No</th>
                    <th width="10%">Bill No</th>
                    <th width="10%">Bill Date</th>
                    <th width="20%">Supplier Name</th>
                    <th width="10%">Payment</th>
                    <th width="10%">Total Amount</th>
                    <th width="10%">Paid</th>
                    <th width="10%">Balance</th>
                    <th width="15%">Actions</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<div id="itemModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="modalTitle">Bill Items</h2>
            <button class="close-modal" onclick="closeModal()">×</button>
        </div>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Item Name</th>
                        <th>Qty</th>
                        <th>Unit</th>
                        <th>Net Total</th>
                    </tr>
                </thead>
                <tbody id="itemsBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
import { db } from './firebase-config.js';
import { collection, getDocs, doc, updateDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

let purchaseData = [];

async function loadData() {
    const tbody = document.getElementById("tableBody");
    tbody.innerHTML = "<tr><td colspan='9' style='text-align:center;'>Fetching Cloud Data...</td></tr>";

    try {
        const q = query(collection(db, "purchases"), orderBy("createdAt", "desc"));
        const querySnapshot = await getDocs(q);
        
        purchaseData = querySnapshot.docs.map(d => ({
            id: d.id,
            ...d.data()
        }));
        
        renderTable(purchaseData);
    } catch (err) {
        console.error(err);
        tbody.innerHTML = "<tr><td colspan='9' style='color:red;'>Error connecting to Firebase.</td></tr>";
    }
}

function renderTable(data) {
    const tbody = document.getElementById("tableBody");
    tbody.innerHTML = "";

    data.forEach((bill, index) => {
        // MATCHING THE SAVED KEYS: bill.header.supplier, bill.totals.grandTotal, etc.
        tbody.innerHTML += `
            <tr>
                <td>${index + 1}</td>
                <td>${bill.header.billNo}</td>
                <td>${bill.header.date}</td>
                <td><input type="text" value="${bill.header.supplier}" id="supp-${bill.id}"></td>
                <td>
                    <select id="pay-${bill.id}">
                        <option value="Cash" ${bill.header.payment === 'Cash' ? 'selected' : ''}>Cash</option>
                        <option value="Credit" ${bill.header.payment === 'Credit' ? 'selected' : ''}>Credit</option>
                    </select>
                </td>
                <td style="font-weight:bold; color:#00ff88;">₹ ${bill.totals.grandTotal}</td>
                <td><input type="number" value="${bill.totals.paid}" id="paid-${bill.id}" oninput="recalcLocalRow('${bill.id}')"></td>
                <td id="bal-${bill.id}" style="color:#ff9800;">₹ ${bill.totals.balance}</td>
                <td>
                    <button class="btn btn-view" onclick="viewItems('${bill.id}')">👁️</button>
                    <button class="btn btn-update" onclick="updateBill('${bill.id}')">💾</button>
                    <button class="btn btn-delete" onclick="deleteBill('${bill.id}')">🗑️</button>
                </td>
            </tr>
        `;
    });
}

// Recalculate balance locally when typing in "Paid"
window.recalcLocalRow = function(docId) {
    const bill = purchaseData.find(b => b.id === docId);
    const paidVal = parseFloat(document.getElementById(`paid-${docId}`).value) || 0;
    const totalVal = parseFloat(bill.totals.grandTotal);
    document.getElementById(`bal-${docId}`).innerText = "₹ " + (totalVal - paidVal).toFixed(2);
};

window.filterData = function() {
    const q = document.getElementById("searchBill").value.toLowerCase();
    const d = document.getElementById("searchDate").value;
    const filtered = purchaseData.filter(item => {
        const matchesQuery = item.header.billNo.toString().includes(q) || item.header.supplier.toLowerCase().includes(q);
        const matchesDate = !d || item.header.date === d;
        return matchesQuery && matchesDate;
    });
    renderTable(filtered);
};

window.updateBill = async function(docId) {
    const newSupp = document.getElementById(`supp-${docId}`).value;
    const newPay = document.getElementById(`pay-${docId}`).value;
    const newPaid = parseFloat(document.getElementById(`paid-${docId}`).value) || 0;
    
    const bill = purchaseData.find(b => b.id === docId);
    const newBal = (parseFloat(bill.totals.grandTotal) - newPaid).toFixed(2);

    try {
        await updateDoc(doc(db, "purchases", docId), {
            "header.supplier": newSupp,
            "header.payment": newPay,
            "totals.paid": newPaid,
            "totals.balance": newBal
        });
        alert("Updated Successfully!");
        loadData();
    } catch (e) { alert(e.message); }
};

window.deleteBill = async function(docId) {
    if(confirm("Delete Permanently?")) {
        await deleteDoc(doc(db, "purchases", docId));
        loadData();
    }
};

window.viewItems = function(docId) {
    const bill = purchaseData.find(b => b.id === docId);
    document.getElementById("modalTitle").innerText = `Bill No: ${bill.header.billNo}`;
    const ib = document.getElementById("itemsBody");
    ib.innerHTML = "";
    bill.items.forEach(i => {
        ib.innerHTML += `<tr><td>${i.name}</td><td>${i.qty}</td><td>${i.unit}</td><td>₹ ${i.net}</td></tr>`;
    });
    document.getElementById("itemModal").style.display = "flex";
};

window.closeModal = () => document.getElementById("itemModal").style.display = "none";

loadData();
</script>
</body>
</html>

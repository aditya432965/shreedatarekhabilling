<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Purchase Entry | Shree Datarekha Enterprises</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;}

body{
    background: linear-gradient(135deg,#2b000f,#5c0a2e,#8e1446);
    color:#fff;
    padding:15px;
    min-height: 100vh;
}

.container{
    max-width:1750px;
    margin:auto;
    background:rgba(0,0,0,.8);
    border-radius:20px;
    padding:20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.section{
    background:rgba(255,255,255,0.05);
    padding:15px;
    border-radius:15px;
    margin-bottom:20px;
    border: 1px solid rgba(255, 47, 146, 0.3);
}

.title{
    background:#ff2f92;
    padding:10px;
    border-radius:8px;
    text-align:center;
    font-weight:700;
    margin-bottom:15px;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));
    gap:15px;
}

.field{display:flex;flex-direction:column;position: relative;}
label{font-size:12px;margin-bottom:5px;color:#ffb3d9; font-weight: 600;}

input, select{
    padding:10px;
    border:none;
    border-radius:6px;
    font-size:13px;
    width:100%;
    background: #f8f9fa;
    color: #000;
    outline: none;
}

.readonly-field { background: #ced4da !important; font-weight: bold; }

/* --- Table Styles --- */
.table-wrap{overflow-x:auto; margin-top: 10px; border-radius: 10px;}
table{
    width:100%;
    border-collapse:collapse;
    min-width:1500px;
    background: rgba(0,0,0,0.2);
}

th, td{
    border: 1px solid rgba(255,255,255,0.1);
    padding:8px;
    text-align:center;
    font-size:13px;
}

th{ background:#ff2f92; color: white; font-weight: 600; font-size: 12px; }

td input { text-align: center; padding: 6px; }

/* --- Search Dropdown --- */
.td-relative { position: relative; }
.dropdown{
    position:absolute;
    top: 100%;
    left: 0;
    background:#ffffff;
    color: #000;
    width: 100%;
    max-height: 250px;
    overflow-y: auto;
    border-radius: 0 0 10px 10px;
    display: none;
    z-index: 9999;
    box-shadow: 0 10px 25px rgba(0,0,0,0.6);
}

.dropdown div{
    padding:12px;
    cursor:pointer;
    border-bottom: 1px solid #eee;
    text-align: left;
    line-height: 1.4;
}

.dropdown div:hover{
    background:#ff2f92;
    color: #fff;
}

.dropdown .item-main { font-weight: bold; display: block; font-size: 14px; }
.dropdown .item-sub { font-size: 11px; color: #666; display: block; }
.dropdown div:hover .item-sub { color: #ffe0ef; }

/* --- Buttons --- */
.buttons{ display:flex; gap:12px; margin-top:15px; flex-wrap: wrap; }
button{
    padding:12px 20px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    color:white;
    font-weight:600;
    transition: all 0.2s ease;
}
button:hover { opacity: 0.9; transform: translateY(-2px); }
.green{background:#28a745} .blue{background:#007bff} .red{background:#dc3545} .orange{background:#fd7e14}

</style>
</head>

<body>
<div class="container">

    <div class="section">
        <div class="title">Purchase Bill Details</div>
        <div class="grid">
            <div class="field"><label>Financial Year</label><input id="fy" class="readonly-field" readonly></div>
            <div class="field"><label>Time</label><input id="time" class="readonly-field" readonly></div>
            <div class="field"><label>Bill No (Auto)</label><input id="billNo" type="number"></div>
            <div class="field"><label>Date</label><input id="billDate" class="readonly-field" readonly></div>
            <div class="field">
                <label>Supplier Name</label>
                <input type="text" id="supplierInput" placeholder="Select Supplier..." onclick="showSuppliers()" readonly>
                <div id="suppDropdown" class="dropdown"></div>
            </div>
            <div class="field">
                <label>Payment Mode</label>
                <select id="payment"><option>Cash</option><option>Credit</option></select>
            </div>
        </div>
    </div>

    <div class="section">
        <div class="title">Stock Management (Manual)</div>
        <div class="grid">
            <div class="field"><label>Opening Stock</label><input id="opQty" type="number" value="0"></div>
            <div class="field"><label>Purchase Qty</label><input id="purQty" type="number" value="0"></div>
            <div class="field"><label>Total Sale Qty</label><input id="saleQty" type="number" value="0"></div>
            <div class="field"><label>Current Stock</label><input id="stkQty" type="number" value="0"></div>
        </div>
    </div>

    <div class="section">
        <div class="title">Item List</div>
        <div class="table-wrap">
            <table id="billTable">
                <thead>
                    <tr>
                        <th width="40">S.N</th>
                        <th width="140">Item Group</th>
                        <th width="300">Item Name (Search)</th>
                        <th>MRP</th>
                        <th>Pur Rate</th>
                        <th>Sale Rate</th>
                        <th width="80">Qty</th>
                        <th width="60">Free</th>
                        <th width="110">Unit</th>
                        <th>Basic Amt</th>
                        <th width="60">GST%</th>
                        <th>CGST</th>
                        <th width="60">GST%</th>
                        <th>SGST</th>
                        <th>Net Total</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
        <div class="buttons">
            <button class="blue" onclick="addRow()">+ Add New Item Row</button>
        </div>
    </div>

    <div class="section">
        <div class="title">Payment Summary</div>
        <div class="grid">
            <div class="field"><label>Total Basic</label><input id="totalBasic" class="readonly-field" readonly></div>
            <div class="field"><label>Total CGST</label><input id="totalCgst" class="readonly-field" readonly></div>
            <div class="field"><label>Total SGST</label><input id="totalSgst" class="readonly-field" readonly></div>
            <div class="field"><label>Grand Total</label><input id="netAmt" class="readonly-field" readonly style="color:#d63384; font-size:18px;"></div>
            <div class="field"><label>Paid Amount</label><input id="paidAmt" type="number" oninput="calcBalance()" value="0"></div>
            <div class="field"><label>Balance Due</label><input id="balanceAmt" class="readonly-field" readonly></div>
        </div>
        <div class="buttons">
            <button class="green" onclick="saveBill()">Save Purchase Entry</button>
            <button class="orange" onclick="location.reload()">Reset Page</button>
            <button class="red" onclick="window.location.href='index.html'">Exit</button>
        </div>
    </div>

</div>

<script type="module">
import { db } from './firebase-config.js';
import { collection, addDoc, getDocs, serverTimestamp, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

let suppliers = [];
let masterItems = [];
let unitOptionsHTML = "";

// 1. Load Data from Firebase
async function initializeData() {
    try {
        // Fetch Units for Select Dropdown
        const uSnap = await getDocs(query(collection(db, "units"), orderBy("name", "asc")));
        unitOptionsHTML = uSnap.docs.map(d => `<option value="${d.data().name}">${d.data().name}</option>`).join('');

        // Fetch Items
        const iSnap = await getDocs(collection(db, "items"));
        masterItems = iSnap.docs.map(d => d.data());

        // Fetch Suppliers
        const sSnap = await getDocs(collection(db, "suppliers"));
        suppliers = sSnap.docs.map(d => d.data());

        // Fetch Last Bill No for Auto-Increment
        const q = query(collection(db, "purchases"), orderBy("createdAt", "desc"), limit(1));
        const snap = await getDocs(q);
        let lastNo = 0;
        if(!snap.empty) lastNo = parseInt(snap.docs[0].data().header.billNo) || 0;
        document.getElementById('billNo').value = lastNo + 1;

        addRow(); // Add first row automatically
    } catch (e) {
        console.error("Initialization Error: ", e);
    }
}

// 2. Setup Header Info
function setupHeader() {
    const now = new Date();
    const currentMonth = now.getMonth() + 1;
    const year = now.getFullYear();
    const fyValue = (currentMonth >= 4) ? `${year}-${(year+1).toString().slice(-2)}` : `${year-1}-${year.toString().slice(-2)}`;
    
    document.getElementById('fy').value = fyValue;
    document.getElementById('billDate').value = now.toLocaleDateString('en-GB').replace(/\//g, '-');
    
    setInterval(() => {
        document.getElementById('time').value = new Date().toLocaleTimeString();
    }, 1000);
}

// 3. Row Actions
window.addRow = function() {
    const tbody = document.querySelector("#billTable tbody");
    const row = tbody.insertRow();
    
    row.innerHTML = `
        <td>${tbody.rows.length}</td>
        <td><input class="item-group" readonly placeholder="Group"></td>
        <td class="td-relative">
            <input class="item-name" placeholder="Search product..." oninput="window.searchItem(this)" onclick="window.searchItem(this)">
            <div class="dropdown item-dropdown"></div>
        </td>
        <td><input type="number" class="mrp" value="0"></td>
        <td><input type="number" class="rate" value="0" oninput="window.rowCalc(this)"></td>
        <td><input type="number" class="sale-rate" value="0"></td>
        <td><input type="number" class="qty" value="0" oninput="window.rowCalc(this)"></td>
        <td><input type="number" class="free-qty" value="0"></td>
        <td><select class="unit">${unitOptionsHTML}</select></td>
        <td><input type="number" class="basic" readonly value="0"></td>
        <td><input type="number" class="tax-p" value="9" oninput="window.rowCalc(this)"></td>
        <td><input type="number" class="cgst" readonly value="0"></td>
        <td><input type="number" class="tax-p" value="9" oninput="window.rowCalc(this)"></td>
        <td><input type="number" class="sgst" readonly value="0"></td>
        <td><input type="number" class="net" readonly value="0"></td>
    `;
};

// 4. Searching & Dropdowns
window.searchItem = function(el) {
    const searchVal = el.value.toLowerCase();
    const dd = el.nextElementSibling;
    dd.innerHTML = "";
    
    const filtered = masterItems.filter(i => i.name.toLowerCase().includes(searchVal));
    
    if(filtered.length > 0) {
        filtered.forEach(item => {
            const div = document.createElement("div");
            div.innerHTML = `<span class="item-main">${item.name}</span>
                             <span class="item-sub">Group: ${item.group || 'N/A'} | MRP: ${item.mrp || 0}</span>`;
            div.onclick = () => {
                const tr = el.closest("tr");
                el.value = item.name;
                tr.querySelector(".item-group").value = item.group || "";
                tr.querySelector(".mrp").value = item.mrp || 0;
                tr.querySelector(".rate").value = item.purchase || 0;
                tr.querySelector(".sale-rate").value = item.sale || 0;
                tr.querySelector(".unit").value = item.unit || "";
                
                // Auto calculate if GST exists in master
                const masterGst = (item.gst || (parseFloat(item.cgst||0) + parseFloat(item.sgst||0))) / 2 || 9;
                tr.querySelectorAll(".tax-p").forEach(tp => tp.value = masterGst);
                
                dd.style.display = "none";
                window.rowCalc(el);
            };
            dd.appendChild(div);
        });
        dd.style.display = "block";
    } else {
        dd.style.display = "none";
    }
};

window.showSuppliers = function() {
    const dd = document.getElementById("suppDropdown");
    dd.innerHTML = "";
    suppliers.forEach(s => {
        const div = document.createElement("div");
        div.innerHTML = `<span class="item-main">${s.name}</span>`;
        div.onclick = () => {
            document.getElementById("supplierInput").value = s.name;
            dd.style.display = "none";
        };
        dd.appendChild(div);
    });
    dd.style.display = "block";
};

// 5. Calculations
window.rowCalc = function(el) {
    const tr = el.closest("tr");
    const rate = parseFloat(tr.querySelector(".rate").value) || 0;
    const qty = parseFloat(tr.querySelector(".qty").value) || 0;
    const gstPercent = parseFloat(tr.querySelector(".tax-p").value) || 0;

    const basic = rate * qty;
    const gstAmount = basic * (gstPercent / 100);
    const net = basic + (gstAmount * 2);

    tr.querySelector(".basic").value = basic.toFixed(2);
    tr.querySelector(".cgst").value = gstAmount.toFixed(2);
    tr.querySelector(".sgst").value = gstAmount.toFixed(2);
    tr.querySelector(".net").value = net.toFixed(2);

    updateTotals();
};

function updateTotals() {
    let bTot = 0, cTot = 0, sTot = 0, nTot = 0;
    document.querySelectorAll("#billTable tbody tr").forEach(tr => {
        bTot += parseFloat(tr.querySelector(".basic").value) || 0;
        cTot += parseFloat(tr.querySelector(".cgst").value) || 0;
        sTot += parseFloat(tr.querySelector(".sgst").value) || 0;
        nTot += parseFloat(tr.querySelector(".net").value) || 0;
    });
    
    document.getElementById("totalBasic").value = bTot.toFixed(2);
    document.getElementById("totalCgst").value = cTot.toFixed(2);
    document.getElementById("totalSgst").value = sTot.toFixed(2);
    document.getElementById("netAmt").value = nTot.toFixed(2);
    calcBalance();
}

window.calcBalance = function() {
    const net = parseFloat(document.getElementById("netAmt").value) || 0;
    const paid = parseFloat(document.getElementById("paidAmt").value) || 0;
    document.getElementById("balanceAmt").value = (net - paid).toFixed(2);
};

// 6. Save Logic
window.saveBill = async function() {
    const bNo = document.getElementById('billNo').value;
    const supp = document.getElementById('supplierInput').value;
    
    if(!bNo || !supp) return alert("Please fill Bill Number and Supplier Name!");
    
    const rows = document.querySelectorAll("#billTable tbody tr");
    if(rows.length === 0) return alert("Add at least one item!");

    const items = Array.from(rows).map(tr => ({
        group: tr.querySelector(".item-group").value,
        name: tr.querySelector(".item-name").value,
        qty: tr.querySelector(".qty").value,
        unit: tr.querySelector(".unit").value,
        net: tr.querySelector(".net").value
    }));

    const purchaseData = {
        header: {
            billNo: bNo,
            supplier: supp,
            date: document.getElementById('billDate').value,
            fy: document.getElementById('fy').value,
            payment: document.getElementById('payment').value
        },
        stockSnapshot: {
            opening: document.getElementById('opQty').value,
            purchase: document.getElementById('purQty').value,
            sale: document.getElementById('saleQty').value,
            closing: document.getElementById('stkQty').value
        },
        items: items,
        totals: {
            grandTotal: document.getElementById('netAmt').value,
            paid: document.getElementById('paidAmt').value,
            balance: document.getElementById('balanceAmt').value
        },
        createdAt: serverTimestamp()
    };

    try {
        await addDoc(collection(db, "purchases"), purchaseData);
        alert("Success: Purchase Entry Saved!");
        location.reload();
    } catch(e) {
        alert("Error saving bill: " + e.message);
    }
};

// Global click handler to close dropdowns
window.onclick = (e) => {
    if(!e.target.matches('.item-name') && !e.target.matches('#supplierInput')) {
        document.querySelectorAll(".dropdown").forEach(d => d.style.display = "none");
    }
};

setupHeader();
initializeData();
</script>
</body>
</html>

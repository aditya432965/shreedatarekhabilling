<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Purchase Entry</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI}

body{
background:linear-gradient(135deg,#2b000f,#5c0a2e,#8e1446);
color:#fff;
padding:15px;
}

.container{
max-width:1700px;
margin:auto;
background:rgba(0,0,0,.75);
border-radius:20px;
padding:20px;
}

.section{
background:rgba(0,0,0,.45);
padding:15px;
border-radius:15px;
margin-bottom:20px;
}

.title{
background:#ff2f92;
padding:8px;
border-radius:8px;
text-align:center;
font-weight:600;
margin-bottom:15px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:12px;
}

.field{display:flex;flex-direction:column;}
label{font-size:12px;margin-bottom:4px;color:#ffb3d9;}

input,select{
padding:7px;
border:none;
border-radius:6px;
font-size:13px;
width:100%;
}

.table-wrap{overflow-x:auto;}
table{
width:100%;
border-collapse:collapse;
min-width:1400px;
}

th,td{
border:1px solid rgba(255,255,255,.2);
padding:6px;
text-align:center;
font-size:12px;
}

th{background:#ff2f92;}

td input, td select{
width:100%;
padding:5px;
border:none;
border-radius:5px;
}

.buttons{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:15px;
}

button{
padding:8px 12px;
border:none;
border-radius:8px;
cursor:pointer;
color:white;
font-weight:600;
}

.green{background:#4CAF50}
.blue{background:#2196F3}
.red{background:#e53935}
.orange{background:#ff9800}
.gray{background:#555}

.dropdown{
  position:absolute;
  background:#222;
  width:100%;
  max-height:200px;
  overflow-y:auto;
  border-radius:10px;
  display:none;
  z-index:999;
}

.dropdown div{
  padding:10px;
  cursor:pointer;
}

.dropdown div:hover{
  background:#ff2f92;
}
</style>
</head>

<body>
<div class="container">

<!-- HEADER -->
<div class="section">
<div class="title">Purchase Bill Information</div>

<div class="grid">

<div class="field"><label>Working Financial Year</label><input id="fy" value="2025-26"></div>
<div class="field"><label>Firm</label><input id="firm" value="My Firm"></div>
<div class="field"><label>Label</label><input id="label" value="Purchase Entry"></div>
<div class="field"><label>Time</label><input id="time"></div>
<div class="field"><label>Bill No</label><input id="billNo"></div>
<div class="field"><label>Bill Date</label><input id="billDate"></div>
<div class="field"><label>Payment</label>
<select id="payment"><option>Cash</option><option>Credit</option></select>
</div>
<div class="form-group">
  <label>Supplier Name</label>
  <input type="text" id="supplierInput" 
         placeholder="Select Supplier"
         onclick="showSupplierList()" 
         readonly>

  <div id="supplierDropdown" class="dropdown"></div>
</div>

</div>
</div>

<!-- STOCK -->
<div class="section">
<div class="title">Stock Details</div>
<div class="grid">
<div class="field"><label>Op Qty</label><input id="opQty" type="number"></div>
<div class="field"><label>Pur Qty</label><input id="purQty" type="number"></div>
<div class="field"><label>Sale Qty</label><input id="saleQty" type="number"></div>
<div class="field"><label>Stk Qty</label><input id="stkQty" type="number"></div>
</div>
</div>

<!-- TABLE -->
<div class="section">
<div class="title">Item Entry</div>

<div class="table-wrap">
<table id="billTable">
<thead>
<tr>
<th>S.No</th>
<th>Item Code</th>
<th>Item Name</th>
<th>MRP</th>
<th>Pur Rate</th>
<th>Sale Rate</th>
<th>Qty</th>
<th>Free Qty</th>
<th>Unit</th>
<th>Amount</th>
<th>%</th>
<th>CGST Amt</th>
<th>%</th>
<th>SGST Amt</th>
<th>Net Amt</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<div class="buttons">
<button class="blue" onclick="addRow()">Add Row</button>
</div>

</div>

<!-- SUMMARY -->
<div class="section">
<div class="title">Summary</div>

<div class="grid">
<div class="field"><label>Total Sale Amt</label><input id="totalSale"></div>
<div class="field"><label>CGST Amt</label><input id="totalCgst"></div>
<div class="field"><label>SGST Amt</label><input id="totalSgst"></div>
<div class="field"><label>Net Amt</label><input id="netAmt"></div>
<div class="field"><label>Paid Amt</label><input id="paidAmt"></div>
<div class="field"><label>Unpaid Amt</label><input id="unpaidAmt"></div>
<div class="field"><label>Balance</label><input id="balanceAmt"></div>
</div>

<div class="buttons">
<button class="blue" ; onclick="addNewBill()">Add New Bill</button>
<button class="green"; onclick="savePurchase()">Save</button>
<button class="green" onclick="markPaid()">Paid</button>
<button class="orange" onclick="markUnpaid()">Unpaid</button>
<button class="gray" ; onclick="closeBill()">Close Bill</button>
<button class="red"; onclick= "location.href='purchase-entry.html'">Exit</button>
</div>

</div>

</div>

<script type="module">
import { db } from './firebase-config.js';
import { 
    collection, 
    addDoc, 
    getDocs, 
    serverTimestamp, 
    query, 
    orderBy 
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

/* 🔐 LOGIN CHECK */
if(localStorage.getItem("loggedIn") !== "true") window.location.href = "index.html";

/* 📦 DATA STATE */
let suppliers = [];
let masterItems = [];

/* 🕒 AUTO TIME & DATE */
setInterval(() => { 
    const timeEl = document.getElementById('time');
    if(timeEl) timeEl.value = new Date().toLocaleTimeString(); 
}, 1000);
document.getElementById('billDate').value = new Date().toISOString().split('T')[0];

/* ☁️ LOAD CLOUD DATA (Suppliers & Items) */
async function loadResources() {
    try {
        const suppSnap = await getDocs(collection(db, "suppliers"));
        suppliers = suppSnap.docs.map(d => d.data());

        const itemSnap = await getDocs(collection(db, "items"));
        masterItems = itemSnap.docs.map(d => d.data());
    } catch (err) {
        console.error("Error loading cloud resources:", err);
    }
}

/* ➕ ADD ROW */
window.addRow = function() {
    let tbody = document.querySelector("#billTable tbody");
    let sn = tbody.rows.length + 1;
    let row = tbody.insertRow();

    row.innerHTML = `
        <td>${sn}</td>
        <td><input class="item-code" onchange="window.fetchItemDetails(this)"></td>
        <td><input class="item-name" readonly></td>
        <td><input type="number" class="mrp"></td>
        <td><input type="number" class="pur-rate" oninput="window.rowCalc(this)"></td>
        <td><input type="number" class="sale-rate"></td>
        <td><input type="number" class="qty" oninput="window.rowCalc(this)"></td>
        <td><input type="number" class="free-qty"></td>
        <td><input class="unit"></td>
        <td><input type="number" class="amount" readonly></td>
        <td><input type="number" class="tax-p" value="9" oninput="window.rowCalc(this)"></td>
        <td><input type="number" class="cgst" readonly></td>
        <td><input type="number" class="tax-p" value="9" oninput="window.rowCalc(this)"></td>
        <td><input type="number" class="sgst" readonly></td>
        <td><input type="number" class="net" readonly></td>
    `;
};

/* 🔍 FETCH ITEM DETAILS FROM CLOUD */
window.fetchItemDetails = function(el) {
    const code = el.value.trim();
    const item = masterItems.find(i => i.code === code);
    const row = el.closest("tr");
    if(item) {
        row.querySelector(".item-name").value = item.name;
        row.querySelector(".mrp").value = item.mrp || 0;
        row.querySelector(".pur-rate").value = item.purchase || 0;
        row.querySelector(".sale-rate").value = item.sale || 0;
        row.querySelector(".unit").value = "PCS"; // Default
    } else {
        alert("Item code not found in Master");
    }
};

/* 🧮 CALCULATIONS */
window.rowCalc = function(el) {
    let row = el.closest("tr");
    let rate = parseFloat(row.querySelector(".pur-rate").value) || 0;
    let qty = parseFloat(row.querySelector(".qty").value) || 0;
    let taxP = parseFloat(row.querySelector(".tax-p").value) || 0;

    let amount = rate * qty;
    let gstAmt = amount * (taxP / 100);
    let net = amount + (gstAmt * 2); // CGST + SGST

    row.querySelector(".amount").value = amount.toFixed(2);
    row.querySelector(".cgst").value = gstAmt.toFixed(2);
    row.querySelector(".sgst").value = gstAmt.toFixed(2);
    row.querySelector(".net").value = net.toFixed(2);

    window.calculateTotals();
};

window.calculateTotals = function() {
    let rows = document.querySelectorAll("#billTable tbody tr");
    let total = 0, cgst = 0, sgst = 0, net = 0, qty = 0;

    rows.forEach(r => {
        total += parseFloat(r.querySelector(".amount").value) || 0;
        cgst += parseFloat(r.querySelector(".cgst").value) || 0;
        sgst += parseFloat(r.querySelector(".sgst").value) || 0;
        net += parseFloat(r.querySelector(".net").value) || 0;
        qty += parseFloat(r.querySelector(".qty").value) || 0;
    });

    document.getElementById('totalSale').value = total.toFixed(2);
    document.getElementById('totalCgst').value = cgst.toFixed(2);
    document.getElementById('totalSgst').value = sgst.toFixed(2);
    document.getElementById('netAmt').value = net.toFixed(2);
    document.getElementById('purQty').value = qty;

    window.calculateBalance();
};

window.calculateBalance = function() {
    let paid = parseFloat(document.getElementById('paidAmt').value) || 0;
    let net = parseFloat(document.getElementById('netAmt').value) || 0;
    let unpaid = net - paid;
    document.getElementById('unpaidAmt').value = unpaid.toFixed(2);
    document.getElementById('balanceAmt').value = unpaid.toFixed(2);
};

/* 🏦 SUPPLIER DROPDOWN */
window.showSupplierList = function() {
    const dropdown = document.getElementById("supplierDropdown");
    dropdown.innerHTML = "";
    suppliers.forEach(s => {
        let div = document.createElement("div");
        div.innerHTML = s.name;
        div.onclick = () => {
            document.getElementById("supplierInput").value = s.name;
            dropdown.style.display = "none";
        };
        dropdown.appendChild(div);
    });
    dropdown.style.display = "block";
};

/* 💾 SAVE TO FIREBASE */
window.savePurchase = async function() {
    const rows = document.querySelectorAll('#billTable tbody tr');
    if(rows.length === 0) return alert("Add items first");

    const purchaseRecord = {
        header: {
            billNo: document.getElementById('billNo').value,
            billDate: document.getElementById('billDate').value,
            supplier: document.getElementById('supplierInput').value,
            payment: document.getElementById('payment').value
        },
        items: Array.from(rows).map(row => ({
            code: row.querySelector(".item-code").value,
            name: row.querySelector(".item-name").value,
            qty: parseFloat(row.querySelector(".qty").value),
            rate: parseFloat(row.querySelector(".pur-rate").value),
            net: parseFloat(row.querySelector(".net").value)
        })),
        summary: {
            total: document.getElementById('netAmt').value,
            paid: document.getElementById('paidAmt').value
        },
        createdAt: serverTimestamp()
    };

    try {
        await addDoc(collection(db, "purchases"), purchaseRecord);
        alert("Purchase stored in Cloud ✅");
        location.reload();
    } catch (e) {
        alert("Cloud Save Failed: " + e.message);
    }
};

window.goBack = () => location.href = "master-entry.html";
window.markPaid = () => {
    document.getElementById('paidAmt').value = document.getElementById('netAmt').value;
    window.calculateBalance();
};

/* 🚀 INIT */
loadResources();
</script>
</body>
</html>

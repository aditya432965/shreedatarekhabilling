<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delete Purchase Entry | Shree Datarekha Enterprises</title>

<style>
/* Keeping your exact original styling */
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI}

body{
background:linear-gradient(135deg,#2b000f,#5c0a2e,#8e1446);
color:#fff;
padding:15px;
}

.container{
max-width:1700px;
margin:auto;
background:rgba(0,0,0,.75);
border-radius:20px;
padding:20px;
}

.title{
background:#ff2f92;
padding:8px;
border-radius:8px;
text-align:center;
font-weight:600;
margin-bottom:15px;
}

.filters{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:10px;
margin-bottom:15px;
}

input{
padding:7px;
border:none;
border-radius:6px;
width:100%;
background: #eee;
color: #000;
margin-bottom: 5px;
}

.main{
display:grid;
grid-template-columns:1fr 2fr;
gap:20px;
}

.list{
background:rgba(0,0,0,.45);
padding:10px;
border-radius:15px;
max-height:550px;
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid rgba(255,255,255,.2);
padding:6px;
font-size:12px;
text-align:center;
}

th{background:#ff2f92}

tr:hover{
background:rgba(255,47,146,0.3);
cursor:pointer;
}

.paid{background:rgba(76,175,80,.3)}
.unpaid{background:rgba(229,57,53,.3)}

.form-section{
background:rgba(0,0,0,.45);
padding:15px;
border-radius:15px;
overflow:auto;
}

.buttons{
margin-top:15px;
display:flex;
flex-wrap:wrap;
gap:10px;
}

button{
padding:8px 12px;
border:none;
border-radius:8px;
cursor:pointer;
color:white;
font-weight:600;
}

.red{background:#e53935}
.gray{background:#555}

h3 { margin-bottom: 10px; color: #ffb3d9; font-size: 16px; border-left: 4px solid #ff2f92; padding-left: 10px; margin-top: 10px;}

@media(max-width:900px){
.main{grid-template-columns:1fr}
}
</style>
</head>

<body>
<div class="container">

<div class="title">Delete Purchase Entry</div>

<div class="filters">
    <input type="text" id="searchBill" placeholder="Search Bill No or Supplier" oninput="applyFilters()">
    <input type="date" id="fromDate" onchange="applyFilters()">
    <input type="date" id="toDate" onchange="applyFilters()">
</div>

<div class="main">

<div class="list">
<table>
<thead>
<tr>
<th>Bill</th>
<th>Date</th>
<th>Supplier</th>
<th>Net</th>
</tr>
</thead>
<tbody id="purchaseList">
    <tr><td colspan="4">Loading data...</td></tr>
</tbody>
</table>
</div>

<div class="form-section">

<h3>Bill Information</h3>
<label style="font-size: 11px;">Bill No</label>
<input id="billNo" readonly style="background:#ccc">
<label style="font-size: 11px;">Bill Date</label>
<input id="billDate" readonly style="background:#ccc">
<label style="font-size: 11px;">Supplier</label>
<input id="supplier" readonly style="background:#ccc">
<label style="font-size: 11px;">Payment Type</label>
<input id="payment" readonly style="background:#ccc">

<h3>Item Details</h3>
<div style="overflow-x:auto;">
<table id="itemTable">
<thead>
<tr>
    <th>Group</th>
    <th>Item Name</th>
    <th>Rate</th>
    <th>Qty</th>
    <th>Net</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<h3>Summary</h3>
<label style="font-size: 11px;">Net Amount</label>
<input id="netAmt" readonly style="background:#ccc">
<label style="font-size: 11px;">Paid Amount</label>
<input id="paidAmt" readonly style="background:#ccc">
<label style="font-size: 11px;">Balance</label>
<input id="balanceAmt" readonly style="background:#ccc">

<div class="buttons">
    <button class="red" onclick="deletePurchase()">Delete Permanently</button>
    <button class="gray" onclick="goBack()">Back</button>
</div>

</div>
</div>
</div>

<script type="module">
import { db } from './firebase-config.js';
import { 
    collection, 
    getDocs, 
    doc, 
    deleteDoc, 
    query, 
    orderBy 
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

/* 🔐 LOGIN CHECK */
if(localStorage.getItem("loggedIn") !== "true") window.location.href = "index.html";

let purchases = [];
let selectedDocId = null;

// Helper for date filtering
function parseDate(str) {
    if(!str) return new Date(0);
    const parts = str.split('-'); // DD-MM-YYYY
    return new Date(parts[2], parts[1]-1, parts[0]);
}

/* ☁️ LOAD PURCHASES FROM CLOUD */
async function loadPurchases() {
    try {
        const q = query(collection(db, "purchases"), orderBy("createdAt", "desc"));
        const querySnapshot = await getDocs(q);
        
        purchases = querySnapshot.docs.map(d => ({
            id: d.id, 
            ...d.data()
        }));
        
        renderList(purchases);
    } catch (err) {
        console.error("Cloud Fetch Error:", err);
        document.getElementById("purchaseList").innerHTML = "<tr><td colspan='4'>Error loading data.</td></tr>";
    }
}

/* 📊 RENDER LIST */
function renderList(list) {
    const tbody = document.getElementById("purchaseList");
    tbody.innerHTML = "";
    
    list.forEach(p => {
        const balance = parseFloat(p.summary?.balance || 0);
        const statusClass = balance <= 0 ? "paid" : "unpaid";

        tbody.innerHTML += `
            <tr class="${statusClass}" onclick="selectPurchase('${p.id}')">
                <td>${p.header?.billNo || 'N/A'}</td>
                <td>${p.header?.date || 'N/A'}</td>
                <td style="text-align:left">${p.header?.supplier || 'N/A'}</td>
                <td>${p.summary?.grandTotal || 0}</td>
            </tr>`;
    });
}

/* 🔍 FILTER LOGIC */
window.applyFilters = function() {
    let search = document.getElementById("searchBill").value.toLowerCase();
    let from = document.getElementById("fromDate").value;
    let to = document.getElementById("toDate").value;

    let filtered = purchases.filter(p => {
        let matchBill = (p.header?.billNo || "").toString().toLowerCase().includes(search) || 
                        (p.header?.supplier || "").toLowerCase().includes(search);

        let billDateObj = parseDate(p.header?.date);
        let matchFrom = !from || billDateObj >= new Date(from);
        let matchTo = !to || billDateObj <= new Date(to);

        return matchBill && matchFrom && matchTo;
    });

    renderList(filtered);
};

/* 🖱️ SELECT BILL */
window.selectPurchase = function(id) {
    const p = purchases.find(item => item.id === id);
    if (!p) return;

    selectedDocId = id;

    // Fixed mappings based on your "Data how it should look" example
    document.getElementById("billNo").value = p.header?.billNo || "";
    document.getElementById("billDate").value = p.header?.date || "";
    document.getElementById("supplier").value = p.header?.supplier || "";
    document.getElementById("payment").value = p.header?.payment || "";
    
    document.getElementById("netAmt").value = p.summary?.grandTotal || 0;
    document.getElementById("paidAmt").value = p.summary?.paid || 0;
    document.getElementById("balanceAmt").value = p.summary?.balance || 0;

    /* LOAD ITEMS */
    let tbody = document.querySelector("#itemTable tbody");
    tbody.innerHTML = "";

    (p.items || []).forEach(item => {
        tbody.innerHTML += `
            <tr>
                <td>${item.group || ''}</td>
                <td style="text-align:left">${item.name || ''}</td>
                <td>${item.rate || 0}</td>
                <td>${item.qty || 0}</td>
                <td>${item.net || 0}</td>
            </tr>`;
    });
};

/* 🗑️ DELETE FUNCTION */
window.deletePurchase = async function() {
    if (!selectedDocId) return alert("Please select a bill from the left list first");

    if (confirm("Are you sure? This bill will be deleted permanently from Cloud.")) {
        try {
            await deleteDoc(doc(db, "purchases", selectedDocId));
            alert("Bill Deleted Successfully ❌");
            location.reload(); // Refresh to update list
        } catch (e) {
            alert("Delete Failed: " + e.message);
        }
    }
};

window.goBack = () => location.href = "purchase-entry.html";

/* 🚀 START */
loadPurchases();
</script>
</body>
</html>

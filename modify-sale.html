<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Modify/Delete Sale | Shree Datarekha Enterprises</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }

body {
  min-height: 100vh;
  background: linear-gradient(135deg, #2b000f, #5c0a2e, #8e1446);
  display: flex;
  justify-content: center;
  padding: 10px;
  color: white;
}

.container {
  width: 100%;
  max-width: 1200px;
  background: rgba(0, 0, 0, .8);
  border-radius: 18px;
  padding: 15px;
  border: 1px solid rgba(255, 47, 146, 0.3);
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

h1 { 
  text-align: center; 
  margin-bottom: 20px; 
  font-size: 1.4rem; 
  color: #ffb3d9;
  letter-spacing: 0.5px;
}

/* SEARCH SECTION */
.search-box {
  display: flex;
  justify-content: center;
  margin-bottom: 20px;
}
.search-box input {
  width: 100%;
  max-width: 600px;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid rgba(255, 255, 255, 0.2);
  outline: none;
  background: white;
  color: #333;
  font-size: 16px; /* Prevents iOS zoom on focus */
}

/* MAIN LAYOUT */
.main {
  display: grid;
  grid-template-columns: 320px 1fr;
  gap: 20px;
}

/* LEFT SIDE: BILL LIST */
.list {
  border: 1px solid rgba(255, 159, 197, 0.2);
  border-radius: 12px;
  overflow: auto;
  max-height: 600px;
  background: rgba(255, 255, 255, 0.03);
}
table { width: 100%; border-collapse: collapse; }
th, td { padding: 12px 10px; border-bottom: 1px solid rgba(255, 159, 197, 0.1); font-size: 13px; text-align: left; }
th { background: #ff2f92; position: sticky; top: 0; z-index: 5; color: white; font-weight: 600; }
tr:hover { background: rgba(255, 255, 255, .05); cursor: pointer; }
.selected-row { background: rgba(255, 47, 146, 0.25) !important; border-left: 4px solid #ff2f92; }

/* RIGHT SIDE: EDIT FORM */
.form-panel {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.bill-header-fields {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px;
  background: rgba(255, 255, 255, 0.05);
  padding: 15px;
  border-radius: 12px;
}

.input-group { display: flex; flex-direction: column; gap: 6px; }
label { font-size: 11px; color: #ffb3d9; font-weight: 700; text-transform: uppercase; }
input { 
  padding: 12px; 
  border: 1px solid rgba(255,255,255,0.1); 
  border-radius: 8px; 
  background: white; 
  color: #333; 
  width: 100%;
  font-size: 14px;
}
input:disabled { background: #e0e0e0; color: #666; }

/* ITEMS TABLE AREA */
.items-container {
  overflow-x: auto;
  background: rgba(0, 0, 0, 0.2);
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.1);
  -webkit-overflow-scrolling: touch; /* Smooth scroll for iOS */
}
.items-table { min-width: 700px; }
.row-input { 
  background: rgba(255,255,255,0.05); 
  color: white; 
  border: 1px solid rgba(255,255,255,0.2); 
  padding: 8px; 
  border-radius: 6px; 
  text-align: center; 
}
.row-input:focus { background: white; color: #333; border-color: #ff2f92; }

/* SUMMARY BOX */
.summary-bar {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  background: rgba(255, 47, 146, 0.1);
  padding: 15px;
  border-radius: 12px;
  border: 1px solid rgba(255, 47, 146, 0.2);
}
.sum-item { text-align: center; }
.sum-item span { display: block; font-size: 10px; color: #ffb3d9; text-transform: uppercase; margin-bottom: 4px; }
.sum-item strong { font-size: 1.1rem; color: #00ff88; }

/* BUTTONS */
.buttons {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}
button {
  padding: 15px;
  border: none;
  border-radius: 10px;
  font-weight: 700;
  color: white;
  cursor: pointer;
  font-size: 14px;
  transition: all 0.2s;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}
.update { background: #2e7d32; }
.delete { background: #c62828; }
.reset { background: #616161; }
.back { background: #424242; }
button:active { transform: scale(0.96); }

/* MOBILE RESPONSIVENESS CUSTOMIZATIONS */
@media(max-width: 900px) {
  .main { grid-template-columns: 1fr; }
  .list { max-height: 200px; } /* Give more space to the form on tablet */
}

@media(max-width: 600px) {
  h1 { font-size: 1.2rem; }
  .bill-header-fields { grid-template-columns: 1fr; }
  .summary-bar { grid-template-columns: 1fr; gap: 15px; }
  .buttons { grid-template-columns: 1fr; }
  .sum-item { border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 5px; }
  .sum-item:last-child { border-bottom: none; }
}
</style>
</head>

<body>

<div class="container">
  <h1>Modify / Delete Sale Entry</h1>

  <div class="search-box">
    <input id="searchInput" placeholder="Search Bill No or Name..." oninput="filterBills()">
  </div>

  <div class="main">
    <div class="list">
      <table>
        <thead>
          <tr>
            <th>Bill No</th>
            <th>Customer</th>
            <th>Total</th>
          </tr>
        </thead>
        <tbody id="billListBody"></tbody>
      </table>
    </div>

    <div class="form-panel">
      <div class="bill-header-fields">
        <div class="input-group">
          <label>Bill Number</label>
          <input id="billNo" disabled>
        </div>
        <div class="input-group">
          <label>Bill Date</label>
          <input type="date" id="billDate">
        </div>
        <div class="input-group">
          <label>Customer Name</label>
          <input id="custName">
        </div>
        <div class="input-group">
          <label>Paid Amount</label>
          <input type="number" id="paidAmt" oninput="calculateTotals()">
        </div>
      </div>

      <div class="items-container">
        <table class="items-table">
          <thead>
            <tr>
              <th width="40">#</th>
              <th>Item Name</th>
              <th width="70">Qty</th>
              <th width="90">Rate</th>
              <th width="70">Disc%</th>
              <th width="110">Net Amt</th>
            </tr>
          </thead>
          <tbody id="itemsTableBody"></tbody>
        </table>
      </div>

      <div class="summary-bar">
        <div class="sum-item"><span>Net Total</span><strong id="dispNet">0.00</strong></div>
        <div class="sum-item"><span>Total Disc</span><strong id="dispDisc">0.00</strong></div>
        <div class="sum-item"><span>Balance</span><strong id="dispBal" style="color:#ff9800;">0.00</strong></div>
      </div>

      <div class="buttons">
        <button class="update" onclick="updateBill()">Update Bill</button>
        <button class="delete" onclick="deleteBill()">Delete Bill</button>
        <button class="reset" onclick="resetForm()">Reset</button>
        <button class="back" onclick="goBack()">Back</button>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { db } from './firebase-config.js';
import { 
    collection, getDocs, doc, updateDoc, deleteDoc, query, orderBy 
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

if(localStorage.getItem("loggedIn") !== "true") window.location.href = "index.html";

let allSales = [];
let selectedDocId = null;

async function loadSales() {
    try {
        const q = query(collection(db, "sales"), orderBy("createdAt", "desc"));
        const snap = await getDocs(q);
        allSales = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        renderList(allSales);
    } catch (e) { console.error("Load Error: ", e); }
}

function renderList(data) {
    const tbody = document.getElementById("billListBody");
    tbody.innerHTML = data.map(s => `
        <tr onclick="selectBill('${s.id}')" id="row-${s.id}">
            <td>${s.billNo}</td>
            <td>${s.customerName}</td>
            <td>₹${s.summary?.total || s.netTotal || 0}</td>
        </tr>
    `).join('');
}

window.filterBills = function() {
    const q = document.getElementById("searchInput").value.toLowerCase();
    const filtered = allSales.filter(s => 
        s.billNo.toLowerCase().includes(q) || 
        s.customerName.toLowerCase().includes(q)
    );
    renderList(filtered);
};

window.selectBill = function(id) {
    const s = allSales.find(x => x.id === id);
    if(!s) return;
    
    selectedDocId = id;
    document.querySelectorAll('tr').forEach(r => r.classList.remove('selected-row'));
    const row = document.getElementById(`row-${id}`);
    if(row) row.classList.add('selected-row');

    document.getElementById("billNo").value = s.billNo;
    document.getElementById("custName").value = s.customerName;
    document.getElementById("billDate").value = s.date;
    document.getElementById("paidAmt").value = s.summary?.paid || 0;

    const itBody = document.getElementById("itemsTableBody");
    itBody.innerHTML = (s.items || []).map((it, idx) => `
        <tr>
            <td>${idx+1}</td>
            <td><input class="row-input" value="${it.name}" style="text-align:left; width:100%"></td>
            <td><input type="number" class="row-input item-qty" value="${it.qty}" oninput="calculateTotals()"></td>
            <td><input type="number" class="row-input item-rate" value="${it.rate}" oninput="calculateTotals()"></td>
            <td><input type="number" class="row-input item-disc" value="${it.disc || 0}" oninput="calculateTotals()"></td>
            <td><input class="row-input item-net" value="${it.net}" readonly></td>
        </tr>
    `).join('');
    
    calculateTotals();
};

window.calculateTotals = function() {
    let totalNet = 0;
    let totalDiscVal = 0;

    document.querySelectorAll('#itemsTableBody tr').forEach(row => {
        const qty = parseFloat(row.querySelector('.item-qty').value) || 0;
        const rate = parseFloat(row.querySelector('.item-rate').value) || 0;
        const discP = parseFloat(row.querySelector('.item-disc').value) || 0;

        const gross = qty * rate;
        const discVal = gross * (discP / 100);
        const net = gross - discVal;
        
        row.querySelector('.item-net').value = net.toFixed(2);
        totalNet += net;
        totalDiscVal += discVal;
    });

    const paid = parseFloat(document.getElementById("paidAmt").value) || 0;
    document.getElementById("dispNet").innerText = totalNet.toFixed(2);
    document.getElementById("dispDisc").innerText = totalDiscVal.toFixed(2);
    document.getElementById("dispBal").innerText = (totalNet - paid).toFixed(2);
};

window.updateBill = async function() {
    if(!selectedDocId) return alert("Select a bill first!");

    const updatedItems = [];
    document.querySelectorAll('#itemsTableBody tr').forEach(row => {
        updatedItems.push({
            name: row.cells[1].querySelector('input').value,
            qty: parseFloat(row.querySelector('.item-qty').value),
            rate: parseFloat(row.querySelector('.item-rate').value),
            disc: parseFloat(row.querySelector('.item-disc').value),
            net: parseFloat(row.querySelector('.item-net').value)
        });
    });

    const data = {
        customerName: document.getElementById("custName").value,
        date: document.getElementById("billDate").value,
        items: updatedItems,
        summary: {
            total: document.getElementById("dispNet").innerText,
            paid: parseFloat(document.getElementById("paidAmt").value),
            balance: document.getElementById("dispBal").innerText
        }
    };

    try {
        await updateDoc(doc(db, "sales", selectedDocId), data);
        alert("Bill updated successfully! ✅");
        loadSales();
    } catch (e) { alert("Error: " + e.message); }
};

window.deleteBill = async function() {
    if(!selectedDocId || !confirm("Permanently delete this bill?")) return;
    try {
        await deleteDoc(doc(db, "sales", selectedDocId));
        alert("Deleted! 🗑️");
        resetForm();
        loadSales();
    } catch (e) { alert("Error: " + e.message); }
};

window.resetForm = function() {
    location.reload();
};

window.goBack = function() {
    window.location.href = "sale-entry.html";
};

loadSales();
</script>
</body>
</html>

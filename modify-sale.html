<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Modify/Delete Sale | Shree Datarekha Enterprises</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }

body {
  min-height: 100vh;
  background: linear-gradient(135deg, #2b000f, #5c0a2e, #8e1446);
  display: flex;
  justify-content: center;
  padding: 15px; 
  color: white;
}

.container {
  width: 100%;
  max-width: 1100px; /* Balanced width between Master and Sale */
  background: rgba(0, 0, 0, .75);
  border-radius: 22px;
  padding: 20px; 
  border: 1px solid rgba(255, 47, 146, 0.2);
}

h1 { text-align: center; margin-bottom: 15px; font-size: 1.5rem; color: #ffb3d9; }

/* SEARCH SECTION */
.search-box {
  display: flex;
  justify-content: center;
  margin-bottom: 20px;
}
.search-box input {
  width: 100%;
  max-width: 500px;
  padding: 12px;
  border-radius: 14px;
  border: none;
  outline: none;
  background: white;
  color: #333;
  font-size: 16px;
}

/* MAIN LAYOUT */
.main {
  display: grid;
  grid-template-columns: 350px 1fr;
  gap: 20px;
}

/* LEFT SIDE: BILL LIST */
.list {
  border: 1px solid #ff9fc555;
  border-radius: 16px;
  overflow: auto;
  max-height: 550px; 
  background: rgba(255, 255, 255, 0.05);
}
table { width: 100%; border-collapse: collapse; }
th, td { padding: 12px; border-bottom: 1px solid #ff9fc533; font-size: 13px; text-align: left; }
th { background: #ff2f92; position: sticky; top: 0; z-index: 5; color: white; }
tr:hover { background: rgba(255, 255, 255, .1); cursor: pointer; }
.selected-row { background: rgba(255, 47, 146, 0.3) !important; border-left: 4px solid #ff2f92; }

/* RIGHT SIDE: EDIT FORM */
.form-panel {
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.bill-header-fields {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  background: rgba(255, 255, 255, 0.05);
  padding: 15px;
  border-radius: 15px;
}

.input-group { display: flex; flex-direction: column; gap: 5px; }
label { font-size: 12px; color: #ffb3d9; font-weight: 600; }
input { padding: 11px; border: none; border-radius: 12px; background: white; color: #333; width: 100%; }
input:disabled { background: #ccc; cursor: not-allowed; }

/* ITEMS TABLE AREA */
.items-container {
  overflow-x: auto;
  background: rgba(0, 0, 0, 0.3);
  border-radius: 12px;
  border: 1px solid #444;
  max-height: 300px;
}
.items-table { min-width: 800px; }
.row-input { background: transparent; color: white; border: 1px solid #555; padding: 6px; border-radius: 6px; text-align: center; }
.row-input:focus { background: rgba(255,255,255,0.1); border-color: #ff2f92; outline: none; }

/* SUMMARY BAR */
.summary-bar {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  background: rgba(255, 47, 146, 0.15);
  padding: 15px;
  border-radius: 12px;
  border: 1px solid rgba(255, 47, 146, 0.3);
}
.sum-item { text-align: center; }
.sum-item span { display: block; font-size: 11px; color: #ffb3d9; }
.sum-item strong { font-size: 16px; color: #00ff88; }

/* BUTTONS */
.buttons {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 10px;
}
button {
  padding: 14px;
  border: none;
  border-radius: 14px;
  font-weight: 700;
  color: white;
  cursor: pointer;
  transition: 0.2s ease;
}
.update { background: #4CAF50; }
.delete { background: #d32f2f; }
.reset { background: #777; }
.back { background: #444; }
button:active { transform: scale(0.95); }

/* MOBILE RESPONSIVENESS */
@media(max-width: 850px) {
  .main { grid-template-columns: 1fr; }
  .list { max-height: 250px; }
  .bill-header-fields { grid-template-columns: 1fr; }
  .summary-bar { grid-template-columns: 1fr; }
  .buttons { grid-template-columns: 1fr 1fr; }
}
</style>
</head>

<body>

<div class="container">
  <h1>Modify / Delete Sale Entry</h1>

  <div class="search-box">
    <input id="searchInput" placeholder="Search Bill No or Customer..." oninput="filterBills()">
  </div>

  <div class="main">
    <div class="list">
      <table>
        <thead>
          <tr>
            <th>Bill No</th>
            <th>Customer</th>
            <th>Total</th>
          </tr>
        </thead>
        <tbody id="billListBody"></tbody>
      </table>
    </div>

    <div class="form-panel">
      <div class="bill-header-fields">
        <div class="input-group">
          <label>Bill Number</label>
          <input id="billNo" disabled>
        </div>
        <div class="input-group">
          <label>Bill Date</label>
          <input type="date" id="billDate">
        </div>
        <div class="input-group" style="grid-column: span 1;">
          <label>Customer Name</label>
          <input id="custName">
        </div>
        <div class="input-group">
          <label>Paid Amount (₹)</label>
          <input type="number" id="paidAmt" oninput="calculateTotals()">
        </div>
      </div>

      <div class="items-container">
        <table class="items-table">
          <thead>
            <tr>
              <th width="50">#</th>
              <th>Item Name</th>
              <th width="80">Qty</th>
              <th width="100">Rate</th>
              <th width="80">Disc%</th>
              <th width="120">Net Amt</th>
            </tr>
          </thead>
          <tbody id="itemsTableBody"></tbody>
        </table>
      </div>

      <div class="summary-bar">
        <div class="sum-item"><span>Net Total</span><strong id="dispNet">0.00</strong></div>
        <div class="sum-item"><span>Total Disc</span><strong id="dispDisc">0.00</strong></div>
        <div class="sum-item"><span>Balance</span><strong id="dispBal" style="color:#ff9800;">0.00</strong></div>
      </div>

      <div class="buttons">
        <button class="update" onclick="updateBill()">Update</button>
        <button class="delete" onclick="deleteBill()">Delete</button>
        <button class="reset" onclick="resetForm()">Reset</button>
        <button class="back" onclick="goBack()">Back</button>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { db } from './firebase-config.js';
import { 
    collection, getDocs, doc, updateDoc, deleteDoc, query, orderBy 
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

if(localStorage.getItem("loggedIn") !== "true") window.location.href = "index.html";

let allSales = [];
let selectedDocId = null;

async function loadSales() {
    try {
        const q = query(collection(db, "sales"), orderBy("createdAt", "desc"));
        const snap = await getDocs(q);
        allSales = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        renderList(allSales);
    } catch (e) { console.error("Firebase Error:", e); }
}

function renderList(data) {
    const tbody = document.getElementById("billListBody");
    tbody.innerHTML = data.map(s => `
        <tr onclick="selectBill('${s.id}')" id="row-${s.id}">
            <td>${s.billNo}</td>
            <td>${s.customerName}</td>
            <td>₹${s.summary?.total || 0}</td>
        </tr>
    `).join('');
}

window.filterBills = function() {
    const q = document.getElementById("searchInput").value.toLowerCase();
    const filtered = allSales.filter(s => 
        s.billNo.toLowerCase().includes(q) || 
        s.customerName.toLowerCase().includes(q)
    );
    renderList(filtered);
};

window.selectBill = function(id) {
    const s = allSales.find(x => x.id === id);
    if(!s) return;
    
    selectedDocId = id;
    document.querySelectorAll('tr').forEach(r => r.classList.remove('selected-row'));
    document.getElementById(`row-${id}`).classList.add('selected-row');

    document.getElementById("billNo").value = s.billNo;
    document.getElementById("custName").value = s.customerName;
    document.getElementById("billDate").value = s.date;
    document.getElementById("paidAmt").value = s.summary?.paid || 0;

    const itBody = document.getElementById("itemsTableBody");
    itBody.innerHTML = (s.items || []).map((it, idx) => `
        <tr>
            <td>${idx+1}</td>
            <td><input class="row-input" value="${it.name}" style="text-align:left; width:100%"></td>
            <td><input type="number" class="row-input item-qty" value="${it.qty}" oninput="calculateTotals()"></td>
            <td><input type="number" class="row-input item-rate" value="${it.rate}" oninput="calculateTotals()"></td>
            <td><input type="number" class="row-input item-disc" value="${it.disc || 0}" oninput="calculateTotals()"></td>
            <td><input class="row-input item-net" value="${it.net}" readonly></td>
        </tr>
    `).join('');
    
    calculateTotals();
};

window.calculateTotals = function() {
    let totalNet = 0;
    let totalDiscVal = 0;

    document.querySelectorAll('#itemsTableBody tr').forEach(row => {
        const qty = parseFloat(row.querySelector('.item-qty').value) || 0;
        const rate = parseFloat(row.querySelector('.item-rate').value) || 0;
        const discP = parseFloat(row.querySelector('.item-disc').value) || 0;

        const gross = qty * rate;
        const discVal = gross * (discP / 100);
        const net = gross - discVal;
        
        row.querySelector('.item-net').value = net.toFixed(2);
        totalNet += net;
        totalDiscVal += discVal;
    });

    const paid = parseFloat(document.getElementById("paidAmt").value) || 0;
    document.getElementById("dispNet").innerText = totalNet.toFixed(2);
    document.getElementById("dispDisc").innerText = totalDiscVal.toFixed(2);
    document.getElementById("dispBal").innerText = (totalNet - paid).toFixed(2);
};

window.updateBill = async function() {
    if(!selectedDocId) return alert("Please select a bill first!");

    const updatedItems = [];
    document.querySelectorAll('#itemsTableBody tr').forEach(row => {
        updatedItems.push({
            name: row.cells[1].querySelector('input').value,
            qty: parseFloat(row.querySelector('.item-qty').value),
            rate: parseFloat(row.querySelector('.item-rate').value),
            disc: parseFloat(row.querySelector('.item-disc').value),
            net: parseFloat(row.querySelector('.item-net').value)
        });
    });

    const data = {
        customerName: document.getElementById("custName").value.trim(),
        date: document.getElementById("billDate").value,
        items: updatedItems,
        summary: {
            total: document.getElementById("dispNet").innerText,
            paid: parseFloat(document.getElementById("paidAmt").value),
            balance: document.getElementById("dispBal").innerText
        }
    };

    try {
        await updateDoc(doc(db, "sales", selectedDocId), data);
        alert("Sale Updated Successfully ✅");
        loadSales();
    } catch (e) { alert("Error: " + e.message); }
};

window.deleteBill = async function() {
    if(!selectedDocId || !confirm("Confirm permanent deletion of this bill?")) return;
    try {
        await deleteDoc(doc(db, "sales", selectedDocId));
        alert("Bill Deleted 🗑️");
        resetForm();
    } catch (e) { alert("Error: " + e.message); }
};

window.resetForm = function() { location.reload(); };

window.goBack = function() { window.location.href = "sale-entry.html"; };

loadSales();
</script>
</body>
</html>

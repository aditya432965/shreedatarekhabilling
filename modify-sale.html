<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Modify Sale | Shree Datarekha Enterprises</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }

body {
  min-height: 100vh;
  background: linear-gradient(135deg, #2b000f, #5c0a2e, #8e1446);
  display: flex;
  justify-content: center;
  padding: 10px; 
  color: white;
}

.container {
  width: 100%;
  max-width: 1000px;
  background: rgba(0, 0, 0, .75);
  border-radius: 20px;
  padding: 15px; 
  border: 1px solid rgba(255, 47, 146, 0.2);
}

h1 { text-align: center; margin-bottom: 15px; font-size: 1.3rem; color: #ffb3d9; }

/* SEARCH SECTION */
.search-box { margin-bottom: 15px; }
.search-box input {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
}

/* MAIN LAYOUT */
.main { display: grid; grid-template-columns: 300px 1fr; gap: 15px; }

/* LIST SECTION */
.list {
  border: 1px solid rgba(255, 159, 197, 0.2);
  border-radius: 12px;
  overflow-y: auto;
  max-height: 500px;
  background: rgba(255, 255, 255, 0.05);
}
table { width: 100%; border-collapse: collapse; }
th, td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 13px; text-align: left; }
th { background: #ff2f92; position: sticky; top: 0; }
tr:hover { background: rgba(255, 255, 255, 0.1); cursor: pointer; }
.selected-row { background: rgba(255, 47, 146, 0.4) !important; border-left: 4px solid #ff2f92; }

/* FORM SECTION */
.form-panel { display: flex; flex-direction: column; gap: 15px; }

.header-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  background: rgba(255,255,255,0.05);
  padding: 12px;
  border-radius: 12px;
}
.input-group { display: flex; flex-direction: column; gap: 4px; }
label { font-size: 11px; color: #ffb3d9; font-weight: bold; }
input { padding: 10px; border-radius: 8px; border: none; font-size: 14px; width: 100%; }
input:disabled { background: #888; color: #222; }

/* ITEMS SECTION - MOBILE FRIENDLY CARDS */
.items-container { display: flex; flex-direction: column; gap: 10px; }

/* Item Card Style (Mobile) / Row Style (Desktop) */
.item-card {
  background: rgba(255,255,255,0.07);
  padding: 12px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.1);
  display: grid;
  grid-template-columns: 1fr 1fr 1fr; /* 3 columns for numeric inputs */
  gap: 8px;
}
.item-card .name-box { grid-column: span 3; }
.item-card input { background: #eee; color: #333; padding: 8px; }

/* SUMMARY SECTION */
.summary-bar {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  background: rgba(255, 47, 146, 0.15);
  padding: 12px;
  border-radius: 12px;
  text-align: center;
}
.summary-bar div span { display: block; font-size: 10px; color: #ffb3d9; }
.summary-bar div strong { font-size: 14px; color: #00ff88; }

/* BUTTONS */
.buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
button {
  padding: 12px;
  border-radius: 10px;
  border: none;
  font-weight: bold;
  color: white;
  cursor: pointer;
  font-size: 13px;
}
.update { background: #4CAF50; }
.delete { background: #d32f2f; }
.reset { background: #777; }
.back { background: #444; }

/* RESPONSIVE FIXES */
@media (max-width: 800px) {
  .main { grid-template-columns: 1fr; }
  .list { max-height: 180px; }
  .header-grid { grid-template-columns: 1fr; }
}
</style>
</head>

<body>

<div class="container">
  <h1>Modify Sale Entry</h1>

  <div class="search-box">
    <input id="searchInput" placeholder="Search Bill No or Name..." oninput="filterBills()">
  </div>

  <div class="main">
    <div class="list">
      <table>
        <thead>
          <tr>
            <th>Bill</th>
            <th>Customer</th>
            <th>Total</th>
          </tr>
        </thead>
        <tbody id="billListBody"></tbody>
      </table>
    </div>

    <div class="form-panel">
      <div class="header-grid">
        <div class="input-group">
          <label>Bill No</label>
          <input id="billNo" disabled>
        </div>
        <div class="input-group">
          <label>Date</label>
          <input type="date" id="billDate">
        </div>
        <div class="input-group" style="grid-column: span 2;">
          <label>Customer Name</label>
          <input id="custName">
        </div>
        <div class="input-group" style="grid-column: span 2;">
          <label>Paid Amount</label>
          <input type="number" id="paidAmt" oninput="calculateTotals()">
        </div>
      </div>

      <label style="margin-left:5px">Items List</label>
      <div id="itemsContainer" class="items-container">
        </div>

      <div class="summary-bar">
        <div><span>Net Total</span><strong id="dispNet">0.00</strong></div>
        <div><span>Disc</span><strong id="dispDisc">0.00</strong></div>
        <div><span>Balance</span><strong id="dispBal">0.00</strong></div>
      </div>

      <div class="buttons">
        <button class="update" onclick="updateBill()">Update Bill</button>
        <button class="delete" onclick="deleteBill()">Delete Bill</button>
        <button class="reset" onclick="resetForm()">Reset</button>
        <button class="back" onclick="goBack()">Back</button>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { db } from './firebase-config.js';
import { 
    collection, getDocs, doc, updateDoc, deleteDoc, query, orderBy 
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

if(localStorage.getItem("loggedIn") !== "true") window.location.href = "index.html";

let allSales = [];
let selectedDocId = null;

async function loadSales() {
    try {
        const q = query(collection(db, "sales"), orderBy("createdAt", "desc"));
        const snap = await getDocs(q);
        allSales = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        renderList(allSales);
    } catch (e) { console.error(e); }
}

function renderList(data) {
    const tbody = document.getElementById("billListBody");
    tbody.innerHTML = data.map(s => `
        <tr onclick="selectBill('${s.id}')" id="row-${s.id}">
            <td>${s.billNo}</td>
            <td>${s.customerName}</td>
            <td>${s.summary?.total || 0}</td>
        </tr>
    `).join('');
}

window.filterBills = function() {
    const q = document.getElementById("searchInput").value.toLowerCase();
    const filtered = allSales.filter(s => 
        s.billNo.toLowerCase().includes(q) || s.customerName.toLowerCase().includes(q)
    );
    renderList(filtered);
};

window.selectBill = function(id) {
    const s = allSales.find(x => x.id === id);
    if(!s) return;
    selectedDocId = id;
    
    document.querySelectorAll('tr').forEach(r => r.classList.remove('selected-row'));
    document.getElementById(`row-${id}`).classList.add('selected-row');

    document.getElementById("billNo").value = s.billNo;
    document.getElementById("custName").value = s.customerName;
    document.getElementById("billDate").value = s.date;
    document.getElementById("paidAmt").value = s.summary?.paid || 0;

    const container = document.getElementById("itemsContainer");
    container.innerHTML = (s.items || []).map((it, idx) => `
        <div class="item-card">
            <div class="name-box">
                <label>Item Name</label>
                <input class="it-name" value="${it.name}">
            </div>
            <div>
                <label>Qty</label>
                <input type="number" class="it-qty" value="${it.qty}" oninput="calculateTotals()">
            </div>
            <div>
                <label>Rate</label>
                <input type="number" class="it-rate" value="${it.rate}" oninput="calculateTotals()">
            </div>
            <div>
                <label>Net</label>
                <input class="it-net" value="${it.net}" readonly>
            </div>
            <input type="hidden" class="it-disc" value="${it.disc || 0}">
        </div>
    `).join('');
    
    calculateTotals();
};

window.calculateTotals = function() {
    let totalNet = 0;
    document.querySelectorAll('.item-card').forEach(card => {
        const qty = parseFloat(card.querySelector('.it-qty').value) || 0;
        const rate = parseFloat(card.querySelector('.it-rate').value) || 0;
        const net = qty * rate;
        card.querySelector('.it-net').value = net.toFixed(2);
        totalNet += net;
    });

    const paid = parseFloat(document.getElementById("paidAmt").value) || 0;
    document.getElementById("dispNet").innerText = totalNet.toFixed(2);
    document.getElementById("dispBal").innerText = (totalNet - paid).toFixed(2);
};

window.updateBill = async function() {
    if(!selectedDocId) return alert("Select a bill!");
    
    const items = [];
    document.querySelectorAll('.item-card').forEach(card => {
        items.push({
            name: card.querySelector('.it-name').value,
            qty: parseFloat(card.querySelector('.it-qty').value),
            rate: parseFloat(card.querySelector('.it-rate').value),
            net: parseFloat(card.querySelector('.it-net').value),
            disc: parseFloat(card.querySelector('.it-disc').value)
        });
    });

    const data = {
        customerName: document.getElementById("custName").value,
        date: document.getElementById("billDate").value,
        items: items,
        summary: {
            total: document.getElementById("dispNet").innerText,
            paid: parseFloat(document.getElementById("paidAmt").value),
            balance: document.getElementById("dispBal").innerText
        }
    };

    try {
        await updateDoc(doc(db, "sales", selectedDocId), data);
        alert("Updated!");
        loadSales();
    } catch (e) { alert(e.message); }
};

window.deleteBill = async function() {
    if(!selectedDocId || !confirm("Delete this?")) return;
    await deleteDoc(doc(db, "sales", selectedDocId));
    location.reload();
};

window.resetForm = () => location.reload();
window.goBack = () => window.location.href = "sale-entry.html";

loadSales();
</script>
</body>
</html>

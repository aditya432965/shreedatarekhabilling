<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sale Register Details | Shree Datarekha Enterprises</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #0b0f19; color: #fff; padding: 20px; min-height: 100vh; }
        
        .container { max-width: 900px; margin: auto; background: #1e293b; border-radius: 15px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .title { text-align: center; color: #007ea7; margin-bottom: 20px; font-size: 24px; font-weight: bold; border-bottom: 2px solid #334155; padding-bottom: 10px; }
        
        .controls { background: rgba(0,0,0,0.2); padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .date-row { display: flex; gap: 15px; justify-content: center; margin-bottom: 20px; }
        .date-row div { flex: 1; }
        
        label { display: block; font-size: 12px; color: #a0d8ef; margin-bottom: 5px; }
        input[type="date"] { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #334155; background: #0b0f19; color: white; }

        .grid-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        button { padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; background: #334155; transition: 0.2s; }
        .primary-btn { background: #007ea7; grid-column: span 2; font-size: 15px; margin-bottom: 5px; }
        button:hover { filter: brightness(1.2); }

        #loading { text-align: center; color: #10b981; margin-top: 15px; display: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="title">Shree Datarekha Enterprises</div>
    
    <div class="controls">
        <div class="date-row">
            <div>
                <label>From Date</label>
                <input type="date" id="fromDate">
            </div>
            <div>
                <label>To Date</label>
                <input type="date" id="toDate">
            </div>
        </div>

        <div class="grid-buttons">
            <button class="primary-btn" onclick="generateReport('DETAILS')">SHOW GST SALE REGISTER DETAILS</button>
            <button onclick="generateReport('SUMMARY')">SHOW GST SALE REGISTER SUMMARY</button>
            <button onclick="alert('Feature coming soon')">COMPANY BRAND SALE REGISTER</button>
            <button onclick="alert('Feature coming soon')">SHOW CA GST SALE REGISTER</button>
            <button onclick="alert('Feature coming soon')">SHOW BILL SHORT SUMMARY</button>
        </div>
    </div>
    
    <div id="loading">Generating Report... Please wait.</div>
</div>

<script type="module">
    import { db } from './firebase-config.js';
    import { collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    window.generateReport = async function(type) {
        const from = document.getElementById('fromDate').value;
        const to = document.getElementById('toDate').value;

        if (!from || !to) return alert("Please select date range!");

        document.getElementById('loading').style.display = "block";

        try {
            // Fetch sales from Firestore
            const q = query(collection(db, "sales"), orderBy("date", "asc"));
            const snap = await getDocs(q);
            
            const filteredSales = [];
            snap.forEach(doc => {
                const data = doc.data();
                if (data.date >= from && data.date <= to) {
                    filteredSales.push(data);
                }
            });

            if (filteredSales.length === 0) {
                alert("No records found for these dates.");
                document.getElementById('loading').style.display = "none";
                return;
            }

            createPDF(filteredSales, from, to);
        } catch (e) {
            console.error(e);
            alert("Error: " + e.message);
        }
        document.getElementById('loading').style.display = "none";
    };

    function createPDF(sales, from, to) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('l', 'mm', 'a4'); // Landscape for many columns
        const pageWidth = doc.internal.pageSize.getWidth();
        const reportDate = new Date().toLocaleDateString('en-GB');

        // Formatted Dates for Header
        const fFrom = from.split('-').reverse().join('-');
        const fTo = to.split('-').reverse().join('-');

        let tableData = [];

        sales.forEach(sale => {
            // Party/Bill Header Row (Mimics the photo)
            tableData.push([
                { content: `${sale.billNo}`, styles: { fontStyle: 'bold' } },
                { content: `${sale.customerName}`, colSpan: 11, styles: { fontStyle: 'bold' } }
            ]);

            let bQty = 0, bGst = 0, bNet = 0;

            sale.items.forEach(item => {
                const qty = parseFloat(item.qty) || 0;
                const rate = parseFloat(item.rate) || 0;
                const gstP = parseFloat(item.gst) || 0;
                const net = parseFloat(item.net) || 0;
                
                // Calculate individual GST Amt for the report
                const taxable = (rate * qty);
                const gstAmt = (taxable * (gstP/100)).toFixed(2);

                bQty += qty;
                bGst += parseFloat(gstAmt);
                bNet += net;

                tableData.push([
                    "", // Empty Bill No column for items
                    sale.date.split('-').reverse().join('-'), // DD-MM-YYYY
                    "", // Empty Party Name for items
                    item.name,
                    "Main Pkt", // Group placeholder
                    item.mrp || 0,
                    rate.toFixed(2),
                    qty,
                    "0", // Free Qty placeholder
                    item.schm || 0,
                    gstP,
                    gstAmt,
                    net.toFixed(2)
                ]);
            });

            // Bill Sub Total Row (Exactly like the photo)
            tableData.push([
                { content: "Bill Sub Total  ===>", colSpan: 7, styles: { halign: 'right', fontStyle: 'bold' } },
                { content: bQty, styles: { fontStyle: 'bold' } },
                { content: "0", styles: { fontStyle: 'bold' } },
                { content: sale.summary.disc || 0, styles: { fontStyle: 'bold' } },
                { content: "", styles: { fontStyle: 'bold' } },
                { content: bGst.toFixed(2), styles: { fontStyle: 'bold' } },
                { content: bNet.toFixed(0), styles: { fontStyle: 'bold' } }
            ]);
        });

        doc.autoTable({
            head: [['Bill No', 'Date', 'Party Name', 'Item Name', 'Grp Name', 'MRP', 'Rate', 'Qty', 'Free Qty', 'Disc Amount', 'GST %', 'GST Amt', 'Net Amount']],
            body: tableData,
            startY: 40,
            theme: 'plain',
            styles: { fontSize: 7, cellPadding: 1, textColor: [0, 0, 0], lineWidth: 0.1, lineColor: [200, 200, 200] },
            headStyles: { fillColor: [255, 255, 255], textColor: [0, 0, 0], fontStyle: 'bold', borderBottom: 1 },
            margin: { top: 40 },
            didDrawPage: function (data) {
                // Main Header
                doc.setFontSize(14);
                doc.setFont("helvetica", "bold");
                doc.text("SHREE DATAREKHA ENTERPRISES", pageWidth / 2, 10, { align: "center" });
                
                doc.setFontSize(9);
                doc.text("GST Sale Register", pageWidth / 2, 16, { align: "center" });
                
                doc.setFontSize(10);
                doc.text("Gurukrupa Corner", pageWidth / 2, 22, { align: "center" });

                doc.setFontSize(9);
                doc.setFont("helvetica", "normal");
                doc.text(`${reportDate}`, 15, 10);
                doc.text(`From Date:  ${fFrom}  To  ${fTo}`, 15, 28);
                
                // Page Numbering
                let str = "Page " + doc.internal.getNumberOfPages();
                doc.text(str, pageWidth - 30, 28);
            }
        });

        doc.save(`Sale_Register_${from}.pdf`);
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Distributor Sale Register | Shree Datarekha Enterprises</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    :root {
        --primary: #007ea7;
        --secondary: #003459;
        --accent: #10b981;
        --danger: #ef4444;
        --bg: #f0f4f8;
        --card-bg: #ffffff;
        --text: #1e293b;
    }

    * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', 'Segoe UI', sans-serif; }
    body { background: var(--bg); color: var(--text); padding: 15px; line-height: 1.6; }

    /* Header Styling */
    .header { 
        background: linear-gradient(135deg, var(--secondary), var(--primary)); 
        color: white; padding: 25px; border-radius: 15px; margin-bottom: 20px;
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    }
    .header h1 { font-size: 1.5rem; letter-spacing: 1px; }
    .header p { opacity: 0.8; font-size: 0.9rem; }

    /* Controls & Filters */
    .filter-card { 
        background: var(--card-bg); padding: 20px; border-radius: 12px; 
        margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        display: flex; flex-wrap: wrap; gap: 15px; align-items: flex-end;
    }
    .input-group { flex: 1; min-width: 200px; display: flex; flex-direction: column; gap: 5px; }
    .input-group label { font-size: 0.75rem; font-weight: 700; color: #64748b; text-transform: uppercase; }
    input { 
        padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; 
        outline: none; transition: border-color 0.2s; font-size: 0.9rem;
    }
    input:focus { border-color: var(--primary); ring: 2px solid var(--primary); }

    /* Stats Dashboard */
    .stats-container { 
        display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); 
        gap: 15px; margin-bottom: 20px; 
    }
    .stat-box { 
        background: var(--card-bg); padding: 15px; border-radius: 12px; 
        text-align: center; border-bottom: 4px solid var(--primary);
    }
    .stat-box span { display: block; font-size: 0.7rem; color: #64748b; font-weight: bold; text-transform: uppercase; }
    .stat-box strong { font-size: 1.1rem; color: var(--text); }

    /* Responsive Table/Cards */
    .table-container { background: var(--card-bg); border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    table { width: 100%; border-collapse: collapse; }
    th { background: #f8fafc; padding: 15px; text-align: left; font-size: 0.75rem; color: #64748b; border-bottom: 2px solid #e2e8f0; }
    td { padding: 12px 15px; border-bottom: 1px solid #f1f5f9; font-size: 0.85rem; }

    .btn-action {
        background: var(--accent); color: white; border: none; padding: 10px 20px; 
        border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px;
    }

    /* Mobile View Transformation */
    @media (max-width: 768px) {
        table, thead, tbody, th, td, tr { display: block; }
        thead { display: none; } /* Hide headers on mobile */
        tr { margin-bottom: 15px; border: 1px solid #e2e8f0; border-radius: 12px; padding: 10px; background: white; }
        td { display: flex; justify-content: space-between; padding: 8px 5px; border: none; border-bottom: 1px dashed #f1f5f9; }
        td::before { content: attr(data-label); font-weight: bold; color: #64748b; }
        td:last-child { border-bottom: none; background: #f8fafc; margin-top: 5px; border-radius: 5px; }
    }

    @media print {
        .filter-card, .btn-action { display: none; }
        body { background: white; padding: 0; }
        .header { background: white; color: black; border: 1px solid #eee; box-shadow: none; }
    }
</style>
</head>
<body>

<div class="header">
    <h1>Shree Datarekha Enterprises</h1>
    <p>Detailed Sales Ledger & GST Breakdown</p>
</div>

<div class="filter-card">
    <div class="input-group">
        <label>Search Customer/Bill</label>
        <input type="text" id="search" placeholder="Type name..." oninput="generateReport()">
    </div>
    <div class="input-group">
        <label>From Date</label>
        <input type="date" id="fromDate" onchange="generateReport()">
    </div>
    <div class="input-group">
        <label>To Date</label>
        <input type="date" id="toDate" onchange="generateReport()">
    </div>
    <button class="btn-action" onclick="window.print()" style="flex: 0; min-width: 120px;">Print PDF</button>
</div>

<div class="stats-container">
    <div class="stat-box"><span>Taxable</span><strong id="statTaxable">₹0</strong></div>
    <div class="stat-box"><span>GST Total</span><strong id="statGST">₹0</strong></div>
    <div class="stat-box"><span>Net Sales</span><strong id="statNet" style="color: var(--primary);">₹0</strong></div>
</div>

<div class="table-container">
    <table>
        <thead>
            <tr>
                <th>Date/Bill</th>
                <th>Party</th>
                <th>Item</th>
                <th>Qty</th>
                <th>Taxable</th>
                <th>GST</th>
                <th>Total</th>
            </tr>
        </thead>
        <tbody id="reportTableBody">
            </tbody>
    </table>
</div>

<script type="module">
/* 1. FIREBASE IMPORTS */
import { db } from './firebase-config.js';
import { 
    collection, 
    getDocs, 
    query, 
    orderBy 
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

/* 🔐 LOGIN CHECK */
if(localStorage.getItem("loggedIn") !== "true") window.location.href = "index.html";

/* 📦 GLOBAL DATA HOLDER */
let allSalesData = [];

/**
 * ☁️ FETCH DATA FROM CLOUD
 */
async function loadSalesForReport() {
    const body = document.getElementById('reportTableBody');
    body.innerHTML = "<tr><td colspan='7' style='text-align:center;'>Fetching Cloud Records...</td></tr>";

    try {
        const q = query(collection(db, "sales"), orderBy("date", "desc"));
        const querySnapshot = await getDocs(q);
        
        allSalesData = querySnapshot.docs.map(doc => ({
            id: doc.id,
            ...doc.data()
        }));

        console.log("Data loaded for Register:", allSalesData.length);
        generateReport(); // Initial render
    } catch (err) {
        console.error("Report Load Error:", err);
        body.innerHTML = "<tr><td colspan='7' style='color:red;'>Error connecting to Firebase.</td></tr>";
    }
}

/**
 * 📊 GENERATE REPORT & CALCULATE STATS
 */
window.generateReport = function() {
    const search = document.getElementById('search').value.toLowerCase();
    const from = document.getElementById('fromDate').value;
    const to = document.getElementById('toDate').value;
    const body = document.getElementById('reportTableBody');
    
    let sums = { taxable: 0, gst: 0, net: 0 };
    body.innerHTML = "";

    // Filter Logic
    const filteredSales = allSalesData.filter(sale => {
        const matchesDate = (!from || sale.date >= from) && (!to || sale.date <= to);
        const matchesSearch = !search || 
                              sale.customerName.toLowerCase().includes(search) || 
                              sale.billNo.toLowerCase().includes(search);
        return matchesDate && matchesSearch;
    });

    if (filteredSales.length === 0) {
        body.innerHTML = "<tr><td colspan='7' style='text-align:center;'>No records found for selected criteria.</td></tr>";
    }

    filteredSales.forEach(sale => {
        // We iterate through items within each sale to provide a line-by-line register
        sale.items.forEach((item, idx) => {
            const qty = parseFloat(item.qty) || 0;
            const rate = parseFloat(item.rate) || 0;
            const discPer = parseFloat(item.disc) || 0;
            const cgstPer = parseFloat(item.cgst) || 0;
            const sgstPer = parseFloat(item.sgst) || 0;

            // Calculations
            const base = qty * rate;
            const taxable = base - (base * (discPer / 100));
            const gst = taxable * ((cgstPer + sgstPer) / 100);
            const net = taxable + gst;

            // Adding to Dashboard Totals
            sums.taxable += taxable;
            sums.gst += gst;
            sums.net += net;

            const row = document.createElement('tr');
            row.innerHTML = `
                <td data-label="Bill/Date">${idx === 0 ? `<strong>${sale.billNo}</strong><br><small>${sale.date}</small>` : ''}</td>
                <td data-label="Customer">${idx === 0 ? sale.customerName : ''}</td>
                <td data-label="Item">${item.name}</td>
                <td data-label="Qty">${qty}</td>
                <td data-label="Taxable">₹${taxable.toFixed(2)}</td>
                <td data-label="GST">₹${gst.toFixed(2)}</td>
                <td data-label="Total"><strong>₹${net.toFixed(2)}</strong></td>
            `;
            body.appendChild(row);
        });
    });

    // Update Dashboard Stats with Indian Currency Formatting
    const formatCurrency = (val) => "₹" + val.toLocaleString('en-IN', {
        minimumFractionDigits: 2, 
        maximumFractionDigits: 2
    });

    document.getElementById('statTaxable').innerText = formatCurrency(sums.taxable);
    document.getElementById('statGST').innerText = formatCurrency(sums.gst);
    document.getElementById('statNet').innerText = formatCurrency(sums.net);
};

/* 🖨️ PRINT REPORT */
window.printReport = function() {
    window.print();
};

/* 🚀 START */
loadSalesForReport();

</script>
</body>
</html>

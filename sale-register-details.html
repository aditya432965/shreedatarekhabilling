<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sale Register | Shree Datarekha Enterprises</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root { --primary: #007ea7; --bg: #0b0f19; --card: #1e293b; --accent: #10b981; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: #fff; padding: 20px; }
        
        .container { max-width: 1200px; margin: auto; background: var(--card); border-radius: 15px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .title { text-align: center; color: var(--primary); margin-bottom: 20px; font-size: 24px; font-weight: bold; }
        
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; background: rgba(0,0,0,0.2); padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        input[type="date"] { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #334155; background: #0b0f19; color: white; }
        
        .btn-group { grid-column: span 2; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; background: #334155; transition: 0.2s; }
        .btn-view { background: var(--primary); }
        .btn-download { background: var(--accent); display: none; margin-top: 15px; width: 100%; font-size: 16px; }
        button:hover { filter: brightness(1.2); }

        /* Preview Table Styles */
        .preview-section { margin-top: 30px; display: none; }
        .table-wrapper { overflow-x: auto; background: #0f172a; border-radius: 8px; border: 1px solid #334155; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: #1e293b; color: var(--text); padding: 12px; text-align: left; border-bottom: 2px solid var(--primary); }
        td { padding: 10px; border-bottom: 1px solid #334155; }
        .subtotal-row { background: rgba(16, 185, 129, 0.1); font-weight: bold; color: var(--accent); }
        .party-header { background: #2d3748; font-weight: bold; color: #ffb3d9; }
    </style>
</head>
<body>

<div class="container">
    <div class="title">SHREE DATAREKHA ENTERPRISES</div>
    
    <div class="controls">
        <div>
            <label style="font-size:12px; color:#a0d8ef;">From Date</label>
            <input type="date" id="fromDate">
        </div>
        <div>
            <label style="font-size:12px; color:#a0d8ef;">To Date</label>
            <input type="date" id="toDate">
        </div>
        <div class="btn-group">
            <button class="btn-view" onclick="fetchData('DETAILS')">PREVIEW GST DETAILS</button>
            <button class="btn-view" style="background:#5c0a2e" onclick="fetchData('SUMMARY')">PREVIEW GST SUMMARY</button>
        </div>
    </div>

    <div id="previewSection" class="preview-section">
        <h3 id="previewTitle" style="margin-bottom:10px; color:var(--primary);">Data Preview</h3>
        <div class="table-wrapper">
            <table id="previewTable">
                <thead id="tableHead"></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
        <button id="downloadBtn" class="btn-download" onclick="downloadPDF()">⬇ DOWNLOAD AS PDF (A4)</button>
    </div>
</div>

<script type="module">
    import { db } from './firebase-config.js';
    import { collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    let currentData = [];
    let currentMode = ""; // 'DETAILS' or 'SUMMARY'

    window.fetchData = async function(mode) {
        const from = document.getElementById('fromDate').value;
        const to = document.getElementById('toDate').value;
        if (!from || !to) return alert("Please select date range");

        currentMode = mode;
        const snap = await getDocs(query(collection(db, "sales"), orderBy("date", "asc")));
        currentData = [];
        
        snap.forEach(doc => {
            const data = doc.data();
            if (data.date >= from && data.date <= to) currentData.push(data);
        });

        if (currentData.length === 0) return alert("No records found");

        renderPreview(mode);
    };

    function renderPreview(mode) {
        const head = document.getElementById('tableHead');
        const body = document.getElementById('tableBody');
        const section = document.getElementById('previewSection');
        const downloadBtn = document.getElementById('downloadBtn');

        body.innerHTML = "";
        section.style.display = "block";
        downloadBtn.style.display = "block";

        if (mode === 'DETAILS') {
            head.innerHTML = `<tr><th>Bill No</th><th>Date</th><th>Item Name</th><th>MRP</th><th>Rate</th><th>Qty</th><th>Disc</th><th>GST</th><th>Net</th></tr>`;
            currentData.forEach(sale => {
                body.innerHTML += `<tr class="party-header"><td colspan="9">${sale.billNo} - ${sale.customerName}</td></tr>`;
                sale.items.forEach(item => {
                    body.innerHTML += `<tr>
                        <td></td><td>${sale.date}</td><td>${item.name}</td><td>${item.mrp}</td>
                        <td>${item.rate}</td><td>${item.qty}</td><td>${item.schm}</td><td>${item.gst}%</td><td>${item.net}</td>
                    </tr>`;
                });
                body.innerHTML += `<tr class="subtotal-row"><td colspan="7" align="right">Bill Total:</td><td colspan="2">₹ ${sale.summary.net}</td></tr>`;
            });
        } else {
            head.innerHTML = `<tr><th>Bill No</th><th>Date</th><th>Customer</th><th>Gross</th><th>Disc</th><th>GST</th><th>Net Amount</th></tr>`;
            currentData.forEach(sale => {
                body.innerHTML += `<tr>
                    <td>${sale.billNo}</td><td>${sale.date}</td><td>${sale.customerName}</td>
                    <td>${sale.summary.gross}</td><td>${sale.summary.disc}</td><td>${sale.summary.gst}</td><td>${sale.summary.net}</td>
                </tr>`;
            });
        }
    }

    window.downloadPDF = function() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF(currentMode === 'DETAILS' ? 'l' : 'p', 'mm', 'a4');
        const pageWidth = doc.internal.pageSize.getWidth();
        const from = document.getElementById('fromDate').value;
        const to = document.getElementById('toDate').value;

        let tableContent = [];
        if(currentMode === 'DETAILS') {
            currentData.forEach(sale => {
                tableContent.push([{ content: `${sale.billNo} - ${sale.customerName}`, colSpan: 10, styles: { fontStyle: 'bold', fillColor: [240, 240, 240] } }]);
                sale.items.forEach(item => {
                    tableContent.push(["", sale.date, item.name, "Main Pkt", item.mrp, item.rate, item.qty, item.schm, item.gst, item.net]);
                });
            });
        } else {
            currentData.forEach(sale => {
                tableContent.push([sale.billNo, sale.date, sale.customerName, sale.summary.gross, sale.summary.disc, sale.summary.gst, sale.summary.net]);
            });
        }

        doc.autoTable({
            head: currentMode === 'DETAILS' ? 
                [['Bill', 'Date', 'Item', 'Grp', 'MRP', 'Rate', 'Qty', 'Disc', 'GST', 'Net']] : 
                [['Bill No', 'Date', 'Customer', 'Gross', 'Disc', 'GST', 'Net Amount']],
            body: tableContent,
            startY: 35,
            theme: 'grid',
            styles: { fontSize: 8 },
            didDrawPage: (data) => {
                doc.setFontSize(14).text("SHREE DATAREKHA ENTERPRISES", pageWidth/2, 15, {align:'center'});
                doc.setFontSize(10).text(`GST Sale Register ${currentMode} (${from} to ${to})`, pageWidth/2, 22, {align:'center'});
            }
        });

        doc.save(`Sale_Register_${currentMode}_${from}.pdf`);
    };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sale Register Details | Shree Datarekha Enterprises</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #2b000f, #5c0a2e, #8e1446); color: #fff; padding: 20px; min-height: 100vh; }
        
        .container { max-width: 1000px; margin: auto; background: rgba(0, 0, 0, 0.85); border-radius: 20px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .header-title { text-align: center; color: #ffb3d9; margin-bottom: 25px; font-size: 28px; font-weight: bold; border-bottom: 2px solid #ff2f92; padding-bottom: 10px; }
        
        .control-panel { display: flex; flex-direction: column; gap: 20px; }
        .date-section { display: flex; gap: 15px; justify-content: center; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 12px; }
        .date-section div { display: flex; flex-direction: column; gap: 5px; }
        input[type="date"] { padding: 10px; border-radius: 6px; border: none; background: #eee; color: #333; font-weight: bold; }

        .button-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        button { padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; color: white; text-transform: uppercase; font-size: 13px; }
        
        .btn-main { background: #ff2f92; grid-column: span 2; font-size: 16px; }
        .btn-sub { background: #5c0a2e; border: 1px solid #ff2f92; }
        button:hover { opacity: 0.8; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255,47,146,0.4); }

        #statusMsg { text-align: center; margin-top: 20px; color: #00ff88; font-weight: bold; display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-title">Shree Datarekha Enterprises</div>
    
    <div class="control-panel">
        <div class="date-section">
            <div>
                <label>From Date:</label>
                <input type="date" id="fromDate">
            </div>
            <div>
                <label>To Date:</label>
                <input type="date" id="toDate">
            </div>
        </div>

        <div class="button-grid">
            <button class="btn-main" onclick="generateGSTRegister()">Show GST Sale Register Details (PDF)</button>
            <button class="btn-sub">Show GST Sale Register Summary</button>
            <button class="btn-sub">Company Brand Sale Register Details</button>
            <button class="btn-sub">Show CA GST Sale Register Details</button>
            <button class="btn-sub">Show Bill Short Summary</button>
        </div>
    </div>
    <div id="statusMsg">Processing Data... Please wait.</div>
</div>

<script type="module">
    import { db } from './firebase-config.js';
    import { collection, getDocs, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    window.generateGSTRegister = async function() {
        const fromDate = document.getElementById('fromDate').value;
        const toDate = document.getElementById('toDate').value;

        if (!fromDate || !toDate) {
            alert("Please select both From and To dates.");
            return;
        }

        const status = document.getElementById('statusMsg');
        status.style.display = "block";

        try {
            // 1. Fetch Sales Data
            const q = query(collection(db, "sales"), orderBy("header.date", "asc"));
            const querySnapshot = await getDocs(q);
            
            let allSales = [];
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                const saleDate = data.header.date; // Format YYYY-MM-DD
                if (saleDate >= fromDate && saleDate <= toDate) {
                    allSales.push(data);
                }
            });

            if (allSales.length === 0) {
                alert("No sales found for the selected period.");
                status.style.display = "none";
                return;
            }

            // 2. Initialize PDF (A4 Landscape for better columns fit)
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'mm', 'a4');
            const pageWidth = doc.internal.pageSize.getWidth();
            const today = new Date().toLocaleDateString('en-GB');

            // 3. Process Data for Table
            // Grouping logic: We iterate and build the rows with sub-headers for Party
            let tableRows = [];
            let currentParty = "";

            allSales.forEach(sale => {
                // Add Party Header Row if party changes
                if (currentParty !== sale.header.partyName) {
                    currentParty = sale.header.partyName;
                    tableRows.push([
                        { content: `Party: ${currentParty}`, colSpan: 12, styles: { fillColor: [230, 230, 230], fontStyle: 'bold' } }
                    ]);
                }

                sale.items.forEach(item => {
                    const gstAmt = (parseFloat(item.net) * parseFloat(item.taxP || 0) / 100).toFixed(2);
                    tableRows.push([
                        sale.header.billNo,
                        sale.header.date,
                        sale.header.partyName,
                        item.name,
                        item.group || '-',
                        item.mrp || 0,
                        item.rate,
                        item.qty,
                        item.freeQty || 0,
                        item.discAmt || 0,
                        `${item.taxP}% (${gstAmt})`,
                        item.net
                    ]);
                });

                // Bill Subtotal Row
                tableRows.push([
                    { content: `Bill Sub Total for ${sale.header.billNo}:`, colSpan: 11, styles: { halign: 'right', fontStyle: 'bold' } },
                    { content: sale.summary.grandTotal, styles: { fontStyle: 'bold' } }
                ]);
            });

            // 4. Create Table with AutoTable
            doc.autoTable({
                head: [['Bill No', 'Date', 'Party', 'Item Name', 'Group', 'MRP', 'Rate', 'Qty', 'Free', 'Disc', 'GST', 'Net Amt']],
                body: tableRows,
                startY: 45,
                theme: 'grid',
                styles: { fontSize: 7, cellPadding: 2 },
                headStyles: { fillColor: [255, 47, 146] },
                margin: { top: 45 },
                didDrawPage: function (data) {
                    // Header on every page
                    doc.setFontSize(16);
                    doc.setTextColor(0, 0, 0);
                    doc.text("Shree Datarekha Enterprises", pageWidth / 2, 15, { align: 'center' });
                    
                    doc.setFontSize(10);
                    doc.text(`Date: ${today}`, 14, 22);
                    
                    doc.setFontSize(12);
                    doc.text("[ GST SALE REGISTER ]", pageWidth / 2, 28, { align: 'center' });
                    
                    doc.setFontSize(10);
                    const dateRange = `From: ${fromDate} To: ${toDate}`;
                    doc.text(dateRange, pageWidth / 2, 34, { align: 'center' });
                    
                    // Shop Name (Taking first shop from first sale)
                    const shopName = allSales[0].header.shopName || "Main Shop";
                    doc.text(`Shop: ${shopName}`, pageWidth / 2, 40, { align: 'center' });

                    // Page Numbers
                    const str = "Page " + doc.internal.getNumberOfPages();
                    doc.text(str, pageWidth - 25, 40);
                }
            });

            doc.save(`GST_Sale_Register_${fromDate}_to_${toDate}.pdf`);
            status.style.display = "none";

        } catch (error) {
            console.error(error);
            alert("Error generating PDF. Check console.");
            status.style.display = "none";
        }
    };
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GST Sale Register | Shree Datarekha Enterprises</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root { --primary: #334155; --bg: #f1f5f9; --border: #94a3b8; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', Courier, monospace; }
        body { background: var(--bg); padding: 20px; }
        
        .control-panel { 
            background: #cbd5e1; 
            padding: 15px; 
            border: 2px solid #64748b;
            border-radius: 4px;
            max-width: 1150px;
            margin: 0 auto 20px auto;
        }

        .row { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
        .date-input { padding: 5px; border: 1px solid var(--border); font-size: 14px; }
        
        .btn { 
            padding: 8px 16px; 
            background: #e2e8f0; 
            border: 2px outset #fff; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 13px;
            color: #000;
            box-shadow: 2px 2px 0px #475569;
        }
        .btn:active { border-style: inset; box-shadow: none; transform: translate(1px, 1px); }
        .btn-pdf { background: #059669 !important; color: white !important; display: none; }
        .btn-excel { background: #1d4ed8 !important; color: white !important; display: none; margin-left: 10px; }

        #reportPreview {
            background: white;
            padding: 15mm;
            width: 210mm;
            min-height: 297mm;
            margin: 20px auto;
            border: 1px solid #000;
            display: none;
            color: #000;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .report-header { text-align: center; margin-bottom: 10px; border-bottom: 2px solid #000; padding-bottom: 5px; }
        .info-line { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 5px; font-weight: bold; }

        .report-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 10px; }
        
        .report-table th { 
            border-top: 1px solid #000; 
            border-bottom: 1px solid #000; 
            padding: 8px 4px; 
            font-weight: bold; 
            background: #fff;
        }
        
        .report-table td { padding: 6px 4px; vertical-align: top; border: none; }
        
        .party-name-row td { border-top: 1px solid #000 !important; padding-top: 8px; font-weight: bold; }
        .subtotal-row td { border-bottom: 1px solid #000 !important; padding-bottom: 8px; font-weight: bold; }
        .total-footer td { border-top: 1px solid #000 !important; border-bottom: 1px solid #000 !important; padding: 10px 4px; font-size: 14px; font-weight: bold !important; }
        
        .brand-header { font-weight: bold; text-decoration: underline; font-size: 14px; }

        /* --- PRINT SETTINGS TO REMOVE HTTP URL AND DATE --- */
        @media print {
            @page {
                margin: 0; /* Hides Browser Header/Footer (URL & Date) */
            }
            body {
                margin: 1.5cm; /* Adds space back so content isn't at the very edge */
                background: white;
            }
            .control-panel { display: none !important; }
            #reportPreview { 
                border: none; 
                width: 100%; 
                padding: 0; 
                margin: 0; 
                display: block !important; 
                box-shadow: none;
            }
        }
    </style>
</head>
<body>

<div class="control-panel">
    <div class="row">
        <label>Date From</label>
        <input type="date" id="fromDate" class="date-input">
        <label>To Date</label>
        <input type="date" id="toDate" class="date-input">
        
        <button class="btn" onclick="fetchAndRender('DETAILS')">Show GST Sale Register Details</button>
        <button class="btn" onclick="fetchAndRender('SUMMARY')">Show GST Sale Reg. Summary</button>
    </div>
    
    <div class="row">
        <button class="btn" onclick="fetchAndRender('BRAND_DETAILS')">Company Brand Sale Register Details</button>
        <button class="btn" onclick="fetchAndRender('CA_DETAILS')">Show CA GST Sale Register Details</button>
        <button id="pdfBtn" class="btn btn-pdf" onclick="window.downloadPDF()">Download PDF</button>
        <button id="excelBtn" class="btn btn-excel" onclick="window.downloadExcel()">Download Excel</button>
        <button class="btn" onclick="location.href='index.html'">Exit</button>
    </div>
</div>

<div id="reportPreview">
    <div class="report-header">
        <div class="info-line">
            <span id="pPrintDate"></span>
            <strong style="font-size: 18px; font-weight: 900;">SHREE DATAREKHA ENTERPRISES</strong>
            <span id="pPageCount">Page 1 of 1</span>
        </div>
        <p id="reportTitle" style="font-size: 15px; font-weight: 900; text-transform: uppercase; margin-top: 5px;">GST Sale Register</p>
        <div class="info-line">
            <span id="pDateRange"></span>
        </div>
    </div>

    <table class="report-table" id="dataTable">
        <thead id="tableHead"></thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script type="module">
    import { db } from './firebase-config.js';
    import { collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    let activeReportType = "";
    let fetchedSales = [];

    const formatDate = (dateStr) => {
        if (!dateStr) return "";
        const [y, m, d] = dateStr.split('-');
        return `${d}-${m}-${y}`;
    };

    window.fetchAndRender = async function(mode) {
        const from = document.getElementById('fromDate').value;
        const to = document.getElementById('toDate').value;
        
        if (!from || !to) return alert("Please select date range.");

        activeReportType = mode;
        const q = query(collection(db, "sales"), orderBy("date", "asc"));
        const snapshot = await getDocs(q);
        
        fetchedSales = [];
        snapshot.forEach(doc => {
            const data = doc.data();
            if (data.date >= from && data.date <= to) {
                fetchedSales.push(data);
            }
        });

        fetchedSales.sort((a, b) => String(a.billNo).localeCompare(String(b.billNo), undefined, {numeric: true}));

        if (fetchedSales.length === 0) return alert("No records found.");
        renderUI(from, to);
    };

    function renderUI(from, to) {
        const body = document.getElementById('tableBody');
        const head = document.getElementById('tableHead');
        const preview = document.getElementById('reportPreview');
        const title = document.getElementById('reportTitle');
        
        document.getElementById('pPrintDate').innerText = "Date: " + formatDate(new Date().toISOString().split('T')[0]);
        document.getElementById('pDateRange').innerText = `Period: ${formatDate(from)} To: ${formatDate(to)}`;
        
        preview.style.display = "block";
        document.getElementById('pdfBtn').style.display = "inline-block";
        document.getElementById('excelBtn').style.display = "inline-block";
        body.innerHTML = "";

        if (activeReportType === 'CA_DETAILS') {
            title.innerText = "CA GST Sale Register Details";
            head.innerHTML = `<tr>
                <th style="width: 10%; text-align: center;">Date</th>
                <th style="width: 10%; text-align: center;">Bill No</th>
                <th style="width: 25%; text-align: left;">Party Name</th>
                <th style="width: 15%; text-align: center;">GSTIN</th>
                <th style="text-align: right; width: 12%;">Taxable Value</th>
                <th style="text-align: center; width: 8%;">GST %</th>
                <th style="text-align: right; width: 10%;">Tax Amt</th>
                <th style="text-align: right; width: 10%;">Net Amt</th>
            </tr>`;

            let grandTaxable = 0, grandGst = 0, grandNet = 0;

            fetchedSales.forEach(sale => {
                let totalTaxable = 0, totalGst = 0;
                let gstBreakdown = {};

                body.innerHTML += `<tr class="party-name-row">
                    <td style="text-align: center;">${formatDate(sale.date)}</td>
                    <td style="text-align: center;">${sale.billNo}</td>
                    <td style="text-align: left;">${sale.customerName}</td>
                    <td style="text-align: center;">${sale.gstin || sale.gstNo || sale.customerGst || 'URD'}</td>
                    <td colspan="4"></td>
                </tr>`;

                sale.items.forEach(item => {
                    const taxable = Number(item.net) - (Number(item.gstAmt) || 0);
                    const gstAmt = Number(item.gstAmt) || 0;
                    const gstRate = parseFloat(item.gst) || 0;
                    totalTaxable += taxable;
                    totalGst += gstAmt;
                    if (!gstBreakdown[gstRate]) gstBreakdown[gstRate] = 0;
                    gstBreakdown[gstRate] += gstAmt;

                    body.innerHTML += `<tr>
                        <td colspan="4"></td>
                        <td style="text-align: right">${taxable.toFixed(2)}</td>
                        <td style="text-align: center">${item.gst}%</td>
                        <td style="text-align: right">${gstAmt.toFixed(2)}</td>
                        <td style="text-align: right">${Number(item.net).toFixed(2)}</td>
                    </tr>`;
                });

                grandTaxable += totalTaxable; grandGst += totalGst; grandNet += Number(sale.summary.net);

                let breakdownArr = [];
                Object.keys(gstBreakdown).sort((a,b) => a - b).forEach(rate => {
                    if (gstBreakdown[rate] > 0) breakdownArr.push(`${rate}%: ${gstBreakdown[rate].toFixed(2)}`);
                });
                let breakdownStr = breakdownArr.length > 0 ? `<br><small>(${breakdownArr.join(' | ')})</small>` : '';

                body.innerHTML += `<tr class="subtotal-row">
                    <td colspan="4" style="text-align: right;">Bill Total ===></td>
                    <td style="text-align: right"><b>${totalTaxable.toFixed(2)}</b></td>
                    <td colspan="2" style="text-align: right; font-size: 11px;">
                        <b>Total GST: ${totalGst.toFixed(2)}</b>${breakdownStr}
                    </td>
                    <td style="text-align: right"><b>${Number(sale.summary.net).toFixed(2)}</b></td>
                </tr>`;
            });

            body.innerHTML += `<tr class="total-footer">
                <td colspan="4" style="text-align: right;">GRAND TOTAL FOR PERIOD ===></td>
                <td style="text-align: right"><b>${grandTaxable.toFixed(2)}</b></td>
                <td colspan="2" style="text-align: right"><b>${grandGst.toFixed(2)}</b></td>
                <td style="text-align: right"><b>${grandNet.toFixed(2)}</b></td>
            </tr>`;
        } 
        else if (activeReportType === 'DETAILS') {
            title.innerText = "GST Sale Register (Detailed Report)";
            head.innerHTML = `<tr><th>Bill No</th><th>Date</th><th style="text-align: left;">Item Name</th><th>MRP</th><th>Rate</th><th>Qty</th><th>Disc</th><th>GST%</th><th>GST Amt</th><th>Net Amt</th></tr>`;
            let gQ = 0, gD = 0, gG = 0, gN = 0;
            fetchedSales.forEach(sale => {
                body.innerHTML += `<tr class="party-name-row"><td colspan="10" style="text-align: left;"><b>${sale.billNo} | ${sale.customerName}</b></td></tr>`;
                sale.items.forEach(item => {
                    body.innerHTML += `<tr><td></td><td>${formatDate(sale.date)}</td><td style="text-align: left;">${item.name}</td><td>${item.mrp}</td><td>${item.rate}</td><td>${item.qty}</td><td>${item.disc || 0}</td><td>${item.gst}%</td><td>${item.gstAmt || 0}</td><td><b>${item.net}</b></td></tr>`;
                });
                const sQ = sale.items.reduce((acc, i) => acc + Number(i.qty), 0);
                body.innerHTML += `<tr class="subtotal-row"><td colspan="5" align="right">Bill Sub Total ===></td><td><b>${sQ}</b></td><td>${sale.summary.disc}</td><td></td><td>${sale.summary.gst}</td><td><b>${sale.summary.net}</b></td></tr>`;
                gQ += sQ; gD += Number(sale.summary.disc); gG += Number(sale.summary.gst); gN += Number(sale.summary.net);
            });
            body.innerHTML += `<tr class="total-footer"><td colspan="5" align="right">GRAND TOTALS ===></td><td>${gQ}</td><td>${gD.toFixed(2)}</td><td></td><td>${gG.toFixed(2)}</td><td>${gN.toFixed(2)}</td></tr>`;
        }
        else if (activeReportType === 'SUMMARY') {
            title.innerText = "GST Sale Register (Summary Report)";
            head.innerHTML = `<tr><th>Bill No</th><th>Date</th><th>Qty</th><th>Gross Amt</th><th>Disc Amt</th><th>CGST</th><th>SGST</th><th>Net Amount</th></tr>`;
            let gQ = 0, gGr = 0, gD = 0, gC = 0, gS = 0, gN = 0;
            fetchedSales.forEach(sale => {
                const tax = (parseFloat(sale.summary.gst) / 2).toFixed(2);
                const sQ = sale.items.reduce((acc, i) => acc + Number(i.qty), 0);
                body.innerHTML += `<tr><td><b>${sale.billNo}</b></td><td>${formatDate(sale.date)}</td><td>${sQ}</td><td>${sale.summary.gross}</td><td>${sale.summary.disc}</td><td>${tax}</td><td>${tax}</td><td><b>${sale.summary.net}</b></td></tr>`;
                gQ += sQ; gGr += Number(sale.summary.gross); gD += Number(sale.summary.disc); gC += Number(tax); gS += Number(tax); gN += Number(sale.summary.net);
            });
            body.innerHTML += `<tr class="total-footer"><td colspan="2" align="right">GRAND TOTALS ===></td><td>${gQ}</td><td>${gGr.toFixed(2)}</td><td>${gD.toFixed(2)}</td><td>${gC.toFixed(2)}</td><td>${gS.toFixed(2)}</td><td>${gN.toFixed(2)}</td></tr>`;
        }
        else if (activeReportType === 'BRAND_DETAILS') {
            title.innerText = "Company Brand Wise Sale Register";
            head.innerHTML = `<tr><th style="text-align: left;">Item Name</th><th>MRP</th><th>Rate</th><th>Qty</th><th>Free</th><th>Disc Amt</th><th>GST %</th><th>GST Amt</th><th>Net Amount</th></tr>`;
            const brandGroups = {};
            fetchedSales.forEach(sale => {
                sale.items.forEach(item => {
                    const grp = item.group || "General";
                    if (!brandGroups[grp]) brandGroups[grp] = { items: [], q: 0, d: 0, g: 0, n: 0 };
                    brandGroups[grp].items.push(item);
                    brandGroups[grp].q += Number(item.qty);
                    brandGroups[grp].d += (Number(item.disc) || 0);
                    brandGroups[grp].g += (Number(item.gstAmt) || 0);
                    brandGroups[grp].n += Number(item.net);
                });
            });
            let grandQ = 0, grandD = 0, grandG = 0, grandN = 0;
            for (const grp in brandGroups) {
                body.innerHTML += `<tr class="party-name-row"><td colspan="9" class="brand-header" style="text-align: left;">${grp}</td></tr>`;
                brandGroups[grp].items.forEach(item => {
                    body.innerHTML += `<tr><td style="text-align: left; padding-left:20px">${item.name}</td><td>${item.mrp}</td><td>${item.rate}</td><td>${item.qty}</td><td>0</td><td>${item.disc || 0}</td><td>${item.gst}%</td><td>${item.gstAmt || 0}</td><td>${item.net}</td></tr>`;
                });
                body.innerHTML += `<tr class="subtotal-row"><td colspan="3" align="right"><b>${grp} TOTAL</b></td><td><b>${brandGroups[grp].q}</b></td><td>0</td><td>${brandGroups[grp].d.toFixed(2)}</td><td></td><td>${brandGroups[grp].g.toFixed(2)}</td><td><b>${brandGroups[grp].n.toFixed(2)}</b></td></tr>`;
                grandQ += brandGroups[grp].q; grandD += brandGroups[grp].d; grandG += brandGroups[grp].g; grandN += brandGroups[grp].n;
            }
            body.innerHTML += `<tr class="total-footer"><td colspan="3" align="right">GRAND TOTALS ===></td><td>${grandQ}</td><td>0</td><td>${grandD.toFixed(2)}</td><td></td><td>${grandG.toFixed(2)}</td><td>${grandN.toFixed(2)}</td></tr>`;
        }
    };

    window.downloadPDF = function() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('p', 'mm', 'a4');
        doc.setFont("courier", "bold");
        doc.text("SHREE DATAREKHA ENTERPRISES", 105, 15, { align: "center" });
        doc.setFontSize(10);
        doc.text(document.getElementById('reportTitle').innerText, 105, 20, { align: "center" });
        doc.text(document.getElementById('pDateRange').innerText, 105, 25, { align: "center" });

        doc.autoTable({
            html: '#dataTable',
            startY: 30,
            margin: { left: 10, right: 10 },
            theme: 'plain',
            styles: { font: 'courier', fontSize: 8, cellPadding: 1.5, textColor: [0, 0, 0] },
            didParseCell: function(data) {
                if (data.cell.raw && data.cell.raw.style && data.cell.raw.style.textAlign) {
                    data.cell.styles.halign = data.cell.raw.style.textAlign;
                }
                
                data.cell.styles.fontStyle = 'bold';

                if (data.section === 'head') {
                    data.cell.styles.lineWidth = { top: 0.5, bottom: 0.5, left: 0, right: 0 };
                    data.cell.styles.lineColor = [0, 0, 0];
                }
                if (data.row.raw && data.row.raw.classList) {
                    if (data.row.raw.classList.contains('party-name-row')) {
                        data.cell.styles.lineWidth = { top: 0.5, bottom: 0, left: 0, right: 0 };
                        data.cell.styles.lineColor = [0, 0, 0];
                    }
                    else if (data.row.raw.classList.contains('subtotal-row')) {
                        data.cell.styles.lineWidth = { top: 0, bottom: 0.5, left: 0, right: 0 };
                        data.cell.styles.lineColor = [0, 0, 0];
                    }
                    else if (data.row.raw.classList.contains('total-footer')) {
                        data.cell.styles.lineWidth = { top: 0.5, bottom: 0.5, left: 0, right: 0 };
                        data.cell.styles.lineColor = [0, 0, 0];
                        data.cell.styles.fontSize = 9;
                    }
                }
            }
        });
        doc.save(`${activeReportType}_Report.pdf`);
    };

    window.downloadExcel = function() {
        const table = document.getElementById("dataTable");
        const wb = XLSX.utils.table_to_book(table, { sheet: "Report" });
        XLSX.writeFile(wb, `${activeReportType}_Report.xlsx`);
    };
</script>
</body>
</html>

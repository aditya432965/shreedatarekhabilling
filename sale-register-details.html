<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GST Sale Register | Shree Datarekha Enterprises</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root { --primary: #334155; --bg: #f1f5f9; --border: #94a3b8; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', Courier, monospace; }
        body { background: var(--bg); padding: 20px; }
        
        .control-panel { 
            background: #cbd5e1; 
            padding: 15px; 
            border: 2px solid #64748b;
            border-radius: 4px;
            max-width: 1100px;
            margin: 0 auto 20px auto;
        }

        .row { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
        
        .date-input { padding: 4px; border: 1px solid var(--border); }
        
        /* Button Styling to match the legacy software look */
        .btn { 
            padding: 6px 12px; 
            background: #e2e8f0; 
            border: 2px outset #fff; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 13px;
            color: #000;
            box-shadow: 2px 2px 0px #475569;
        }
        .btn:active { border-style: inset; box-shadow: none; transform: translate(1px, 1px); }
        .btn-exit { background: #fca5a5; margin-left: auto; }

        /* Report Preview Area */
        #reportPreview {
            background: white;
            padding: 15mm;
            width: 210mm;
            min-height: 297mm;
            margin: auto;
            border: 1px solid #ccc;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            display: none;
        }

        .report-header { text-align: center; margin-bottom: 10px; }
        .report-header h2 { text-decoration: underline; font-size: 18px; margin-bottom: 5px; }
        
        .info-line { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 10px; }

        .report-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .report-table th { border-top: 1px solid #000; border-bottom: 1px solid #000; padding: 5px 2px; text-align: left; }
        .report-table td { padding: 3px 2px; }
        
        .subtotal-row { border-top: 1px solid #000; border-bottom: 1px solid #000; font-weight: bold; }
        .party-name-row { font-weight: bold; background: #f8fafc; }

        @media print {
            .control-panel { display: none; }
            #reportPreview { border: none; box-shadow: none; margin: 0; padding: 0; width: 100%; }
        }
    </style>
</head>
<body>

<div class="control-panel">
    <div class="row">
        <label>Date From</label>
        <input type="date" id="fromDate" class="date-input">
        <label>To Date</label>
        <input type="date" id="toDate" class="date-input">
        
        <button class="btn" onclick="generateReport('DETAILS')">Show GST Sale Register Details</button>
        <button class="btn" onclick="generateReport('SUMMARY')">Show GST Sale Reg. Summary</button>
        <button class="btn btn-exit">Exit</button>
    </div>
    
    <div class="row">
        <button class="btn" onclick="generateReport('COMPANY')">Company Brand Sale Register Details</button>
        <button class="btn" onclick="generateReport('CA')">Show CA GST Sale Register Details</button>
        <button class="btn" onclick="generateReport('SHORT')">Show Bill Short Summary</button>
    </div>
</div>

<div id="reportPreview">
    <div class="report-header">
        <div class="info-line">
            <span id="currentDate">17-03-2026</span>
            <span style="font-weight: bold;">SHREE DATAREKHA ENTERPRISES</span>
            <span id="pageCount">Page 1 of 1</span>
        </div>
        <p style="font-size: 12px;">GST Sale Register</p>
        <h3 id="partyFocus" style="margin: 5px 0;">Gurukrupa Corner</h3>
        <div class="info-line" style="border-bottom: 1px solid #000; padding-bottom: 5px;">
            <span id="dateRangeText">From Date: 01/03/2026 To: 17/03/2026</span>
        </div>
    </div>

    <table class="report-table" id="dataTable">
        <thead id="tableHead"></thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    // Mock Data based on your images
    const mockData = [
        { 
            billNo: "2247", date: "2026-03-01", party: "Gurukrupa Corner", type: "Cash Memo",
            items: [
                { name: "Chicken Biryani Masala", mrp: 30, rate: 22.86, qty: 5, net: 120.02 },
                { name: "Mutton Sukka Masala", mrp: 30, rate: 22.86, qty: 3, net: 72.01 },
                { name: "Mutton Rassa Kolhapuri", mrp: 30, rate: 22.86, qty: 5, net: 120.02 }
            ]
        },
        {
            billNo: "2248", date: "2026-03-01", party: "Pritesh Traders", type: "GST Bill",
            items: [{ name: "Mutton Rassa Kolhapuri", mrp: 30, rate: 22.86, qty: 10, net: 226.07 }]
        }
    ];

    function generateReport(mode) {
        const from = document.getElementById('fromDate').value;
        const to = document.getElementById('toDate').value;
        const preview = document.getElementById('reportPreview');
        const head = document.getElementById('tableHead');
        const body = document.getElementById('tableBody');

        preview.style.display = "block";
        body.innerHTML = "";
        
        if (mode === 'DETAILS') {
            head.innerHTML = `<tr>
                <th>Bill No</th><th>Date</th><th>Item Name</th><th>MRP</th><th>Rate</th><th>Qty</th><th>Disc</th><th>GST%</th><th>GST Amt</th><th>Net Amt</th>
            </tr>`;

            mockData.forEach(bill => {
                // Bill Header
                body.innerHTML += `<tr class="party-name-row"><td colspan="10">${bill.billNo} &nbsp;&nbsp; ${bill.party} (${bill.type})</td></tr>`;
                
                let totalQty = 0;
                let totalGst = 0;
                let totalNet = 0;

                bill.items.forEach(item => {
                    let gstAmt = (item.net * 0.05).toFixed(2); // Assuming 5%
                    totalQty += item.qty;
                    totalGst += parseFloat(gstAmt);
                    totalNet += item.net;

                    body.innerHTML += `<tr>
                        <td></td><td>${bill.date}</td><td>${item.name}</td><td>${item.mrp}</td><td>${item.rate}</td><td>${item.qty}</td><td>0.00</td><td>5%</td><td>${gstAmt}</td><td>${item.net.toFixed(2)}</td>
                    </tr>`;
                });

                body.innerHTML += `<tr class="subtotal-row">
                    <td colspan="5" align="right">Bill Sub Total ===></td>
                    <td>${totalQty}</td><td>0.00</td><td></td><td>${totalGst.toFixed(2)}</td><td>${totalNet.toFixed(2)}</td>
                </tr>`;
            });

        } else if (mode === 'SUMMARY') {
            head.innerHTML = `<tr>
                <th>Bill No</th><th>Date</th><th>Qty</th><th>Amount</th><th>Disc Amt</th><th>CGST</th><th>SGST</th><th>Net Amount</th>
            </tr>`;

            mockData.forEach(bill => {
                let billQty = bill.items.reduce((s, i) => s + i.qty, 0);
                let billNet = bill.items.reduce((s, i) => s + i.net, 0);
                let totalGst = billNet * 0.05;
                let splitGst = (totalGst / 2).toFixed(2); // Splitting into CGST and SGST

                body.innerHTML += `<tr>
                    <td>${bill.billNo}</td>
                    <td>${bill.date}</td>
                    <td>${billQty}.00</td>
                    <td>${(billNet - totalGst).toFixed(2)}</td>
                    <td>0.00</td>
                    <td>${splitGst}</td>
                    <td>${splitGst}</td>
                    <td><b>${billNet.toFixed(2)}</b></td>
                </tr>`;
            });
        }
    }
</script>

</body>
</html>

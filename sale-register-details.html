<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GST Sale Register | Shree Datarekha Enterprises</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial', sans-serif; }
        body { background: #e2e8f0; color: var(--text); padding: 40px 20px; }
        
        .container { max-width: 1000px; margin: auto; background: var(--card); border-radius: 8px; padding: 30px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .header-main { text-align: center; border-bottom: 2px solid #334155; padding-bottom: 10px; margin-bottom: 20px; }
        .header-main h1 { font-size: 22px; text-transform: uppercase; letter-spacing: 1px; }
        
        .date-picker-box { display: flex; gap: 20px; justify-content: center; background: #f1f5f9; padding: 20px; border-radius: 8px; margin-bottom: 25px; border: 1px solid #cbd5e1; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        input[type="date"] { padding: 8px; border: 1px solid #94a3b8; border-radius: 4px; }
        
        .action-buttons { display: flex; gap: 10px; justify-content: center; margin-bottom: 30px; }
        button { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .btn-preview { background: #334155; color: white; }
        .btn-preview:hover { background: #1e293b; }
        .btn-download { background: #059669; color: white; display: none; }
        
        /* A4 Preview Styling */
        #previewArea { 
            display: none; 
            background: white; 
            width: 210mm; /* A4 Width */
            min-height: 297mm; 
            margin: 20px auto; 
            padding: 15mm; 
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            border: 1px solid #ddd;
            color: #000;
        }

        .report-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 11px; }
        .report-table th { border-top: 1px solid #000; border-bottom: 1px solid #000; padding: 5px; text-align: left; }
        .report-table td { padding: 4px 5px; vertical-align: top; }
        
        .party-row { font-weight: bold; background: #f9fafb; border-top: 1px dashed #ccc; }
        .subtotal-row { border-top: 1px solid #000; border-bottom: 1px solid #000; font-weight: bold; }
        
        @media print {
            body { background: none; padding: 0; }
            .container, .date-picker-box, .action-buttons { display: none; }
            #previewArea { box-shadow: none; border: none; margin: 0; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-main">
        <h1>SHREE DATAREKHA ENTERPRISES</h1>
        <p>GST Sale Register Report Generator</p>
    </div>

    <div class="date-picker-box">
        <div class="input-group">
            <label>From Date</label>
            <input type="date" id="fromDate">
        </div>
        <div class="input-group">
            <label>To Date</label>
            <input type="date" id="toDate">
        </div>
    </div>

    <div class="action-buttons">
        <button class="btn-preview" onclick="processData('DETAILS')">PREVIEW GST DETAILS</button>
        <button class="btn-preview" onclick="processData('SUMMARY')">PREVIEW GST SUMMARY</button>
        <button id="dlBtn" class="btn-download" onclick="downloadPDF()">DOWNLOAD PDF (A4)</button>
    </div>
</div>

<div id="previewArea">
    <div style="text-align:center; position:relative;">
        <span id="pDate" style="position:absolute; left:0; font-size:12px;"></span>
        <h2 style="font-size:18px;">SHREE DATAREKHA ENTERPRISES</h2>
        <p id="pReportType" style="font-weight:bold; margin:5px 0;">GST Sale Register</p>
        <div style="display:flex; justify-content: space-between; font-size:12px; margin-top:10px; border-bottom:1px solid #000; padding-bottom:5px;">
            <span id="pDateRange"></span>
            <span>Page 1 of 1</span>
        </div>
    </div>

    <table class="report-table" id="reportTable">
        <thead id="reportHead"></thead>
        <tbody id="reportContent"></tbody>
    </table>
</div>

<script type="module">
    import { db } from './firebase-config.js';
    import { collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    let reportData = [];
    let activeMode = "";

    window.processData = async function(mode) {
        const from = document.getElementById('fromDate').value;
        const to = document.getElementById('toDate').value;
        
        if (!from || !to) return alert("Please select a date range first.");

        activeMode = mode;
        const q = query(collection(db, "sales"), orderBy("date", "asc"));
        const querySnapshot = await getDocs(q);
        
        reportData = [];
        querySnapshot.forEach((doc) => {
            const data = doc.data();
            if (data.date >= from && data.date <= to) {
                reportData.push(data);
            }
        });

        if (reportData.length === 0) return alert("No sales found for this period.");
        
        renderA4Preview(from, to);
    };

    function renderA4Preview(f, t) {
        const container = document.getElementById('previewArea');
        const content = document.getElementById('reportContent');
        const head = document.getElementById('reportHead');
        
        // Setup Header Text
        document.getElementById('pDate').innerText = new Date().toLocaleDateString('en-GB');
        document.getElementById('pDateRange').innerText = `From Date: ${f} To: ${t}`;
        document.getElementById('pReportType').innerText = activeMode === 'DETAILS' ? "GST Sale Register (Detailed)" : "GST Sale Summary";
        
        content.innerHTML = "";
        container.style.display = "block";
        document.getElementById('dlBtn').style.display = "block";

        if (activeMode === 'DETAILS') {
            // Table Header for Details (Image 2 style)
            head.innerHTML = `<tr>
                <th>Bill No / Date</th><th>Item Name</th><th>Grp</th><th>MRP</th><th>Rate</th><th>Qty</th><th>Disc</th><th>GST%</th><th>GST Amt</th><th>Net</th>
            </tr>`;

            reportData.forEach(sale => {
                // Party Header Row
                content.innerHTML += `<tr class="party-row">
                    <td colspan="10">${sale.billNo} &nbsp;&nbsp; <b>${sale.customerName}</b></td>
                </tr>`;

                // Item Rows
                sale.items.forEach(item => {
                    content.innerHTML += `<tr>
                        <td style="color:#666">${sale.date}</td>
                        <td>${item.name}</td>
                        <td>Main Pkt</td>
                        <td>${item.mrp || '30'}</td>
                        <td>${item.rate}</td>
                        <td>${item.qty}</td>
                        <td>${item.disc || '0.00'}</td>
                        <td>5%</td>
                        <td>${((item.net * 5)/105).toFixed(2)}</td>
                        <td>${item.net}</td>
                    </tr>`;
                });

                // Subtotal Row
                content.innerHTML += `<tr class="subtotal-row">
                    <td colspan="5" align="right">Bill Sub Total ===></td>
                    <td>${sale.items.reduce((sum, i) => sum + Number(i.qty), 0)}</td>
                    <td>${sale.summary.disc}</td>
                    <td></td>
                    <td>${sale.summary.gst}</td>
                    <td>${sale.summary.net}</td>
                </tr>`;
            });
        } else {
            // Table Header for Summary (Image 1 style)
            head.innerHTML = `<tr>
                <th>Bill No</th><th>Date</th><th>Qty</th><th>Amount</th><th>Disc Amt</th><th>CGST</th><th>SGST</th><th>Net Amount</th>
            </tr>`;

            reportData.forEach(sale => {
                const tax = (Number(sale.summary.gst) / 2).toFixed(2);
                content.innerHTML += `<tr>
                    <td>${sale.billNo}</td>
                    <td>${sale.date}</td>
                    <td>${sale.items.reduce((sum, i) => sum + Number(i.qty), 0)}</td>
                    <td>${sale.summary.gross}</td>
                    <td>${sale.summary.disc}</td>
                    <td>${tax}</td>
                    <td>${tax}</td>
                    <td><b>${sale.summary.net}</b></td>
                </tr>`;
            });
        }
        
        // Auto scroll to preview
        container.scrollIntoView({ behavior: 'smooth' });
    }

    window.downloadPDF = function() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('p', 'mm', 'a4');
        
        // Uses the autoTable plugin to convert the HTML table we just built into a PDF
        doc.autoTable({ 
            html: '#reportTable',
            startY: 40,
            theme: 'grid',
            styles: { fontSize: 8, cellPadding: 2 },
            headStyles: { fillColor: [51, 65, 85] },
            didDrawPage: (data) => {
                doc.setFontSize(16).text("SHREE DATAREKHA ENTERPRISES", 105, 15, {align:'center'});
                doc.setFontSize(10).text(document.getElementById('pReportType').innerText, 105, 22, {align:'center'});
                doc.setFontSize(9).text(document.getElementById('pDateRange').innerText, 105, 28, {align:'center'});
            }
        });

        doc.save(`GST_Report_${activeMode}.pdf`);
    };
</script>

</body>
</html>

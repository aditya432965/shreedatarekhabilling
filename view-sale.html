<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>View All Sales | Shree Datarekha Enterprises</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    :root {
        --primary: #007ea7;
        --secondary: #001f3f;
        --accent: #10b981;
        --bg: #0b0f19;
    }
    * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }
    body { background: var(--bg); color: white; padding: 20px; }

    .header-section { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 12px; }
    
    /* Search & Filter Bar */
    .filter-bar { background: #1e293b; padding: 15px; border-radius: 12px; margin-bottom: 20px; display: flex; gap: 15px; flex-wrap: wrap; align-items: center; }
    input { padding: 8px 12px; border-radius: 6px; border: 1px solid #334155; background: #0b0f19; color: white; outline: none; }

    /* Sales Table */
    .table-container { background: #1e293b; border-radius: 12px; overflow-x: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
    table { width: 100%; border-collapse: collapse; text-align: left; }
    th { background: #334155; padding: 15px; color: #a0d8ef; font-size: 14px; text-transform: uppercase; }
    td { padding: 12px 15px; border-bottom: 1px solid #334155; font-size: 14px; }
    tr:hover { background: rgba(255,255,255,0.03); cursor: pointer; }

    .status-paid { color: #10b981; font-weight: bold; }
    .status-due { color: #ef4444; font-weight: bold; }

    /* Detail Modal */
    .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); padding: 20px; overflow-y: auto; align-items: center; justify-content: center; }
    .modal-content { background: white; color: black; max-width: 800px; width: 100%; margin: auto; padding: 30px; border-radius: 8px; }
    .modal-header { border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; }
    
    .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; text-decoration: none; display: inline-block; transition: 0.3s; }
    .btn-back { background: #444; color: white; }
    .btn-print { background: var(--primary); color: white; margin-top: 10px; }
    .btn-gst { background: #10b981; color: white; margin-top: 10px; }
    .btn-close { background: #ef4444; color: white; }

    @media print {
        body * { visibility: hidden; }
        .modal-content, .modal-content * { visibility: visible; }
        .modal-content { position: absolute; left: 0; top: 0; width: 100%; }
        .btn-print, .btn-close, .btn-gst { display: none; }
    }
</style>
</head>
<body>

<div class="header-section">
    <h2>All Sales History</h2>
    <a href="sale-entry.html" class="btn btn-back">← Back to Billing</a>
</div>

<div class="filter-bar">
    <input type="text" id="searchBar" placeholder="Search by Name or Bill..." oninput="filterSales()">
    <div style="display: flex; gap: 10px; align-items: center;">
        <label style="font-size: 12px; color: #a0d8ef;">Filter by Date:</label>
        <input type="date" id="dateFilter" onchange="filterSales()">
    </div>
</div>

<div class="table-container">
    <table>
        <thead>
            <tr>
                <th>Bill No</th>
                <th>Date</th>
                <th>Customer Name</th>
                <th>Total Amt</th>
                <th>Paid</th>
                <th>Balance</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="salesLog"></tbody>
    </table>
</div>

<div id="invoiceModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <div>
                <h1 style="color: #007ea7;">INVOICE</h1>
                <p>Shree Datarekha Enterprises</p>
            </div>
            <div style="text-align: right;">
                <h3 id="invBillNo"></h3>
                <p id="invDate"></p>
            </div>
        </div>

        <div style="margin-bottom: 20px;">
            <strong>Bill To:</strong>
            <p id="invCustName" style="font-weight: bold; font-size: 1.1em;"></p>
            <p id="invCustMeta" style="font-size: 0.9em; color: #555;"></p>
        </div>

        <table style="width: 100%; border: 1px solid #ddd; color: black; margin-bottom: 20px; border-collapse: collapse;">
            <thead style="background: #f4f4f4;">
                <tr>
                    <th style="color: black; border: 1px solid #ddd; padding: 8px;">Item</th>
                    <th style="color: black; border: 1px solid #ddd; padding: 8px;">Qty</th>
                    <th style="color: black; border: 1px solid #ddd; padding: 8px;">Rate</th>
                    <th style="color: black; border: 1px solid #ddd; padding: 8px;">Total</th>
                </tr>
            </thead>
            <tbody id="invItems"></tbody>
        </table>

        <div style="text-align: right; line-height: 1.8;">
            <p>Net Total: <strong id="invNet"></strong></p>
            <p>Paid Amount: <span id="invPaid"></span></p>
            <p>Remaining Balance: <strong id="invBalance" style="color: red;"></strong></p>
        </div>

        <div style="margin-top: 30px; display: flex; gap: 10px; flex-wrap: wrap;">
            <button class="btn btn-gst" onclick="preparePrint('WITH_GST')">Print With GST</button>
            <button class="btn btn-print" onclick="preparePrint('WITHOUT_GST')">Print Cash Memo</button>
            <button class="btn btn-close" onclick="closeModal()">Close</button>
        </div>
    </div>
</div>

<script type="module">
import { db } from './firebase-config.js';
import { collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

if(localStorage.getItem("loggedIn") !== "true") window.location.href = "index.html";

let allSales = [];
let selectedSale = null;

async function loadSales() {
    const log = document.getElementById('salesLog');
    log.innerHTML = `<tr><td colspan="7" style="text-align:center; padding: 20px;">⚡ Connecting to Cloud Database...</td></tr>`;

    try {
        const q = query(collection(db, "sales"), orderBy("createdAt", "desc"));
        const querySnapshot = await getDocs(q);
        
        allSales = querySnapshot.docs.map(doc => ({
            id: doc.id,
            ...doc.data()
        }));

        renderTable(allSales);

    } catch (err) {
        log.innerHTML = `<tr><td colspan="7" style="text-align:center; color: #ff4d4d; padding: 20px;">❌ Error: ${err.message}</td></tr>`;
    }
}

function renderTable(data) {
    const log = document.getElementById('salesLog');
    log.innerHTML = "";

    if(data.length === 0) {
        log.innerHTML = `<tr><td colspan="7" style="text-align:center; padding: 20px;">No sales found in Cloud.</td></tr>`;
        return;
    }

    data.forEach((sale) => {
        const netTotal = parseFloat(sale.netTotal || 0);
        const paidAmt = parseFloat(sale.paid || 0);
        const balance = netTotal - paidAmt;

        const row = document.createElement('tr');
        row.onclick = () => showInvoice(sale.id); 
        
        row.innerHTML = `
            <td><strong>${sale.billNo}</strong></td>
            <td>${sale.date}</td>
            <td>${sale.customerName}</td>
            <td>₹${netTotal.toFixed(2)}</td>
            <td>₹${paidAmt.toFixed(2)}</td>
            <td style="color: ${balance > 1 ? '#ff4d4d' : '#10b981'}; font-weight: bold;">
                ₹${balance.toFixed(2)}
            </td>
            <td><button class="btn btn-print" style="padding: 5px 10px; font-size: 11px; margin-top:0;">View</button></td>
        `;
        log.appendChild(row);
    });
}

window.filterSales = function() {
    const searchTerm = document.getElementById('searchBar').value.toLowerCase();
    const dateTerm = document.getElementById('dateFilter').value;

    const filtered = allSales.filter(s => {
        const matchesSearch = s.customerName.toLowerCase().includes(searchTerm) || 
                              s.billNo.toLowerCase().includes(searchTerm);
        const matchesDate = dateTerm ? s.date === dateTerm : true;
        return matchesSearch && matchesDate;
    });

    renderTable(filtered);
};

window.showInvoice = function(docId) {
    const sale = allSales.find(s => s.id === docId);
    if (!sale) return;
    selectedSale = sale;

    const netTotal = parseFloat(sale.netTotal || 0);
    const paidAmt = parseFloat(sale.paid || 0);
    const balance = netTotal - paidAmt;

    document.getElementById('invBillNo').innerText = "Bill No: " + sale.billNo;
    document.getElementById('invDate').innerText = "Date: " + sale.date;
    document.getElementById('invCustName').innerText = sale.customerName;
    document.getElementById('invCustMeta').innerText = sale.custMeta || "Details not available";
    
    const itemBody = document.getElementById('invItems');
    itemBody.innerHTML = "";
    
    const items = sale.items || [];
    items.forEach(item => {
        itemBody.innerHTML += `
            <tr>
                <td style="border: 1px solid #ddd; padding: 8px;">${item.name}</td>
                <td style="border: 1px solid #ddd; padding: 8px; text-align: center;">${item.qty}</td>
                <td style="border: 1px solid #ddd; padding: 8px; text-align: center;">${item.rate}</td>
                <td style="border: 1px solid #ddd; padding: 8px; text-align: right;">${parseFloat(item.net || 0).toFixed(2)}</td>
            </tr>
        `;
    });

    document.getElementById('invNet').innerText = "₹" + netTotal.toFixed(2);
    document.getElementById('invPaid').innerText = "₹" + paidAmt.toFixed(2);
    document.getElementById('invBalance').innerText = "₹" + balance.toFixed(2);

    document.getElementById('invoiceModal').style.display = "flex";
};

window.preparePrint = function(mode) {
    if(!selectedSale) return;

    // Construct print data to match your print.html expectations
    const printData = {
        taxMode: mode,
        billNo: selectedSale.billNo,
        date: selectedSale.date,
        custName: selectedSale.customerName,
        custMeta: selectedSale.custMeta || "",
        items: selectedSale.items.map(i => ({
            name: i.name,
            qty: i.qty,
            free: i.free || 0,
            mrp: i.mrp || i.rate,
            rate: i.rate,
            disc: i.disc || 0,
            cgst: i.cgst || (mode === 'WITH_GST' ? 2.5 : 0),
            sgst: i.sgst || (mode === 'WITH_GST' ? 2.5 : 0),
            net: i.net
        })),
        summary: {
            gross: selectedSale.netTotal, // Approximation for history view
            disc: 0,
            cgst: selectedSale.cgstTotal || 0,
            sgst: selectedSale.sgstTotal || 0,
            net: selectedSale.netTotal
        }
    };

    localStorage.setItem("lastBill", JSON.stringify(printData));
    window.open('print.html', '_blank');
};

window.closeModal = function() {
    document.getElementById('invoiceModal').style.display = "none";
};

loadSales();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>View Customers | Shree Datarekha Enterprises</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, Arial, sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#2b0018,#0b0006);
    display:flex;
    justify-content:center;
    align-items:center;
    padding: 20px;
}

.container{
    width:100%;
    max-width:1100px;
    background:rgba(255,20,147,0.18);
    backdrop-filter:blur(14px);
    border-radius:26px;
    padding:30px;
    box-shadow:0 35px 80px rgba(0,0,0,0.75);
}

.title{
    text-align:center;
    color:white;
    font-size:26px;
    font-weight:700;
}

.subtitle{
    text-align:center;
    color:#ff9fcf;
    margin-top:6px;
    font-size:14px;
}

/* ACTIVE SEARCH BAR */
.search-container {
    margin: 20px 0;
    display: flex;
    justify-content: center;
}

#searchInput {
    width: 100%;
    max-width: 450px;
    padding: 14px 25px;
    border-radius: 50px;
    border: 1px solid rgba(255, 255, 255, 0.2);
    background: rgba(0, 0, 0, 0.5);
    color: white;
    outline: none;
    font-size: 15px;
    transition: all 0.3s ease;
}

#searchInput:focus {
    border-color: #ff9fcf;
    background: rgba(0, 0, 0, 0.7);
    box-shadow: 0 0 15px rgba(255, 159, 207, 0.4);
}

hr{
    margin:10px 0 22px 0;
    border:none;
    height:1px;
    background:rgba(255,255,255,0.25);
}

.table-wrapper{
    overflow-x:auto;
    border-radius: 12px;
}

table{
    width:100%;
    border-collapse:collapse;
    min-width:850px;
}

th, td{
    padding:14px;
    text-align:center;
    font-size:14px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
}

th{
    background:rgba(0,0,0,0.7);
    color:#ffd3ea;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-size: 12px;
}

td{
    background:rgba(0,0,0,0.35);
    color:white;
}

tr:hover td {
    background: rgba(255, 255, 255, 0.08);
}

.back{
    margin-top:25px;
    width:180px;
    padding:13px;
    border:none;
    border-radius:16px;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    color:white;
    background:linear-gradient(135deg,#000,#4a0038);
    display:block;
    margin-left:auto;
    margin-right:auto;
    transition: 0.3s;
}

.back:hover {
    transform: translateY(-2px);
    background:linear-gradient(135deg,#1a1a1a,#5e0047);
}

@media(max-width:480px){
    .title{font-size:20px;}
    .container { padding: 15px; }
}
</style>
</head>

<body>

<div class="container">

    <div class="title">Shree Datarekha Enterprises</div>
    <div class="subtitle">View All Customers</div>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Search by name, contact, or GST..." oninput="filterTable()">
    </div>

    <hr>

    <div class="table-wrapper">
        <table id="custTable">
            <thead>
                <tr>
                    <th>Sr. No</th>
                    <th>Customer Name</th>
                    <th>Address 1</th>
                    <th>Address 2</th>
                    <th>Contact No</th>
                    <th>GST No</th>
                    <th>FSSAI No</th>
                </tr>
            </thead>
            <tbody id="customerTable">
                </tbody>
        </table>
    </div>

    <button class="back" onclick="goBack()">Back</button>

</div>

<script type="module">
import { db } from './firebase-config.js';
import { 
    collection, 
    getDocs, 
    query, 
    orderBy 
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

/* LOGIN CHECK */
if(localStorage.getItem("loggedIn") !== "true"){
    window.location.href = "index.html";
}

let allCustomers = [];

/* LOAD DATA */
async function loadCustomers(){
    const tableBody = document.getElementById("customerTable");
    tableBody.innerHTML = "<tr><td colspan='7'>Loading customers from cloud...</td></tr>";

    try {
        const q = query(collection(db, "customers"), orderBy("name", "asc"));
        const querySnapshot = await getDocs(q);
        
        allCustomers = [];
        querySnapshot.forEach(doc => {
            allCustomers.push(doc.data());
        });

        renderTable(allCustomers);

    } catch (error) {
        console.error("Firebase Error:", error);
        tableBody.innerHTML = `<tr><td colspan="7" style="color:#ff6b6b;">Error loading data.</td></tr>`;
    }
}

/* RENDER TABLE WITH SR. NO */
function renderTable(data) {
    const tableBody = document.getElementById("customerTable");
    tableBody.innerHTML = "";

    if(data.length === 0){
        tableBody.innerHTML = `<tr><td colspan="7">No matching customers found.</td></tr>`;
        return;
    }

    data.forEach((c, index) => {
        const row = `
            <tr>
                <td style="color:#ff9fcf; font-weight:bold;">${index + 1}</td>
                <td style="text-align:left;">${c.name || ""}</td>
                <td>${c.address1 || ""}</td>
                <td>${c.address2 || ""}</td>
                <td>${c.contact || ""}</td>
                <td>${c.gst || ""}</td>
                <td>${c.fssai || ""}</td>
            </tr>
        `;
        tableBody.innerHTML += row;
    });
}

/* ACTIVE SEARCH FILTER */
window.filterTable = function() {
    const searchTerm = document.getElementById("searchInput").value.toLowerCase();
    const filteredData = allCustomers.filter(c => {
        return (
            (c.name && c.name.toLowerCase().includes(searchTerm)) ||
            (c.contact && c.contact.toLowerCase().includes(searchTerm)) ||
            (c.gst && c.gst.toLowerCase().includes(searchTerm))
        );
    });
    renderTable(filteredData);
}

window.goBack = function(){
    window.location.href = "master-entry.html";
}

loadCustomers();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>View Customers | Shree Datarekha Enterprises</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, Arial, sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#2b0018,#0b0006);
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:95%;
    max-width:1100px;
    background:rgba(255,20,147,0.18);
    backdrop-filter:blur(14px);
    border-radius:26px;
    padding:30px;
    box-shadow:0 35px 80px rgba(0,0,0,0.75);
}

.title{
    text-align:center;
    color:white;
    font-size:26px;
    font-weight:700;
}

.subtitle{
    text-align:center;
    color:#ff9fcf;
    margin-top:6px;
    font-size:14px;
}

hr{
    margin:22px 0;
    border:none;
    height:1px;
    background:rgba(255,255,255,0.25);
}

.table-wrapper{
    overflow-x:auto;
}

table{
    width:100%;
    border-collapse:collapse;
    min-width:900px;
}

th, td{
    padding:12px;
    text-align:center;
    font-size:14px;
}

th{
    background:rgba(0,0,0,0.6);
    color:#ffd3ea;
}

td{
    background:rgba(0,0,0,0.35);
    color:white;
}

.empty{
    text-align:center;
    padding:25px;
    color:#ffd3ea;
    font-size:14px;
}

.back{
    margin-top:20px;
    width:220px;
    padding:13px;
    border:none;
    border-radius:16px;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    color:white;
    background:linear-gradient(135deg,#000,#2b0020);
    display:block;
    margin-left:auto;
    margin-right:auto;
}

@media(max-width:480px){
    .title{font-size:22px;}
}
</style>
</head>

<body>

<div class="container">

    <div class="title">Shree Datarekha Enterprises</div>
    <div class="subtitle">View All Customers</div>

    <hr>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Customer Code</th>
                    <th>Customer Name</th>
                    <th>Address 1</th>
                    <th>Address 2</th>
                    <th>Contact No</th>
                    <th>GST No</th>
                    <th>FSSAI No</th>
                </tr>
            </thead>
            <tbody id="customerTable">
                <!-- data loads -->
            </tbody>
        </table>
    </div>

    <button class="back" onclick="goBack()">Back</button>

</div>

<script type="module">
/* 1. FIREBASE IMPORTS */
import { db } from './firebase-config.js';
import { 
    collection, 
    getDocs, 
    query, 
    orderBy 
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

/* ===== LOGIN CHECK ===== */
if(localStorage.getItem("loggedIn") !== "true"){
    window.location.href = "index.html";
}

/* ===== LOAD CUSTOMER DATA FROM CLOUD ===== */
async function loadCustomers(){
    const table = document.getElementById("customerTable");
    
    // Show a loading message while fetching from internet
    table.innerHTML = "<tr><td colspan='7'>Loading customers from cloud...</td></tr>";

    try {
        // Fetch from 'customers' collection, sorted by Name
        const q = query(collection(db, "customers"), orderBy("name", "asc"));
        const querySnapshot = await getDocs(q);
        
        table.innerHTML = "";

        if(querySnapshot.empty){
            table.innerHTML = `
                <tr>
                    <td colspan="7" style="text-align:center; padding:20px;">
                        No customers available yet.
                    </td>
                </tr>
            `;
            return;
        }

        querySnapshot.forEach(doc => {
            const c = doc.data();
            const row = `
                <tr>
                    <td>${c.code || ""}</td>
                    <td>${c.name || ""}</td>
                    <td>${c.address1 || ""}</td>
                    <td>${c.address2 || ""}</td>
                    <td>${c.contact || ""}</td>
                    <td>${c.gst || ""}</td>
                    <td>${c.fssai || ""}</td>
                </tr>
            `;
            table.innerHTML += row;
        });

    } catch (error) {
        console.error("Firebase Read Error:", error);
        table.innerHTML = `<tr><td colspan="7" style="color:red;">Error loading data. Check internet connection.</td></tr>`;
    }
}

/* ===== NAVIGATION ===== */
window.goBack = function(){
    window.location.href = "master-entry.html";
}

/* AUTO LOAD ON START */
loadCustomers();

</script>

</body>
</html>

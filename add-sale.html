<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add New Sale | Shree Datarekha Enterprises</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --primary: #007ea7;
            --secondary: #001f3f;
            --accent: #10b981;
            --bg: #0b0f19;
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: white; padding: 10px; min-height: 100vh; }

        .header-section { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 12px; border-left: 5px solid var(--primary); }
        
        .party-info { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .input-group { display: flex; flex-direction: column; }
        .input-group label { font-size: 12px; color: #a0d8ef; margin-bottom: 5px; }
        select, input { padding: 10px; border-radius: 8px; border: 1px solid #334155; background: #1e293b; color: white; outline: none; transition: 0.3s; }
        
        .table-container { overflow-x: auto; background: #1e293b; border-radius: 12px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; min-width: 1200px; }
        th { background: #334155; padding: 12px; font-size: 13px; color: #a0d8ef; }
        td { padding: 8px; border-bottom: 1px solid #334155; }
        .row-input { width: 100%; background: transparent; border: none; color: white; text-align: center; }

        .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; background: rgba(0,0,0,0.3); padding: 20px; border-radius: 12px; border: 1px solid #334155; }
        .summary-box { border-bottom: 1px solid #334155; padding-bottom: 5px; }
        .summary-box span { display: block; font-size: 11px; color: #94a3b8; }
        .summary-box strong { font-size: 18px; color: #10b981; }

        .actions { display: flex; flex-wrap: wrap; gap: 10px; margin: 20px 0; align-items: flex-end; }
        button { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-save { background: #10b981; color: white; }
        .btn-new { background: #007ea7; color: white; }
        .btn-print { background: #f59e0b; color: white; }
        .btn-whatsapp { background: #25D366; color: white; }
        .btn-back { background: #334155; color: white; text-decoration: none; padding: 12px 24px; border-radius: 8px; font-weight: 600; display: inline-block; }
    </style>
</head>
<body>

<datalist id="itemList"></datalist>

<div class="header-section">
    <div>
        <h2 style="color: var(--primary);">Sale Entry</h2>
        <div style="margin-top: 10px;">
            <label style="font-size: 12px; color: #a0d8ef;">Tax Billing Mode:</label>
            <select id="taxMode" onchange="calculateFinal()">
                <option value="WITH_GST">With GST (Tax Invoice)</option>
                <option value="WITHOUT_GST">Without GST (Cash Memo)</option>
            </select>
        </div>
    </div>
    <div style="text-align: right;">
        <span style="color: #a0d8ef;">Bill Number</span>
        <h2 id="billNo">S-1001</h2>
    </div>
</div>

<div class="party-info">
    <div class="input-group">
        <label>Select Party Name</label>
        <select id="partySelect" onchange="updatePartyDetails()">
            <option value="">-- Choose Customer --</option>
        </select>
    </div>
    <div class="input-group">
        <label>Customer Details (GST/Mob/Address)</label>
        <input type="text" id="partyMeta" readonly placeholder="Auto-fed details">
    </div>
    <div class="input-group">
        <label>Date</label>
        <input type="date" id="saleDate">
    </div>
</div>

<div class="table-container">
    <table id="saleTable">
        <thead>
            <tr>
                <th width="50">Sr.</th>
                <th width="150">Code</th>
                <th>Item Name (Search)</th>
                <th>MRP</th>
                <th>Rate</th>
                <th>Disc %</th>
                <th>Qty</th>
                <th>Free</th>
                <th>CGST%</th>
                <th>SGST%</th>
                <th>Net Amt</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<button onclick="addRow()" style="background:#334155; color:white; margin-bottom:10px; padding: 8px 15px; border-radius: 6px; cursor: pointer;">+ Add Item Row</button>

<div class="summary-grid">
    <div class="summary-box"><span>Gross Total</span><strong id="sumTotalSale">0.00</strong></div>
    <div class="summary-box"><span>Total Disc</span><strong id="sumTotalDisc">0.00</strong></div>
    <div id="cgstBox" class="summary-box"><span>CGST</span><strong id="sumCGST">0.00</strong></div>
    <div id="sgstBox" class="summary-box"><span>SGST</span><strong id="sumSGST">0.00</strong></div>
    <div class="summary-box"><span>Net Total</span><strong id="sumNet">0.00</strong></div>
    <div class="summary-box"><span>Balance</span><strong id="sumBalance">0.00</strong></div>
</div>

<div class="actions">
    <a href="sale-entry.html" class="btn-back">Back</a>
    <div class="input-group" style="width: 150px;">
        <label>Paid Amount</label>
        <input type="number" id="paidAmt" placeholder="0.00" oninput="calculateFinal()">
    </div>
    <button class="btn-new" onclick="location.reload()">New</button>
    <button class="btn-save" onclick="saveSale()">Save Cloud</button>
    <button class="btn-print" onclick="window.preparePrint()">Print Bill</button>
    <button class="btn-whatsapp" onclick="sendWhatsApp()">Send Message</button>
</div>

<script type="module">
import { db } from './firebase-config.js';
import { collection, addDoc, getDocs, query, orderBy, limit, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

if(localStorage.getItem("loggedIn") !== "true") window.location.href = "index.html";

let customers = [];
let items = [];

async function init() {
    try {
        const cSnap = await getDocs(collection(db, "customers"));
        customers = cSnap.docs.map(d => ({id: d.id, ...d.data()}));
        const pSel = document.getElementById('partySelect');
        customers.forEach(c => pSel.add(new Option(c.name, c.code)));

        const iSnap = await getDocs(collection(db, "items"));
        items = iSnap.docs.map(d => ({id: d.id, ...d.data()}));
        
        // FILL DATALIST FOR SEARCH
        const dList = document.getElementById('itemList');
        items.forEach(item => {
            let opt = document.createElement('option');
            opt.value = item.name;
            dList.appendChild(opt);
        });

        const q = query(collection(db, "sales"), orderBy("createdAt", "desc"), limit(1));
        const lastS = await getDocs(q);
        if (!lastS.empty) {
            const lastNum = parseInt(lastS.docs[0].data().billNo.split('-')[1]);
            document.getElementById('billNo').innerText = "S-" + (lastNum + 1);
        }
        
        document.getElementById('saleDate').valueAsDate = new Date();
        window.addRow();
    } catch (e) { console.error("Init Error:", e); }
}

window.updatePartyDetails = function() {
    const code = document.getElementById('partySelect').value;
    const c = customers.find(x => x.code === code);
    if(c) {
        const gst = c.gst || 'URD';
        const mob = c.mobile || c.contact || 'No Mob'; 
        const addr = c.address1 || '';
        document.getElementById('partyMeta').value = `${gst} | Mob: ${mob} | ${addr}`;
    }
};

window.addRow = function() {
    const tbody = document.getElementById('tableBody');
    const rowCount = tbody.rows.length + 1;
    const row = tbody.insertRow();
    row.innerHTML = `
        <td>${rowCount}</td>
        <td><input type="text" class="row-input i-code" onchange="window.autoFillByCode(this)" placeholder="Code"></td>
        <td><input type="text" class="row-input i-name" list="itemList" oninput="window.autoFillByName(this)" placeholder="Search Item..."></td>
        <td><input type="number" class="row-input mrp" value="0" readonly></td>
        <td><input type="number" class="row-input rate" value="0" oninput="window.calc(this)"></td>
        <td><input type="number" class="row-input disc" value="0" oninput="window.calc(this)"></td>
        <td><input type="number" class="row-input qty" value="1" oninput="window.calc(this)"></td>
        <td><input type="number" class="row-input free" value="0"></td>
        <td><input type="number" class="row-input cgst" value="0" oninput="window.calc(this)"></td>
        <td><input type="number" class="row-input sgst" value="0" oninput="window.calc(this)"></td>
        <td><input type="number" class="row-input net" value="0.00" readonly style="font-weight:bold;"></td>
    `;
};

// AUTOFILL WHEN TYPING NAME (SEARCHABLE)
window.autoFillByName = function(input) {
    const row = input.closest('tr');
    const item = items.find(i => i.name === input.value);
    if(item) {
        fillRowData(row, item);
    }
};

// AUTOFILL WHEN TYPING CODE
window.autoFillByCode = function(input) {
    const row = input.closest('tr');
    const item = items.find(i => i.code.toLowerCase() === input.value.toLowerCase());
    if(item) {
        fillRowData(row, item);
    }
};

function fillRowData(row, item) {
    row.querySelector('.i-code').value = item.code;
    row.querySelector('.i-name').value = item.name;
    row.querySelector('.mrp').value = item.mrp || 0;
    row.querySelector('.rate').value = item.sale || 0;
    const hGst = (parseFloat(item.gst) / 2) || 0;
    row.querySelector('.cgst').value = hGst;
    row.querySelector('.sgst').value = hGst;
    window.calculateFinal();
}

window.calc = function(el) {
    window.calculateFinal();
};

window.calculateFinal = function() {
    let tS = 0, tD = 0, tC = 0, tSg = 0, nG = 0;
    const taxMode = document.getElementById('taxMode').value;

    if(taxMode === "WITHOUT_GST") {
        document.getElementById('cgstBox').style.display = 'none';
        document.getElementById('sgstBox').style.display = 'none';
    } else {
        document.getElementById('cgstBox').style.display = 'block';
        document.getElementById('sgstBox').style.display = 'block';
    }

    document.querySelectorAll('#tableBody tr').forEach(row => {
        const rate = parseFloat(row.querySelector('.rate').value) || 0;
        const qty = parseFloat(row.querySelector('.qty').value) || 0;
        const sub = rate * qty;
        const dAmt = sub * ((parseFloat(row.querySelector('.disc').value) || 0) / 100);
        const taxable = sub - dAmt;
        
        let cgstAmt = 0, sgstAmt = 0;
        if(taxMode !== "WITHOUT_GST") {
            const cP = parseFloat(row.querySelector('.cgst').value) || 0;
            const sP = parseFloat(row.querySelector('.sgst').value) || 0;
            cgstAmt = (taxable * (cP/100));
            sgstAmt = (taxable * (sP/100));
        }
        
        tS += sub; 
        tD += dAmt;
        tC += cgstAmt;
        tSg += sgstAmt;
        
        const rowNet = taxable + cgstAmt + sgstAmt;
        row.querySelector('.net').value = rowNet.toFixed(2);
        nG += rowNet;
    });
    
    document.getElementById('sumTotalSale').innerText = tS.toFixed(2);
    document.getElementById('sumTotalDisc').innerText = tD.toFixed(2);
    document.getElementById('sumCGST').innerText = tC.toFixed(2);
    document.getElementById('sumSGST').innerText = tSg.toFixed(2);
    document.getElementById('sumNet').innerText = Math.round(nG).toFixed(2);
    
    const paid = parseFloat(document.getElementById('paidAmt').value) || 0;
    document.getElementById('sumBalance').innerText = (Math.round(nG) - paid).toFixed(2);
};

window.preparePrint = function() {
    const pSel = document.getElementById('partySelect');
    if(!pSel.value) {
        alert("Please select a Customer first!");
        return false;
    }

    const taxMode = document.getElementById('taxMode').value;
    const billItems = [];
    document.querySelectorAll('#tableBody tr').forEach(row => {
        if(row.querySelector('.i-name').value) {
            billItems.push({
                name: row.querySelector('.i-name').value,
                qty: row.querySelector('.qty').value,
                free: row.querySelector('.free').value,
                mrp: row.querySelector('.mrp').value,
                rate: row.querySelector('.rate').value,
                disc: row.querySelector('.disc').value,
                cgst: row.querySelector('.cgst').value,
                sgst: row.querySelector('.sgst').value,
                net: row.querySelector('.net').value
            });
        }
    });

    const printData = {
        taxMode: taxMode,
        billNo: document.getElementById('billNo').innerText,
        date: document.getElementById('saleDate').value,
        custName: pSel.options[pSel.selectedIndex].text,
        custMeta: document.getElementById('partyMeta').value,
        items: billItems,
        summary: {
            gross: document.getElementById('sumTotalSale').innerText,
            disc: document.getElementById('sumTotalDisc').innerText,
            cgst: document.getElementById('sumCGST').innerText,
            sgst: document.getElementById('sumSGST').innerText,
            net: document.getElementById('sumNet').innerText
        }
    };

    localStorage.setItem("lastBill", JSON.stringify(printData));
    window.open('print.html', '_blank');
    return true;
};

window.sendWhatsApp = function() {
    const meta = document.getElementById('partyMeta').value;
    const phoneMatch = meta.match(/\d{10}/);
    if(!phoneMatch) return alert("No mobile number found!");
    
    const msg = `*Invoice from Shree Datarekha Enterprises*%0A` +
                `Bill No: ${document.getElementById('billNo').innerText}%0A` +
                `Total: ₹${document.getElementById('sumNet').innerText}`;
    window.open(`https://wa.me/91${phoneMatch[0]}?text=${msg}`, '_blank');
};

window.saveSale = async function() {
    const pSel = document.getElementById('partySelect');
    if(!pSel.value) return alert("Please select a Customer!");

    const rows = document.querySelectorAll('#tableBody tr');
    const billItems = [];
    rows.forEach(r => {
        if(r.querySelector('.i-name').value) {
            billItems.push({
                name: r.querySelector('.i-name').value,
                qty: r.querySelector('.qty').value,
                rate: r.querySelector('.rate').value,
                net: r.querySelector('.net').value
            });
        }
    });

    const saleData = {
        billNo: document.getElementById('billNo').innerText,
        customerName: pSel.options[pSel.selectedIndex].text,
        custMeta: document.getElementById('partyMeta').value,
        date: document.getElementById('saleDate').value,
        netTotal: parseFloat(document.getElementById('sumNet').innerText) || 0, 
        paid: parseFloat(document.getElementById('paidAmt').value) || 0, 
        items: billItems,
        createdAt: serverTimestamp()
    };

    try {
        await addDoc(collection(db, "sales"), saleData);
        alert("Success! Bill Saved to Cloud.");
        window.preparePrint();
        setTimeout(() => { location.reload(); }, 1000);
    } catch (e) { alert("Save Error: " + e.message); }
};

init();
</script>
</body>
</html>

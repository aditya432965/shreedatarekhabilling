<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sale Entry | Shree Datarekha Enterprises</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        :root {
            --primary: #ff2f92;
            --secondary: #2b000f;
            --accent: #10b981;
            --bg: #0b0f19;
            --card: rgba(255, 255, 255, 0.07);
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { 
            background: linear-gradient(135deg, #1a020b, #2b000f, #0b0f19); 
            color: white; 
            padding: 10px; 
            min-height: 100vh; 
        }

        /* HEADER */
        .header-section { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 20px; 
            background: var(--card); 
            border-radius: 20px; 
            border: 1px solid rgba(255,47,146,0.3);
            margin-bottom: 15px;
            backdrop-filter: blur(10px);
        }
        
        .bill-badge { background: var(--primary); padding: 5px 15px; border-radius: 50px; font-weight: bold; }

        /* INPUT FIELDS */
        .party-info { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 15px; 
            margin-bottom: 20px; 
        }
        .input-group { display: flex; flex-direction: column; position: relative; }
        .input-group label { font-size: 11px; color: #ffb3d9; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        
        select, input { 
            padding: 14px; 
            border-radius: 12px; 
            border: 1px solid rgba(255,255,255,0.1); 
            background: rgba(0,0,0,0.3); 
            color: white; 
            outline: none; 
            font-size: 15px;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(255,47,146,0.2); }

        /* TABLE STYLING */
        .table-container { 
            overflow-x: auto; 
            background: var(--card); 
            border-radius: 20px; 
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 15px; 
        }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th { background: rgba(255,47,146,0.1); padding: 15px; font-size: 12px; color: #ffb3d9; text-transform: uppercase; }
        td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .row-input { width: 100%; background: transparent; border: none; color: white; text-align: center; font-size: 14px; }
        .row-input:focus { background: rgba(255,255,255,0.05); border-radius: 5px; }

        /* SUMMARY BOX */
        .summary-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); 
            gap: 10px; 
            background: rgba(0,0,0,0.4); 
            padding: 20px; 
            border-radius: 20px; 
            border: 1px solid var(--primary);
            margin-bottom: 80px; /* Space for fixed actions */
        }
        .summary-box span { display: block; font-size: 10px; color: #ffb3d9; text-transform: uppercase; }
        .summary-box strong { font-size: 20px; color: white; }
        .net-highlight { color: var(--accent) !important; }

        /* FIXED ACTIONS BAR */
        .actions-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: rgba(11, 15, 25, 0.95);
            padding: 15px;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            backdrop-filter: blur(15px);
            border-top: 1px solid rgba(255,47,146,0.3);
            z-index: 1000;
        }

        button { 
            padding: 12px 20px; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: 700; 
            transition: 0.3s; 
            font-size: 14px;
        }
        .btn-add-row { background: var(--primary); color: white; margin-bottom: 15px; width: 100%; }
        .btn-save { background: var(--accent); color: white; flex: 1; min-width: 120px; }
        .btn-print { background: #f59e0b; color: white; }
        .btn-back { background: #444; color: white; text-decoration: none; padding: 12px 20px; border-radius: 12px; }

        /* SEARCH SUGGESTION LISTS */
        datalist { background: #1e293b; color: white; }
    </style>
</head>
<body>

<datalist id="customerList"></datalist>
<datalist id="itemList"></datalist>

<div class="header-section">
    <div>
        <h2 style="color: var(--primary);">New Sale</h2>
        <select id="taxMode" onchange="calculateFinal()" style="margin-top:5px; padding: 5px; font-size: 12px;">
            <option value="WITH_GST">GST Invoice</option>
            <option value="WITHOUT_GST">Cash Memo (No GST)</option>
        </select>
    </div>
    <div style="text-align: right;">
        <label style="font-size: 10px; color:#ffb3d9;">BILL NO</label>
        <div class="bill-badge" id="billNo">S-Loading...</div>
    </div>
</div>

<div class="party-info">
    <div class="input-group">
        <label>Search Customer</label>
        <input type="text" id="partySearch" list="customerList" placeholder="Type name..." oninput="updatePartyDetails()">
    </div>
    <div class="input-group">
        <label>Customer Details</label>
        <input type="text" id="partyMeta" readonly placeholder="GST / Mobile / Address">
    </div>
    <div class="input-group" style="max-width: 200px;">
        <label>Date</label>
        <input type="date" id="saleDate">
    </div>
</div>

<div class="table-container">
    <table id="saleTable">
        <thead>
            <tr>
                <th width="40">#</th>
                <th width="350" style="text-align:left;">Item Name & Group</th>
                <th>MRP</th>
                <th>Sale Rate</th>
                <th>Disc%</th>
                <th>Qty</th>
                <th>Free</th>
                <th>CGST%</th>
                <th>SGST%</th>
                <th>Amount</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<button class="btn-add-row" onclick="addRow()">+ Add Next Item Row</button>

<div class="summary-grid">
    <div class="summary-box"><span>Gross Total</span><strong id="sumTotalSale">0.00</strong></div>
    <div class="summary-box"><span>Discount</span><strong id="sumTotalDisc">0.00</strong></div>
    <div id="cgstBox" class="summary-box"><span>Total CGST</span><strong id="sumCGST">0.00</strong></div>
    <div id="sgstBox" class="summary-box"><span>Total SGST</span><strong id="sumSGST">0.00</strong></div>
    <div class="summary-box"><span>Net Payable</span><strong id="sumNet" class="net-highlight">0.00</strong></div>
    <div class="summary-box">
        <span>Paid Amt</span>
        <input type="number" id="paidAmt" value="0" oninput="calculateFinal()" style="padding: 2px; width: 80px; height: 30px; margin-top:5px;">
    </div>
    <div class="summary-box"><span>Balance</span><strong id="sumBalance" style="color: #ff6b6b;">0.00</strong></div>
</div>

<div class="actions-bar">
    <a href="sale-entry.html" class="btn-back">Back</a>
    <button class="btn-print" onclick="window.preparePrint()">Print Bill</button>
    <button class="btn-save" onclick="saveSale()">Save to Cloud</button>
</div>

<script type="module">
import { db } from './firebase-config.js';
import { collection, addDoc, getDocs, query, orderBy, limit, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

let customers = [];
let items = [];

async function init() {
    try {
        // Fetch Customers
        const cSnap = await getDocs(collection(db, "customers"));
        const cList = document.getElementById('customerList');
        customers = cSnap.docs.map(d => ({id: d.id, ...d.data()}));
        customers.forEach(c => {
            let opt = document.createElement('option');
            opt.value = c.name;
            cList.appendChild(opt);
        });

        // Fetch Items
        const iSnap = await getDocs(collection(db, "items"));
        const iList = document.getElementById('itemList');
        items = iSnap.docs.map(d => ({id: d.id, ...d.data()}));
        items.forEach(item => {
            let opt = document.createElement('option');
            // Showing Brand Group + Item Name for better search
            opt.value = `${item.group || 'Gen'} - ${item.name}`;
            iList.appendChild(opt);
        });

        // Generate Bill No
        const q = query(collection(db, "sales"), orderBy("createdAt", "desc"), limit(1));
        const lastS = await getDocs(q);
        if (!lastS.empty) {
            const lastNum = parseInt(lastS.docs[0].data().billNo.split('-')[1]);
            document.getElementById('billNo').innerText = "S-" + (lastNum + 1);
        } else {
            document.getElementById('billNo').innerText = "S-1001";
        }
        
        document.getElementById('saleDate').valueAsDate = new Date();
        window.addRow();
    } catch (e) { console.error("Init Error:", e); }
}

window.updatePartyDetails = function() {
    const val = document.getElementById('partySearch').value;
    const c = customers.find(x => x.name === val);
    if(c) {
        const gst = c.gst || 'URD';
        const mob = c.mobile || c.contact || 'No Mob'; 
        const addr = c.address1 || '';
        document.getElementById('partyMeta').value = `${gst} | Mob: ${mob} | ${addr}`;
    }
};

window.addRow = function() {
    const tbody = document.getElementById('tableBody');
    const rowCount = tbody.rows.length + 1;
    const row = tbody.insertRow();
    row.innerHTML = `
        <td>${rowCount}</td>
        <td><input type="text" class="row-input i-name" list="itemList" oninput="window.autoFillByName(this)" placeholder="Search Name or Brand..." style="text-align:left;"></td>
        <td><input type="number" class="row-input mrp" value="0" readonly></td>
        <td><input type="number" class="row-input rate" value="0" oninput="window.calc(this)"></td>
        <td><input type="number" class="row-input disc" value="0" oninput="window.calc(this)"></td>
        <td><input type="number" class="row-input qty" value="1" oninput="window.calc(this)"></td>
        <td><input type="number" class="row-input free" value="0"></td>
        <td><input type="number" class="row-input cgst" value="0" oninput="window.calc(this)"></td>
        <td><input type="number" class="row-input sgst" value="0" oninput="window.calc(this)"></td>
        <td><input type="number" class="row-input net" value="0.00" readonly style="font-weight:bold; color:var(--accent);"></td>
    `;
};

window.autoFillByName = function(input) {
    const row = input.closest('tr');
    const val = input.value;
    // Matching logic for "Group - Name" format
    const item = items.find(i => `${i.group || 'Gen'} - ${i.name}` === val);
    if(item) {
        row.querySelector('.mrp').value = item.mrp || 0;
        row.querySelector('.rate').value = item.sale || 0;
        row.querySelector('.cgst').value = item.cgst || (parseFloat(item.gst)/2) || 0;
        row.querySelector('.sgst').value = item.sgst || (parseFloat(item.gst)/2) || 0;
        window.calculateFinal();
    }
};

window.calc = function(el) { window.calculateFinal(); };

window.calculateFinal = function() {
    let tS = 0, tD = 0, tC = 0, tSg = 0, nG = 0;
    const taxMode = document.getElementById('taxMode').value;

    document.querySelectorAll('#tableBody tr').forEach(row => {
        const rate = parseFloat(row.querySelector('.rate').value) || 0;
        const qty = parseFloat(row.querySelector('.qty').value) || 0;
        const sub = rate * qty;
        const dAmt = sub * ((parseFloat(row.querySelector('.disc').value) || 0) / 100);
        const taxable = sub - dAmt;
        
        let cgstAmt = 0, sgstAmt = 0;
        if(taxMode !== "WITHOUT_GST") {
            cgstAmt = (taxable * ((parseFloat(row.querySelector('.cgst').value) || 0)/100));
            sgstAmt = (taxable * ((parseFloat(row.querySelector('.sgst').value) || 0)/100));
        }
        
        tS += sub; tD += dAmt; tC += cgstAmt; tSg += sgstAmt;
        const rowNet = taxable + cgstAmt + sgstAmt;
        row.querySelector('.net').value = rowNet.toFixed(2);
        nG += rowNet;
    });
    
    document.getElementById('sumTotalSale').innerText = tS.toFixed(2);
    document.getElementById('sumTotalDisc').innerText = tD.toFixed(2);
    document.getElementById('sumCGST').innerText = tC.toFixed(2);
    document.getElementById('sumSGST').innerText = tSg.toFixed(2);
    document.getElementById('sumNet').innerText = Math.round(nG).toFixed(2);
    
    const paid = parseFloat(document.getElementById('paidAmt').value) || 0;
    document.getElementById('sumBalance').innerText = (Math.round(nG) - paid).toFixed(2);
};

window.saveSale = async function() {
    const pName = document.getElementById('partySearch').value;
    if(!pName) return alert("Please search and select a Customer!");

    const billItems = [];
    document.querySelectorAll('#tableBody tr').forEach(r => {
        const name = r.querySelector('.i-name').value;
        if(name) {
            billItems.push({
                name: name,
                qty: r.querySelector('.qty').value,
                rate: r.querySelector('.rate').value,
                net: r.querySelector('.net').value
            });
        }
    });

    if(billItems.length === 0) return alert("Add at least one item!");

    const saleData = {
        billNo: document.getElementById('billNo').innerText,
        customerName: pName,
        custMeta: document.getElementById('partyMeta').value,
        date: document.getElementById('saleDate').value,
        netTotal: parseFloat(document.getElementById('sumNet').innerText),
        paid: parseFloat(document.getElementById('paidAmt').value),
        items: billItems,
        createdAt: serverTimestamp()
    };

    try {
        await addDoc(collection(db, "sales"), saleData);
        alert("Success! Bill Saved Successfully.");
        location.reload();
    } catch (e) { alert("Error: " + e.message); }
};

init();
</script>
</body>
</html>

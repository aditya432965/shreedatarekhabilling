<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add New Sale | Shree Datarekha Enterprises</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --primary: #007ea7;
            --secondary: #001f3f;
            --accent: #10b981;
            --bg: #0b0f19;
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: white; padding: 10px; min-height: 100vh; }

        .header-section { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 12px; border-left: 5px solid var(--primary); }
        
        .party-info { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .input-group { flex: 1; display: flex; flex-direction: column; min-width: 250px; }
        
        .input-group label { font-size: 12px; color: #a0d8ef; margin-bottom: 5px; }
        select, input { padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #1e293b; color: white; outline: none; transition: 0.3s; width: 100%; }
        input:focus { border-color: var(--primary); }
        
        .table-container { overflow-x: auto; background: #1e293b; border-radius: 12px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; min-width: 1250px; }
        th { background: #334155; padding: 12px; font-size: 13px; color: #a0d8ef; text-align: left; }
        td { padding: 8px; border-bottom: 1px solid #334155; }
        .row-input { width: 100%; background: transparent; border: none; color: white; }

        .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; background: rgba(0,0,0,0.3); padding: 20px; border-radius: 12px; border: 1px solid #334155; }
        .summary-box { border-bottom: 1px solid #334155; padding-bottom: 5px; }
        .summary-box span { display: block; font-size: 11px; color: #94a3b8; }
        .summary-box strong { font-size: 18px; color: #10b981; }

        .actions { display: flex; flex-wrap: wrap; gap: 10px; margin: 20px 0; align-items: flex-end; }
        button { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-save { background: #10b981; color: white; }
        .btn-new { background: #007ea7; color: white; }
        .btn-print { background: #f59e0b; color: white; }
        .btn-back { background: #334155; color: white; text-decoration: none; padding: 12px 24px; border-radius: 8px; display: inline-block; }
    </style>
</head>
<body>

<datalist id="customerList"></datalist>
<datalist id="itemList"></datalist>

<div class="header-section">
    <div>
        <h2 style="color: var(--primary);">Sale Entry</h2>
        <div style="margin-top: 10px;">
            <label style="font-size: 12px; color: #a0d8ef;">Tax Mode:</label>
            <select id="taxMode" onchange="window.calculateFinal()" style="width: auto; padding: 5px; height: 30px;">
                <option value="WITH_GST">Tax Invoice (GST)</option>
                <option value="WITHOUT_GST">Cash Memo (Non-GST)</option>
            </select>
        </div>
    </div>
    <div style="text-align: right;">
        <span style="color: #a0d8ef;">Bill No.</span>
        <h2 id="billNo">1</h2>
    </div>
</div>

<div class="party-info">
    <div class="input-group">
        <label>Customer Name (Search)</label>
        <input type="text" id="partySearch" list="customerList" placeholder="Search customer..." oninput="window.updatePartyDetails()">
    </div>
    <div class="input-group" style="flex: 2;">
        <label>Customer Details (GST | Contact | Address)</label>
        <input type="text" id="partyMeta" readonly placeholder="Auto-fed details">
    </div>
    <div class="input-group" style="flex: 0.5; min-width: 150px;">
        <label>Date</label>
        <input type="date" id="saleDate">
    </div>
</div>

<div class="table-container">
    <table id="saleTable">
        <thead>
            <tr>
                <th width="40">Sr.</th>
                <th width="150">Item Group</th>
                <th>Item Name</th>
                <th width="90">MRP</th>
                <th width="90">Rate</th>
                <th width="70">Disc%</th>
                <th width="85">Schm(₹)</th>
                <th width="70">Qty</th>
                <th width="80">GST%</th>
                <th width="110">Net Amount</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<button onclick="addRow()" style="background:#334155; color:white; margin-bottom:15px; padding: 10px 20px; border-radius: 8px; cursor: pointer;">+ Add Item</button>

<div class="summary-grid">
    <div class="summary-box"><span>Gross Total</span><strong id="sumTotalSale">0.00</strong></div>
    <div class="summary-box"><span>Total Disc</span><strong id="sumTotalDisc">0.00</strong></div>
    <div class="summary-box"><span>Total GST</span><strong id="sumGST">0.00</strong></div>
    <div class="summary-box"><span>Net Total</span><strong id="sumNet">0.00</strong></div>
    <div class="summary-box"><span>Balance</span><strong id="sumBalance">0.00</strong></div>
</div>

<div class="actions">
    <a href="sale-entry.html" class="btn-back">Back</a>
    <div class="input-group" style="width: 150px; flex: none;">
        <label>Paid Amount</label>
        <input type="number" id="paidAmt" placeholder="0.00" oninput="calculateFinal()">
    </div>
    <button class="btn-new" onclick="location.reload()">New</button>
    <button class="btn-save" onclick="saveSale(false)">Save Only</button>
    <button class="btn-print" onclick="saveSale(true)">Save & Print</button>
</div>

<script type="module">
import { db } from './firebase-config.js';
import { collection, addDoc, getDocs, query, orderBy, limit, serverTimestamp, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

let customers = [];
let items = [];

async function init() {
    try {
        const cSnap = await getDocs(collection(db, "customers"));
        customers = cSnap.docs.map(d => ({id: d.id, ...d.data()}));
        const cList = document.getElementById('customerList');
        customers.forEach(c => {
            let opt = document.createElement('option');
            opt.value = c.name;
            cList.appendChild(opt);
        });

        const iSnap = await getDocs(collection(db, "items"));
        items = iSnap.docs.map(d => ({id: d.id, ...d.data()}));
        const iList = document.getElementById('itemList');
        items.forEach(item => {
            let opt = document.createElement('option');
            opt.value = item.name;
            iList.appendChild(opt);
        });

        const q = query(collection(db, "sales"), orderBy("createdAt", "desc"), limit(1));
        const lastS = await getDocs(q);
        if (!lastS.empty) {
            const lastVal = lastS.docs[0].data().billNo;
            document.getElementById('billNo').innerText = (parseInt(lastVal) || 0) + 1;
        }
        
        document.getElementById('saleDate').valueAsDate = new Date();
        window.addRow();
    } catch (e) { console.error("Init Error:", e); }
}

window.updatePartyDetails = function() {
    const val = document.getElementById('partySearch').value;
    const c = customers.find(x => x.name === val);
    if(c) {
        document.getElementById('partyMeta').value = `${c.gst || 'URD'} | Contact: ${c.contact || 'NA'} | ${c.address1 || ''}`;
    }
};

window.addRow = function() {
    const tbody = document.getElementById('tableBody');
    const rowCount = tbody.rows.length + 1;
    const row = tbody.insertRow();
    row.innerHTML = `
        <td>${rowCount}</td>
        <td><input type="text" class="row-input i-group" placeholder="Group" readonly tabindex="-1"></td>
        <td><input type="text" class="row-input i-name" list="itemList" oninput="window.autoFillByName(this)"></td>
        <td><input type="number" class="row-input mrp" value="0" readonly></td>
        <td><input type="number" class="row-input rate" value="0" oninput="window.calculateFinal()"></td>
        <td><input type="number" class="row-input disc" value="0" oninput="window.calculateFinal()"></td>
        <td><input type="number" class="row-input schm" value="0" oninput="window.calculateFinal()"></td>
        <td><input type="number" class="row-input qty" value="1" oninput="window.calculateFinal()"></td>
        <td><input type="number" class="row-input gst" value="0" oninput="window.calculateFinal()"></td>
        <td><input type="number" class="row-input net" value="0.00" readonly style="font-weight:bold;"></td>
    `;
};

window.autoFillByName = function(input) {
    const row = input.closest('tr');
    const item = items.find(i => i.name === input.value);
    if(item) {
        row.querySelector('.i-group').value = item.group || 'General';
        row.querySelector('.mrp').value = item.mrp || 0;
        row.querySelector('.rate').value = item.sale || 0;
        row.querySelector('.gst').value = item.gst || 0;
        window.calculateFinal();
    }
};

window.calculateFinal = function() {
    let tGross = 0, tDisc = 0, tGst = 0, tNet = 0;
    const mode = document.getElementById('taxMode').value;

    document.querySelectorAll('#tableBody tr').forEach(row => {
        const rate = parseFloat(row.querySelector('.rate').value) || 0;
        const qty = parseFloat(row.querySelector('.qty').value) || 0;
        const dPerc = parseFloat(row.querySelector('.disc').value) || 0;
        const schmAmt = parseFloat(row.querySelector('.schm').value) || 0;
        const gPerc = parseFloat(row.querySelector('.gst').value) || 0;

        let rowNet = 0, rowGross = 0, rowGst = 0, rowDisc = 0;

        if (mode === "WITHOUT_GST") {
            // NEW LOGIC: GST applied to rate first -> then Qty -> then Discount
            const rateWithGst = rate * (1 + gPerc/100);
            const totalBeforeDisc = rateWithGst * qty;
            
            rowDisc = (totalBeforeDisc * (dPerc/100)) + (schmAmt * qty);
            rowNet = totalBeforeDisc - rowDisc;
            
            rowGross = totalBeforeDisc; 
            // We calculate GST for the report database, but we will hide it from the UI summary below
            rowGst = (rate * qty) * (gPerc/100); 
        } else {
            // Standard Tax Invoice Flow
            const subtotal = rate * qty;
            rowDisc = (subtotal * (dPerc/100)) + (schmAmt * qty);
            const taxable = subtotal - rowDisc;
            rowGst = taxable * (gPerc/100);
            rowNet = taxable + rowGst;
            rowGross = subtotal;
        }

        row.querySelector('.net').value = rowNet.toFixed(2);
        tGross += rowGross;
        tDisc += rowDisc;
        tGst += rowGst;
        tNet += rowNet;
    });

    document.getElementById('sumTotalSale').innerText = tGross.toFixed(2);
    document.getElementById('sumTotalDisc').innerText = tDisc.toFixed(2);
    
    // VISIBILITY LOGIC: Show 0.00 for GST in Cash Memo mode as requested
    document.getElementById('sumGST').innerText = (mode === "WITHOUT_GST") ? "0.00" : tGst.toFixed(2);
    
    const finalRounded = Math.round(tNet);
    document.getElementById('sumNet').innerText = finalRounded.toFixed(2);
    
    const paid = parseFloat(document.getElementById('paidAmt').value) || 0;
    document.getElementById('sumBalance').innerText = (finalRounded - paid).toFixed(2);
};

window.saveSale = async function(shouldPrint = false) {
    const partyName = document.getElementById('partySearch').value;
    if(!partyName) return alert("Select a Customer!");

    const billItems = [];
    document.querySelectorAll('#tableBody tr').forEach(row => {
        const name = row.querySelector('.i-name').value;
        if(name) {
            const rRate = parseFloat(row.querySelector('.rate').value) || 0;
            const rQty = parseFloat(row.querySelector('.qty').value) || 0;
            const rGstPerc = parseFloat(row.querySelector('.gst').value) || 0;
            const rGstAmt = (rRate * rQty) * (rGstPerc / 100);

            billItems.push({
                group: row.querySelector('.i-group').value,
                name: name,
                qty: row.querySelector('.qty').value,
                rate: row.querySelector('.rate').value,
                mrp: row.querySelector('.mrp').value,
                disc: row.querySelector('.disc').value,
                schm: row.querySelector('.schm').value,
                gst: row.querySelector('.gst').value,
                gstAmt: rGstAmt.toFixed(2), 
                net: row.querySelector('.net').value
            });
        }
    });

    const saleData = {
        billNo: document.getElementById('billNo').innerText,
        customerName: partyName,
        taxMode: document.getElementById('taxMode').value,
        custMeta: document.getElementById('partyMeta').value,
        gstNo: document.getElementById('partyMeta').value.split('|')[0].trim(),
        date: document.getElementById('saleDate').value,
        items: billItems,
        summary: {
            gross: document.getElementById('sumTotalSale').innerText,
            disc: document.getElementById('sumTotalDisc').innerText,
            // We save the ACTUAL GST to the database for your reports, even if hidden in UI
            gst: (document.querySelectorAll('#tableBody tr').length > 0) ? calculateTotalGstInternal() : "0.00",
            net: document.getElementById('sumNet').innerText
        },
        createdAt: serverTimestamp()
    };

    try {
        const docRef = await addDoc(collection(db, "sales"), saleData);
        await setDoc(doc(db, "tax_invoices", docRef.id), saleData);

        if (shouldPrint) {
            localStorage.setItem("lastBill", JSON.stringify(saleData));
            window.open('print.html', '_blank');
        } else {
            alert("Saved to Tax Register Successfully!");
        }
        location.reload();
    } catch (e) { alert("Error: " + e.message); }
};

// Helper to get total GST for the database record
function calculateTotalGstInternal() {
    let total = 0;
    document.querySelectorAll('#tableBody tr').forEach(row => {
        const rate = parseFloat(row.querySelector('.rate').value) || 0;
        const qty = parseFloat(row.querySelector('.qty').value) || 0;
        const gPerc = parseFloat(row.querySelector('.gst').value) || 0;
        total += (rate * qty) * (gPerc / 100);
    });
    return total.toFixed(2);
}

init();
</script>
</body>
</html>

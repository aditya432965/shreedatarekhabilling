<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sale Return Entry | Shree Datarekha Enterprises</title>
    <style>
        :root {
            --primary: #ff2f92;
            --primary-light: #ffb3d9;
            --bg-dark: #1a0510;
            --accent-green: #00ff88;
            --accent-orange: #ff9800;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            background: linear-gradient(135deg, #2b000f, #5c0a2e, #8e1446);
            color: #fff;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: auto;
            background: rgba(0, 0, 0, 0.85);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 15px;
        }

        .title { font-size: 24px; font-weight: 700; color: var(--primary-light); }

        /* SEARCH SECTION */
        .search-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 12px;
        }

        .input-group { display: flex; flex-direction: column; gap: 5px; }
        .input-group label { font-size: 12px; color: var(--primary-light); font-weight: bold; }

        input, select {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px;
            border-radius: 8px;
            color: white;
            outline: none;
        }
        input:focus { border-color: var(--primary); }

        /* TABLE SECTION */
        .table-container {
            overflow-x: auto;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            margin-bottom: 20px;
        }

        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th { background: var(--primary); color: white; padding: 12px; text-align: left; font-size: 14px; }
        td { padding: 12px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); font-size: 14px; }
        
        .row-qty { width: 80px; text-align: center; font-weight: bold; background: rgba(255,47,146,0.1); }
        .row-reason { width: 150px; background: #000; border: 1px solid #444; }

        /* STOCK INSIGHT BOX */
        .insight-box {
            background: #1a0510;
            border: 1px solid var(--primary);
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
        }

        /* HISTORY BOX (New Section) */
        .history-box {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #444;
            border-radius: 15px;
            padding: 20px;
            margin-top: 30px;
        }

        .history-card {
            background: rgba(255,255,255,0.05);
            margin-bottom: 10px;
            padding: 15px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .insight-title {
            color: var(--primary-light);
            font-size: 18px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stock-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }

        .stock-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid var(--primary);
        }

        .stock-card h4 { color: var(--accent-orange); margin-bottom: 8px; font-size: 14px; }
        .qty-row { display: flex; justify-content: space-between; margin-top: 5px; font-size: 13px; }
        .final-qty { color: var(--accent-green); font-weight: bold; font-size: 16px; }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-save { background: var(--accent-green); color: #000; width: 100%; margin-top: 20px; font-size: 16px; }
        .btn-back { background: #555; color: white; text-decoration: none; font-size: 14px; }
        .btn:hover { opacity: 0.9; transform: scale(1.01); }

    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="title">🔄 Sale Return Entry</div>
        <a href="sale-entry.html" class="btn btn-back">⬅ Back</a>
    </div>

    <div class="search-grid">
        <div class="input-group">
            <label>Bill Number</label>
            <input type="text" id="billNoInput" placeholder="Enter Bill No..." onchange="fetchBillDetails()">
        </div>
        <div class="input-group">
            <label>Customer Name</label>
            <input type="text" id="customerName" readonly placeholder="Auto-fetched">
        </div>
        <div class="input-group">
            <label>Original Date</label>
            <input type="text" id="billDate" readonly>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Item Name</th>
                    <th>Sold Qty</th>
                    <th>Unit</th>
                    <th>Rate</th>
                    <th>Return Qty</th>
                    <th>Reason</th>
                    <th>Total Refund</th>
                </tr>
            </thead>
            <tbody id="returnTableBody">
                <tr><td colspan="7" style="text-align:center; padding:30px; color:#888;">Enter Bill Number to load items...</td></tr>
            </tbody>
        </table>
    </div>

    <div class="insight-box" id="stockInsightBox" style="display: none;">
        <div class="insight-title">📊 Live Stock Update Preview</div>
        <div class="stock-grid" id="stockGrid"></div>
    </div>

    <button class="btn btn-save" onclick="saveReturnEntry()">💾 Save Sale Return & Update Stock</button>

    <div class="history-box">
        <div class="insight-title">📜 Recent Returns History</div>
        <div id="historyList">
            <p style="color:#888; text-align:center;">Loading history...</p>
        </div>
    </div>
</div>

<script type="module">
    import { db } from './firebase-config.js';
    import { 
        collection, getDocs, query, where, addDoc, serverTimestamp, orderBy, limit 
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    let activeBillItems = [];
    let currentStockData = {};

    /* LOAD HISTORY ON START */
    window.addEventListener('load', fetchReturnsHistory);

    /* 1. FETCH BILL DETAILS */
    window.fetchBillDetails = async function() {
        const billNo = document.getElementById("billNoInput").value;
        const tbody = document.getElementById("returnTableBody");
        if(!billNo) return;

        tbody.innerHTML = "<tr><td colspan='7' style='text-align:center;'>Searching Bill...</td></tr>";

        try {
            const q = query(collection(db, "sales"), where("billNo", "==", billNo));
            const snap = await getDocs(q);

            if(snap.empty) {
                alert("Bill not found!");
                tbody.innerHTML = "";
                return;
            }

            const data = snap.docs[0].data();
            document.getElementById("customerName").value = data.customerName || "N/A";
            document.getElementById("billDate").value = data.date || "N/A";
            
            activeBillItems = data.items;
            renderReturnTable();
            loadCurrentStock(); 
        } catch (e) {
            console.error(e);
            alert("Error fetching bill data");
        }
    };

    /* 2. RENDER TABLE */
    function renderReturnTable() {
        const tbody = document.getElementById("returnTableBody");
        tbody.innerHTML = "";

        activeBillItems.forEach((item, index) => {
            tbody.innerHTML += `
                <tr>
                    <td>${item.name}</td>
                    <td>${item.qty}</td>
                    <td>${item.unit || 'PCS'}</td>
                    <td>₹ ${item.rate}</td>
                    <td>
                        <input type="number" class="row-qty" value="0" min="0" max="${item.qty}" 
                        oninput="updateInsight(${index}, this.value)" id="ret-qty-${index}">
                    </td>
                    <td>
                        <select class="row-reason">
                            <option value="Expired">Expired</option>
                            <option value="Damaged">Damaged</option>
                            <option value="Extra">Extra</option>
                        </select>
                    </td>
                    <td style="color:var(--accent-green); font-weight:bold;">₹ <span id="refund-${index}">0.00</span></td>
                </tr>
            `;
        });
    }

    /* 3. STOCK LOGIC */
    async function loadCurrentStock() {
        const grid = document.getElementById("stockGrid");
        grid.innerHTML = "Loading Stock Data...";
        document.getElementById("stockInsightBox").style.display = "block";

        try {
            for (let item of activeBillItems) {
                const q = query(collection(db, "items"), where("name", "==", item.name));
                const snap = await getDocs(q);
                currentStockData[item.name] = !snap.empty ? parseFloat(snap.docs[0].data().stock || 0) : 0;
            }
            updateInsight();
        } catch (e) { console.error(e); }
    }

    window.updateInsight = function(index, value) {
        if(index !== undefined) {
            const rate = activeBillItems[index].rate;
            document.getElementById(`refund-${index}`).innerText = (parseFloat(value) * rate).toFixed(2);
        }

        const grid = document.getElementById("stockGrid");
        grid.innerHTML = "";

        activeBillItems.forEach((item, i) => {
            const retQty = parseFloat(document.getElementById(`ret-qty-${i}`).value) || 0;
            const currentStock = currentStockData[item.name] || 0;
            const finalQty = currentStock + retQty;

            grid.innerHTML += `
                <div class="stock-card">
                    <h4>📦 ${item.name}</h4>
                    <div class="qty-row"><span>Current Stock:</span> <span>${currentStock}</span></div>
                    <div class="qty-row"><span>Return Add:</span> <span style="color:var(--primary);">+ ${retQty}</span></div>
                    <div class="qty-row" style="border-top:1px solid #444; margin-top:10px; padding-top:5px;">
                        <span>Final Predicted:</span> <span class="final-qty">${finalQty}</span>
                    </div>
                </div>
            `;
        });
    };

    /* 4. SAVE DATA */
    window.saveReturnEntry = async function() {
        const billNo = document.getElementById("billNoInput").value;
        if(!billNo) return alert("Select a Bill!");

        const returnDetails = {
            billNo: billNo,
            customerName: document.getElementById("customerName").value,
            returnDate: serverTimestamp(),
            returnedItems: [],
            totalRefundAmount: 0
        };

        activeBillItems.forEach((item, i) => {
            const qty = parseFloat(document.getElementById(`ret-qty-${i}`).value) || 0;
            if(qty > 0) {
                returnDetails.returnedItems.push({
                    name: item.name,
                    qty: qty,
                    rate: item.rate,
                    reason: document.querySelectorAll(".row-reason")[i].value
                });
                returnDetails.totalRefundAmount += (qty * item.rate);
            }
        });

        if(returnDetails.returnedItems.length === 0) return alert("Enter return quantity!");

        try {
            await addDoc(collection(db, "saleReturns"), returnDetails);
            alert("Return Saved Successfully! ✅");
            location.reload();
        } catch (e) {
            alert("Error: " + e.message);
        }
    }

    /* 5. FETCH HISTORY (BOX BELOW) */
    async function fetchReturnsHistory() {
        const container = document.getElementById("historyList");
        try {
            const q = query(collection(db, "saleReturns"), orderBy("returnDate", "desc"), limit(10));
            const snap = await getDocs(q);

            if(snap.empty) {
                container.innerHTML = "<p style='text-align:center; color:#888;'>No returns found.</p>";
                return;
            }

            container.innerHTML = "";
            snap.forEach(doc => {
                const data = doc.data();
                const date = data.returnDate ? data.returnDate.toDate().toLocaleDateString() : 'Just now';
                
                let itemSummary = data.returnedItems.map(i => `${i.name} (${i.qty})`).join(', ');

                container.innerHTML += `
                    <div class="history-card">
                        <div>
                            <span style="color:var(--primary-light); font-weight:bold;">Bill #${data.billNo}</span> - 
                            <span>${data.customerName}</span><br>
                            <small style="color:#aaa;">Items: ${itemSummary}</small>
                        </div>
                        <div style="text-align:right;">
                            <span style="color:var(--accent-green); font-weight:bold;">₹${data.totalRefundAmount.toFixed(2)}</span><br>
                            <small style="color:#888;">${date}</small>
                        </div>
                    </div>
                `;
            });
        } catch (e) {
            console.error(e);
            container.innerHTML = "<p style='color:red;'>Failed to load history.</p>";
        }
    }

</script>
</body>
</html>

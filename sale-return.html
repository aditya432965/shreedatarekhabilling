<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sale Return | Shree Datarekha Enterprises</title>
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --accent: #ff2f92;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-muted: #94a3b8;
            --success: #10b981;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); color: #f8fafc; padding: 20px; min-height: 100vh; }
        .container { max-width: 1200px; margin: auto; }

        /* Mode Switcher */
        .mode-selector {
            display: flex; gap: 10px; margin-bottom: 20px;
            background: var(--card-bg); padding: 10px; border-radius: 12px;
        }
        .mode-btn {
            flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #334155;
            background: transparent; color: white; cursor: pointer; font-weight: 600;
        }
        .mode-btn.active { background: var(--primary); color: #000; border-color: var(--primary); }

        .page-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 25px; padding: 20px;
            background: var(--card-bg); border-radius: 16px; border-left: 6px solid var(--primary);
        }

        /* Forms */
        .search-section, .build-section {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px;
            background: var(--card-bg); padding: 25px; border-radius: 16px; margin-bottom: 20px;
        }
        .input-box label { display: block; font-size: 11px; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; }
        input, select {
            width: 100%; padding: 12px; border-radius: 8px; background: #0f172a; 
            border: 1px solid #334155; color: white; outline: none;
        }
        input:focus { border-color: var(--primary); }

        /* Tables */
        .table-container { background: var(--card-bg); border-radius: 16px; overflow: hidden; margin-bottom: 20px; border: 1px solid #334155; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #334155; padding: 15px; text-align: left; font-size: 12px; color: var(--primary); }
        td { padding: 12px 15px; border-bottom: 1px solid #334155; font-size: 14px; }

        .summary-bar {
            display: flex; justify-content: flex-end; align-items: center;
            background: #000; padding: 20px; border-radius: 12px; margin-bottom: 20px;
        }
        .total-box strong { font-size: 24px; color: var(--success); margin-left: 15px; }

        .btn { padding: 12px 24px; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background: linear-gradient(to right, var(--primary), var(--secondary)); color: white; width: 100%; justify-content: center; }
        .btn-print { background: #334155; color: white; font-size: 12px; padding: 6px 12px; }
        .btn-add { background: var(--success); color: white; height: 45px; margin-top: 25px; }
    </style>
</head>
<body>

<div class="container">
    <header class="page-header">
        <div>
            <h2>Sale Return</h2>
            <p id="mode-text" style="color: var(--text-muted); font-size: 13px;">Processing existing sale records</p>
        </div>
        <a href="sale-entry.html" class="btn" style="border:1px solid #334155; color:white;">← Back</a>
    </header>

    <div class="mode-selector">
        <button class="mode-btn active" onclick="switchMode('saled')">SALED (Auto)</button>
        <button class="mode-btn" onclick="switchMode('build')">BUILD (Manual)</button>
    </div>

    <div id="section-saled" class="search-section">
        <div class="input-box">
            <label>Bill Number</label>
            <input type="text" id="billNoSearch" placeholder="Enter Bill #" onchange="lookupBill()">
        </div>
        <div class="input-box">
            <label>Customer</label>
            <input type="text" id="custName" readonly style="opacity:0.6">
        </div>
    </div>

    <div id="section-build" class="build-section" style="display:none;">
        <div class="input-box">
            <label>Customer Name</label>
            <input type="text" id="manualCust" list="custList" placeholder="Search Customer...">
        </div>
        <div class="input-box">
            <label>Product</label>
            <input type="text" id="manualProd" list="prodList" placeholder="Search Item...">
        </div>
        <div class="input-box">
            <label>Qty</label>
            <input type="number" id="manualQty" value="1">
        </div>
        <div class="input-box">
            <label>Refund Rate</label>
            <input type="number" id="manualRate" placeholder="0.00">
        </div>
        <button class="btn btn-add" onclick="addManualItem()">+ Add</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Item</th>
                    <th>Qty</th>
                    <th>Rate</th>
                    <th>Reason</th>
                    <th style="text-align:right;">Line Total</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="returnList">
                <tr><td colspan="6" style="text-align:center; padding:30px; color:var(--text-muted);">No items added yet.</td></tr>
            </tbody>
        </table>
    </div>

    <div class="summary-bar">
        <div class="total-box">
            <span>Refund Total:</span>
            <strong id="grandRefundDisplay">₹ 0.00</strong>
        </div>
    </div>

    <button class="btn btn-primary" onclick="processReturn()">Confirm, Save & Print</button>

    <div style="margin-top: 40px;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h3 style="color:var(--primary);">📅 Recent Return Transactions</h3>
        </div>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Bill # / Customer</th>
                        <th>Amount</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="historyBody"></tbody>
            </table>
        </div>
    </div>
</div>

<datalist id="custList"></datalist>
<datalist id="prodList"></datalist>

<script type="module">
    import { db } from './firebase-config.js';
    import { 
        collection, getDocs, query, where, addDoc, serverTimestamp, orderBy, limit, doc, updateDoc, increment 
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    let currentMode = 'saled';
    let returnItems = [];
    let activeBillNo = "MANUAL";

    // Initialize datalists
    async function init() {
        const cSnap = await getDocs(collection(db, "customers"));
        document.getElementById('custList').innerHTML = cSnap.docs.map(d => `<option value="${d.data().name}">`).join('');
        
        const iSnap = await getDocs(collection(db, "items"));
        document.getElementById('prodList').innerHTML = iSnap.docs.map(d => `<option value="${d.data().name}">`).join('');
        loadHistory();
    }

    window.switchMode = function(mode) {
        currentMode = mode;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        
        document.getElementById('section-saled').style.display = mode === 'saled' ? 'grid' : 'none';
        document.getElementById('section-build').style.display = mode === 'build' ? 'grid' : 'none';
        document.getElementById('mode-text').innerText = mode === 'saled' ? 'Processing existing sale records' : 'Building manual return entry';
        
        returnItems = [];
        renderTable();
    };

    // Mode: Saled (Lookup)
    window.lookupBill = async function() {
        const billNo = document.getElementById('billNoSearch').value;
        if(!billNo) return;
        const q = query(collection(db, "sales"), where("billNo", "==", billNo));
        const snap = await getDocs(q);
        if(snap.empty) return alert("Bill not found");

        const data = snap.docs[0].data();
        activeBillNo = billNo;
        document.getElementById('custName').value = data.customerName;
        
        returnItems = data.items.map(item => ({
            name: item.name,
            qty: 0, 
            maxQty: item.qty,
            rate: item.rate,
            reason: 'Damaged'
        }));
        renderTable();
    };

    // Mode: Build (Manual Add)
    window.addManualItem = function() {
        const name = document.getElementById('manualProd').value;
        const qty = parseFloat(document.getElementById('manualQty').value);
        const rate = parseFloat(document.getElementById('manualRate').value);
        
        if(!name || !qty || !rate) return alert("Fill all fields");

        returnItems.push({ name, qty, rate, reason: 'Manual Return' });
        renderTable();
        document.getElementById('manualProd').value = '';
        document.getElementById('manualQty').value = '1';
    };

    function renderTable() {
        const tbody = document.getElementById('returnList');
        tbody.innerHTML = "";
        let grand = 0;

        returnItems.forEach((item, idx) => {
            const lineTotal = item.qty * item.rate;
            grand += lineTotal;
            tbody.innerHTML += `
                <tr>
                    <td><strong>${item.name}</strong></td>
                    <td><input type="number" value="${item.qty}" onchange="updateQty(${idx}, this.value)" style="width:60px"></td>
                    <td>₹${item.rate}</td>
                    <td>
                        <select onchange="returnItems[${idx}].reason = this.value">
                            <option>Damaged</option><option>Expired</option><option>Dissatisfied</option>
                        </select>
                    </td>
                    <td style="text-align:right;">₹${lineTotal.toFixed(2)}</td>
                    <td><button onclick="removeItem(${idx})" style="background:none; border:none; color:red; cursor:pointer;">✕</button></td>
                </tr>
            `;
        });
        document.getElementById('grandRefundDisplay').innerText = `₹ ${grand.toFixed(2)}`;
    }

    window.updateQty = (idx, val) => { 
        returnItems[idx].qty = parseFloat(val); 
        renderTable(); 
    };
    
    window.removeItem = (idx) => { 
        returnItems.splice(idx, 1); 
        renderTable(); 
    };

    window.processReturn = async function() {
        const filtered = returnItems.filter(i => i.qty > 0);
        if(filtered.length === 0) return alert("Add items first");

        const cust = currentMode === 'saled' ? document.getElementById('custName').value : document.getElementById('manualCust').value;
        const total = filtered.reduce((acc, curr) => acc + (curr.qty * curr.rate), 0);

        const returnData = {
            billNo: activeBillNo,
            customerName: cust,
            items: filtered,
            totalRefund: total,
            timestamp: serverTimestamp(),
            date: new Date().toLocaleDateString()
        };

        try {
            // 1. Save to DB
            const docRef = await addDoc(collection(db, "saleReturns"), returnData);
            
            // 2. Update Stock
            for(let item of filtered) {
                const q = query(collection(db, "items"), where("name", "==", item.name));
                const snap = await getDocs(q);
                if(!snap.empty) {
                    await updateDoc(doc(db, "items", snap.docs[0].id), { stock: increment(item.qty) });
                }
            }

            // 3. Prepare for Printing
            localStorage.setItem("lastReturnPrint", JSON.stringify(returnData));
            window.location.href = "sale-print.html";

        } catch (e) { alert(e.message); }
    };

    // Print from History
    window.printHistory = (dataJson) => {
        const data = JSON.parse(decodeURIComponent(dataJson));
        localStorage.setItem("lastReturnPrint", JSON.stringify(data));
        window.location.href = "sale-print.html";
    };

    async function loadHistory() {
        const q = query(collection(db, "saleReturns"), orderBy("timestamp", "desc"), limit(10));
        const snap = await getDocs(q);
        const historyBody = document.getElementById('historyBody');
        historyBody.innerHTML = "";
        
        snap.forEach(doc => {
            const d = doc.data();
            const date = d.date || "Just now";
            const dataString = encodeURIComponent(JSON.stringify(d));
            historyBody.innerHTML += `
                <tr>
                    <td>${date}</td>
                    <td>#${d.billNo} - ${d.customerName}</td>
                    <td style="color:var(--success); font-weight:bold;">₹${d.totalRefund.toFixed(2)}</td>
                    <td><button class="btn btn-print" onclick="printHistory('${dataString}')">🖨️ Print</button></td>
                </tr>
            `;
        });
    }

    init();
</script>
</body>
</html>

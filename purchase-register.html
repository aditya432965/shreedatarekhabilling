<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purchase Register | Shree Datarekha Enterprises</title>
    <style>
        :root {
            --primary: #ff2f92;
            --secondary: #5c0a2e;
            --bg: #0f172a;
            --card: rgba(0, 0, 0, 0.85);
            --text: #ddd;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body {
            background: linear-gradient(135deg, #2b000f, #5c0a2e, #0f172a);
            color: #fff;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: auto;
            background: var(--card);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255, 47, 146, 0.2);
        }

        /* Business Analytics Dashboard */
        .analytics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 15px;
            border-left: 5px solid var(--primary);
            text-align: center;
        }

        .stat-card small { font-size: 12px; color: #ffb3d9; text-transform: uppercase; letter-spacing: 1px; }
        .stat-card h2 { font-size: 24px; margin-top: 5px; color: #00ff88; }

        /* Header & Search */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .search-box { display: flex; gap: 10px; flex-wrap: wrap; }
        .search-box input {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 15px;
            border-radius: 8px;
            color: white;
            outline: none;
        }
        .search-box input:focus { border-color: var(--primary); }

        /* Report Table */
        .table-container {
            overflow-x: auto;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
        }

        table { width: 100%; border-collapse: collapse; min-width: 1100px; }
        th {
            background: var(--primary);
            color: white;
            padding: 15px;
            text-align: left;
            font-size: 13px;
            text-transform: uppercase;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 14px;
        }

        tr:hover { background: rgba(255, 47, 146, 0.1); }

        .badge {
            padding: 4px 8px;
            border-radius: 5px;
            font-size: 11px;
            font-weight: bold;
        }
        .badge-paid { background: #00ff8822; color: #00ff88; border: 1px solid #00ff88; }
        .badge-due { background: #ff333322; color: #ff3333; border: 1px solid #ff3333; }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            justify-content: center; align-items: center; z-index: 9999;
        }
        .modal-content {
            background: #1a0510;
            padding: 25px;
            border-radius: 15px;
            width: 90%;
            max-width: 1000px;
            border: 1px solid var(--primary);
        }

        .btn-print {
            background: #fff; color: #000; border: none; padding: 10px 20px;
            border-radius: 8px; cursor: pointer; font-weight: bold;
        }

        @media print {
            .search-box, .btn-print, .actions-col { display: none !important; }
            body { background: white; color: black; }
            .container { border: none; box-shadow: none; width: 100%; max-width: 100%; }
            th { background: #eee !important; color: black; }
            td { color: black; border-bottom: 1px solid #ccc; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 style="color: #ffb3d9;">📊 Purchase Register Report</h1>
        <div class="search-box">
            <input type="text" id="filterSupplier" placeholder="Filter by Supplier..." onkeyup="loadPurchaseReport()">
            <input type="date" id="filterDate" onchange="loadPurchaseReport()">
            <button class="btn-print" onclick="window.print()">🖨️ Print Report</button>
        </div>
    </div>

    <div class="analytics-grid">
        <div class="stat-card">
            <small>Total Purchase Value</small>
            <h2 id="totalPurchVal">₹ 0.00</h2>
        </div>
        <div class="stat-card">
            <small>Total Paid Amount</small>
            <h2 id="totalPaidVal" style="color: #4ade80;">₹ 0.00</h2>
        </div>
        <div class="stat-card">
            <small>Total Balance Due</small>
            <h2 id="totalBalVal" style="color: #f87171;">₹ 0.00</h2>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Bill No</th>
                    <th>Supplier Name</th>
                    <th>Type</th>
                    <th>Sub-Total</th>
                    <th>GST Paid</th>
                    <th>Net Amount</th>
                    <th>Balance</th>
                    <th class="actions-col">Details</th>
                </tr>
            </thead>
            <tbody id="reportTableBody">
                </tbody>
        </table>
    </div>
</div>

<div id="itemModal" class="modal">
    <div class="modal-content">
        <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
            <h2 id="modalTitle" style="color:var(--primary)">Item Details</h2>
            <button onclick="closeModal()" style="background:none; border:none; color:white; font-size:24px; cursor:pointer;">&times;</button>
        </div>
        <div class="table-container">
            <table id="itemsDetailTable">
                <thead>
                    <tr>
                        <th>Item Name</th>
                        <th>Qty</th>
                        <th>Rate</th>
                        <th>GST %</th>
                        <th>Net</th>
                    </tr>
                </thead>
                <tbody id="itemsDetailBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
/* 1. FIREBASE IMPORTS */
import { db } from './firebase-config.js';
import { 
    collection, 
    getDocs, 
    query, 
    orderBy 
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

/* 🔐 LOGIN CHECK */
if(localStorage.getItem("loggedIn") !== "true") window.location.href = "index.html";

/* 📦 GLOBAL STATE */
let allPurchases = [];

/**
 * ☁️ FETCH DATA FROM CLOUD
 */
async function loadPurchaseReport() {
    const tbody = document.getElementById('reportTableBody');
    tbody.innerHTML = "<tr><td colspan='9' style='text-align:center;'>Fetching Cloud Data...</td></tr>";

    try {
        // Querying the 'purchases' collection by date
        const q = query(collection(db, "purchases"), orderBy("header.billDate", "desc"));
        const querySnapshot = await getDocs(q);
        
        allPurchases = querySnapshot.docs.map(doc => ({
            id: doc.id,
            ...doc.data()
        }));

        console.log("Purchases Loaded:", allPurchases.length);
        renderReport();
    } catch (err) {
        console.error("Fetch Error:", err);
        tbody.innerHTML = `<tr style='color:red'><td colspan='9'>Error: ${err.message}</td></tr>`;
    }
}

/**
 * 📊 RENDER REPORT & FILTERS
 */
window.renderReport = function() {
    const supplierQuery = document.getElementById('filterSupplier').value.toLowerCase();
    const dateQuery = document.getElementById('filterDate').value;
    const tbody = document.getElementById('reportTableBody');
    
    tbody.innerHTML = "";
    let sums = { total: 0, paid: 0, bal: 0 };

    allPurchases.forEach((bill) => {
        // 🔍 Filter Logic
        if (supplierQuery && !bill.header.supplierName.toLowerCase().includes(supplierQuery)) return;
        if (dateQuery && bill.header.billDate !== dateQuery) return;

        const net = parseFloat(bill.summary.netAmt) || 0;
        const paid = parseFloat(bill.summary.paidAmt) || 0;
        const bal = parseFloat(bill.summary.balanceAmt) || 0;

        sums.total += net;
        sums.paid += paid;
        sums.bal += bal;

        // 🧮 GST Back-Calculation
        let gstTotal = 0;
        (bill.items || []).forEach(it => {
            const qty = parseFloat(it.qty) || 0;
            const rate = parseFloat(it.purchaseRate || it.rate) || 0;
            const tax = parseFloat(it.taxPercent || it.tax) || 0;
            const sub = qty * rate;
            gstTotal += (sub * (tax / 100));
        });

        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td>${bill.header.billDate}</td>
            <td><strong>${bill.header.billNo}</strong></td>
            <td>${bill.header.supplierName}</td>
            <td><span class="badge ${bill.header.paymentType === 'Cash' ? 'badge-paid' : 'badge-due'}">${bill.header.paymentType}</span></td>
            <td>₹ ${(net - gstTotal).toFixed(2)}</td>
            <td style="color:#ffb3d9">₹ ${gstTotal.toFixed(2)}</td>
            <td style="color:#00ff88; font-weight:bold;">₹ ${net.toFixed(2)}</td>
            <td style="color:${bal > 0 ? '#ff4444' : '#00ff88'}">₹ ${bal.toFixed(2)}</td>
            <td class="actions-col">
                <button onclick="window.viewDetails('${bill.id}')" style="background:none; border:none; cursor:pointer; font-size:1.2rem;">👁️</button>
            </td>
        `;
        tbody.appendChild(tr);
    });

    // 📈 Update Dashboard Numbers
    const format = (val) => "₹ " + val.toLocaleString('en-IN', {minimumFractionDigits: 2});
    document.getElementById('totalPurchVal').innerText = format(sums.total);
    document.getElementById('totalPaidVal').innerText = format(sums.paid);
    document.getElementById('totalBalVal').innerText = format(sums.bal);
};

/**
 * 🔎 VIEW INDIVIDUAL BILL ITEMS (Modal)
 */
window.viewDetails = function(docId) {
    const bill = allPurchases.find(p => p.id === docId);
    if (!bill) return;

    const tbody = document.getElementById('itemsDetailBody');
    document.getElementById('modalTitle').innerText = `Bill: ${bill.header.billNo} (${bill.header.supplierName})`;
    
    tbody.innerHTML = "";
    (bill.items || []).forEach(it => {
        tbody.innerHTML += `
            <tr>
                <td>${it.itemName || it.name}</td>
                <td>${it.qty} ${it.unit || ''}</td>
                <td>₹ ${it.purchaseRate || it.rate}</td>
                <td>${it.taxPercent || it.tax}%</td>
                <td style="font-weight:bold;">₹ ${it.netAmt || it.net}</td>
            </tr>
        `;
    });
    document.getElementById('itemModal').style.display = "flex";
};

window.closeModal = function() { 
    document.getElementById('itemModal').style.display = "none"; 
};

// 🚀 INITIALIZE
loadPurchaseReport();

</script>

</body>
</html>

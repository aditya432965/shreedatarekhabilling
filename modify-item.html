<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Modify Item Master | Shree Datarekha Enterprises</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Segoe UI', Arial, sans-serif;
}

body{
  min-height:100vh;
  background:linear-gradient(135deg,#2b000f,#5c0a2e,#8e1446);
  display:flex;
  justify-content:center;
  padding:15px;
  color:white;
}

.container{
  width:100%;
  max-width:1100px;
  background:rgba(0,0,0,.7);
  backdrop-filter: blur(10px);
  border-radius:26px;
  padding:20px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.6);
}

h1{
  text-align:center;
  margin-bottom:20px;
  font-size: 1.8rem;
}

/* SEARCH & FILTER SECTION */
.filters{
  display:flex;
  gap:12px;
  margin-bottom:20px;
  flex-wrap:wrap;
}

.search-wrapper {
  flex: 2;
  min-width: 250px;
  position: relative;
}

#search {
  width: 100%;
  padding: 14px 20px;
  border-radius: 50px;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(0,0,0,0.4);
  color: white;
  outline: none;
  font-size: 15px;
  transition: 0.3s;
}

#search:focus {
  border-color: #ff2f92;
  background: rgba(0,0,0,0.6);
  box-shadow: 0 0 15px rgba(255, 47, 146, 0.3);
}

#groupFilter {
  flex: 1;
  min-width: 150px;
  padding: 12px;
  border-radius: 50px;
  background: rgba(0,0,0,0.4);
  color: white;
  border: 1px solid rgba(255,255,255,0.2);
}

/* MAIN LAYOUT */
.main{
  display:grid;
  grid-template-columns: 1fr 1.2fr;
  gap:25px;
}

/* SCROLLABLE LIST */
.list-container {
  background: rgba(0,0,0,0.3);
  border-radius: 18px;
  border: 1px solid rgba(255,159,197,0.2);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.list-header {
  background: #ff2f92;
  padding: 10px;
  font-weight: bold;
  text-align: center;
  font-size: 14px;
}

.list-scroll {
  max-height: 500px;
  overflow-y: auto;
}

table{
  width:100%;
  border-collapse:collapse;
}

th, td {
  padding: 12px;
  text-align: left;
  font-size: 14px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

th {
  background: rgba(0,0,0,0.5);
  position: sticky;
  top: 0;
  color: #ffb3d9;
}

tr:hover td {
  background: rgba(255, 255, 255, 0.1);
  cursor: pointer;
}

/* EDIT FORM */
.form{
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:15px;
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 18px;
  align-content: start;
}

.form-group {
  display: flex;
  flex-direction: column;
}

.full-width { grid-column: 1 / -1; }

label{
  font-size: 12px;
  color: #ffb3d9;
  margin-bottom: 5px;
  font-weight: 600;
  text-transform: uppercase;
}

input, select {
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #fff;
  color: #333;
  font-size: 14px;
}

/* BUTTONS */
.buttons{
  grid-column: 1 / -1;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  margin-top: 10px;
}

button{
  padding: 14px;
  border: none;
  border-radius: 12px;
  font-weight: 700;
  color: white;
  cursor: pointer;
  transition: 0.2s;
}

button:active { transform: scale(0.95); }

.update{ background: #4CAF50; }
.delete{ background: #e53935; }
.reset { background: #777; }
.back  { background: #444; }

/* MOBILE RESPONSIVENESS */
@media(max-width: 850px){
  .main { grid-template-columns: 1fr; }
  .list-scroll { max-height: 300px; }
  .container { padding: 15px; }
  h1 { font-size: 1.5rem; }
}

@media(max-width: 480px){
  .form { grid-template-columns: 1fr; }
  .buttons { grid-template-columns: 1fr; }
  .search-wrapper, #groupFilter { flex: 100%; }
}
</style>
</head>

<body>

<div class="container">
  <h1>Modify Item Master</h1>

  <div class="filters">
    <div class="search-wrapper">
      <input id="search" placeholder="Type name to search..." oninput="applyFilters()">
    </div>
    <select id="groupFilter" onchange="applyFilters()">
      <option value="">All Groups</option>
    </select>
  </div>

  <div class="main">
    <div class="list-container">
      <div class="list-header">Select Item to Edit</div>
      <div class="list-scroll">
        <table>
          <thead>
            <tr>
              <th>Item Name</th>
              <th>Group</th>
            </tr>
          </thead>
          <tbody id="itemList"></tbody>
        </table>
      </div>
    </div>

    <div class="form">
      <div class="form-group full-width">
        <label>Item Name</label>
        <input id="name">
      </div>

      <div class="form-group">
        <label>HSN Code</label>
        <input id="hsn">
      </div>

      <div class="form-group">
        <label>Group</label>
        <select id="group"></select>
      </div>

      <div class="form-group">
        <label>MRP</label>
        <input type="number" id="mrp">
      </div>

      <div class="form-group">
        <label>Sale Rate</label>
        <input type="number" id="sale">
      </div>

      <div class="form-group">
        <label>Purchase Rate</label>
        <input type="number" id="purchase">
      </div>

      <div class="form-group">
        <label>CGST %</label>
        <input type="number" id="cgst">
      </div>

      <div class="form-group">
        <label>SGST %</label>
        <input type="number" id="sgst">
      </div>

      <div class="form-group">
        <label>Opening Qty</label>
        <input type="number" id="qty">
      </div>

      <div class="buttons">
        <button class="update" onclick="updateItem()">Update</button>
        <button class="delete" onclick="deleteItem()">Delete</button>
        <button class="reset" onclick="reloadSelected()">Reset</button>
        <button class="back" onclick="goBack()">Back</button>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { db } from './firebase-config.js';
import { 
    collection, 
    getDocs, 
    doc, 
    updateDoc, 
    deleteDoc, 
    query, 
    orderBy 
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

if(localStorage.getItem("loggedIn") !== "true"){
    window.location.href = "index.html";
}

let items = [];         
let groups = [];        
let selectedDocId = null; 

async function loadCloudData() {
    try {
        const groupSnap = await getDocs(collection(db, "brandGroups"));
        groups = groupSnap.docs.map(d => d.data());
        loadGroupsUI();

        const itemSnap = await getDocs(query(collection(db, "items"), orderBy("name", "asc")));
        items = itemSnap.docs.map(d => ({
            id: d.id, 
            ...d.data()
        }));
        
        renderList(items);
    } catch (err) {
        console.error("Fetch Error:", err);
    }
}

function loadGroupsUI(){
    const groupSelect = document.getElementById("group");
    const filterSelect = document.getElementById("groupFilter");
    if(groupSelect) groupSelect.innerHTML = "";
    if(filterSelect) filterSelect.innerHTML = '<option value="">All Groups</option>';

    groups.forEach(g => {
        if(groupSelect) groupSelect.innerHTML += `<option value="${g.name}">${g.name}</option>`;
        if(filterSelect) filterSelect.innerHTML += `<option value="${g.name}">${g.name}</option>`;
    });
}

function renderList(list){
    const tbody = document.getElementById("itemList");
    if(!tbody) return;
    tbody.innerHTML = "";
    
    list.forEach(i => {
        tbody.innerHTML += `
            <tr onclick="selectItem('${i.id}')">
                <td style="font-weight:600;">${i.name}</td>
                <td style="color:#ffb3d9;">${i.group}</td>
            </tr>`;
    });
}

window.applyFilters = function(){
    const q = document.getElementById("search").value.toLowerCase();
    const g = document.getElementById("groupFilter").value;

    const filtered = items.filter(i => {
        return (
            (i.name.toLowerCase().includes(q)) &&
            (!g || i.group === g)
        );
    });
    renderList(filtered);
};

window.selectItem = function(docId){
    const it = items.find(i => i.id === docId);
    if(!it) return;

    selectedDocId = docId;

    document.getElementById("name").value = it.name || "";
    document.getElementById("hsn").value = it.hsn || "";
    document.getElementById("group").value = it.group || "";
    document.getElementById("mrp").value = it.mrp || "";
    document.getElementById("sale").value = it.sale || "";
    document.getElementById("purchase").value = it.purchase || "";
    document.getElementById("cgst").value = it.cgst || it.gst || "0"; // Handles legacy 'gst' field
    document.getElementById("sgst").value = it.sgst || "0";
    document.getElementById("qty").value = it.qty || "";
    
    if(window.innerWidth < 850) {
      document.querySelector('.form').scrollIntoView({ behavior: 'smooth' });
    }
};

window.updateItem = async function(){
    if(!selectedDocId) return alert("Please select an item from the list first");

    const updatedData = {
        name: document.getElementById("name").value.trim(),
        hsn: document.getElementById("hsn").value.trim(),
        group: document.getElementById("group").value,
        mrp: document.getElementById("mrp").value.trim(),
        sale: document.getElementById("sale").value.trim(),
        purchase: document.getElementById("purchase").value.trim(),
        cgst: document.getElementById("cgst").value.trim(),
        sgst: document.getElementById("sgst").value.trim(),
        qty: document.getElementById("qty").value.trim()
    };

    try {
        const docRef = doc(db, "items", selectedDocId);
        await updateDoc(docRef, updatedData);
        alert("Item updated successfully! ✅");
        await loadCloudData(); 
    } catch (e) {
        alert("Update Failed: " + e.message);
    }
};

window.deleteItem = async function(){
    if(!selectedDocId) return alert("Select an item first");
    if(!confirm("Are you sure you want to delete this item?")) return;

    try {
        await deleteDoc(doc(db, "items", selectedDocId));
        alert("Item deleted! 🗑️");
        selectedDocId = null;
        document.querySelectorAll(".form input").forEach(i => i.value = "");
        await loadCloudData();
    } catch (e) {
        alert("Delete Failed: " + e.message);
    }
};

window.reloadSelected = function(){
    if(selectedDocId) window.selectItem(selectedDocId);
};

window.goBack = function(){
    window.location.href = "master-entry.html";
};

loadCloudData();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Modify Item Master</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Segoe UI, Arial;
}

body{
  min-height:100vh;
  background:linear-gradient(135deg,#2b000f,#5c0a2e,#8e1446);
  display:flex;
  justify-content:center;
  padding:20px;
  color:white;
}

.container{
  width:100%;
  max-width:1100px;
  background:rgba(0,0,0,.65);
  border-radius:22px;
  padding:25px;
}

h1{
  text-align:center;
  margin-bottom:15px;
}

/* FILTER */
.filters{
  display:flex;
  gap:12px;
  justify-content:center;
  margin-bottom:20px;
  flex-wrap:wrap;
}
.filters input,
.filters select{
  padding:12px;
  border-radius:14px;
  border:none;
  min-width:220px;
}

/* MAIN */
.main{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

/* LIST */
.list{
  border:1px solid #ff9fc555;
  border-radius:16px;
  overflow:auto;
  max-height:460px;
}
table{
  width:100%;
  border-collapse:collapse;
}
th,td{
  padding:10px;
  border-bottom:1px solid #ff9fc533;
  font-size:13px;
}
th{background:#ff2f92}
tr:hover{
  background:rgba(255,255,255,.08);
  cursor:pointer;
}

/* FORM */
.form{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
label{
  font-size:13px;
  color:#ffb3d9;
}
input,select{
  padding:11px;
  border:none;
  border-radius:12px;
}
input[disabled]{
  background:#ccc;
}
.full{grid-column:1/-1}

/* BUTTONS */
.buttons{
  grid-column:1/-1;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
  gap:10px;
  margin-top:10px;
}
button{
  padding:12px;
  border:none;
  border-radius:14px;
  font-weight:600;
  color:white;
  cursor:pointer;
}
.update{background:#4CAF50}
.delete{background:#e53935}
.reset{background:#777}
.back{background:#444}

@media(max-width:900px){
  .main{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div class="container">
<h1>Modify Item Master</h1>

<div class="filters">
  <input id="search" placeholder="Search item code or name" oninput="applyFilters()">
  <select id="groupFilter" onchange="applyFilters()">
    <option value="">All Groups</option>
  </select>
</div>

<div class="main">

<!-- ITEM LIST -->
<div class="list">
<table>
<thead>
<tr>
  <th>Code</th>
  <th>Name</th>
  <th>Group</th>
</tr>
</thead>
<tbody id="itemList"></tbody>
</table>
</div>

<!-- FORM -->
<div class="form">

  <div>
    <label>Item Code</label>
    <input id="code" disabled>
  </div>

  <div>
    <label>Item Name</label>
    <input id="name">
  </div>

  <div>
    <label>HSN Code</label>
    <input id="hsn">
  </div>

  <div>
    <label>Group</label>
    <select id="group"></select>
  </div>

  <div>
    <label>MRP</label>
    <input id="mrp">
  </div>

  <div>
    <label>Sale Rate</label>
    <input id="sale">
  </div>

  <div>
    <label>Purchase Rate</label>
    <input id="purchase">
  </div>

  <div>
    <label>GST %</label>
    <input id="gst">
  </div>

  <div class="full">
    <label>Opening Qty</label>
    <input id="qty">
  </div>

  <div class="buttons">
    <button class="update" onclick="updateItem()">Update</button>
    <button class="delete" onclick="deleteItem()">Delete</button>
    <button class="reset" onclick="reloadSelected()">Reset</button>
    <button class="back" onclick="goBack()">Back</button>
  </div>

</div>
</div>
</div>

<script type="module">
/* 1. FIREBASE IMPORTS */
import { db } from './firebase-config.js';
import { 
    collection, 
    getDocs, 
    doc, 
    updateDoc, 
    deleteDoc, 
    query, 
    orderBy 
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

/* ===== LOGIN CHECK ===== */
if(localStorage.getItem("loggedIn") !== "true"){
    window.location.href = "index.html";
}

/* ===== STATE MANAGEMENT ===== */
let items = [];         
let groups = [];        
let selectedDocId = null; 

/* ===== LOAD ALL DATA FROM CLOUD ===== */
async function loadCloudData() {
    try {
        // 1. Load Brand Groups for dropdowns
        const groupSnap = await getDocs(collection(db, "brandGroups"));
        groups = groupSnap.docs.map(d => d.data());
        loadGroupsUI();

        // 2. Load Items for the searchable list
        const itemSnap = await getDocs(query(collection(db, "items"), orderBy("name", "asc")));
        items = itemSnap.docs.map(d => ({
            id: d.id, 
            ...d.data()
        }));
        
        renderList(items);
    } catch (err) {
        console.error("Fetch Error:", err);
    }
}

/* ===== UI: LOAD GROUPS INTO DROPDOWNS ===== */
function loadGroupsUI(){
    const groupSelect = document.getElementById("group"); // The edit form dropdown
    const filterSelect = document.getElementById("groupFilter"); // The search filter dropdown

    if(groupSelect) groupSelect.innerHTML = "";
    if(filterSelect) filterSelect.innerHTML = '<option value="">All Groups</option>';

    groups.forEach(g => {
        if(groupSelect) groupSelect.innerHTML += `<option value="${g.name}">${g.name}</option>`;
        if(filterSelect) filterSelect.innerHTML += `<option value="${g.name}">${g.name}</option>`;
    });
}

/* ===== UI: RENDER SEARCHABLE LIST ===== */
function renderList(list){
    const tbody = document.getElementById("itemList");
    if(!tbody) return;
    tbody.innerHTML = "";
    
    list.forEach(i => {
        // When clicking the row, it calls selectItem with the unique Firebase ID
        tbody.innerHTML += `
            <tr onclick="selectItem('${i.id}')" style="cursor:pointer">
                <td>${i.code}</td>
                <td>${i.name}</td>
                <td>${i.group}</td>
            </tr>`;
    });
}

/* ===== WINDOW BRIDGE (FUNCTIONALITY) ===== */

// 1. FILTERING LOGIC
window.applyFilters = function(){
    const q = document.getElementById("search").value.toLowerCase();
    const g = document.getElementById("groupFilter").value;

    const filtered = items.filter(i => {
        return (
            (i.code.toLowerCase().includes(q) || i.name.toLowerCase().includes(q)) &&
            (!g || i.group === g)
        );
    });
    renderList(filtered);
};

// 2. SELECT ITEM (The "Click to Box" Function)
window.selectItem = function(docId){
    const it = items.find(i => i.id === docId);
    if(!it) return;

    selectedDocId = docId;

    // Mapping Cloud Data to your Input Boxes
    document.getElementById("code").value = it.code || "";
    document.getElementById("name").value = it.name || "";
    document.getElementById("hsn").value = it.hsn || "";
    document.getElementById("group").value = it.group || "";
    document.getElementById("mrp").value = it.mrp || "";
    document.getElementById("sale").value = it.sale || "";
    document.getElementById("purchase").value = it.purchase || "";
    document.getElementById("gst").value = it.gst || "";
    document.getElementById("qty").value = it.qty || "";
    
    // Disable Code editing to maintain database integrity
    document.getElementById("code").disabled = true;
    
    // Scroll to the top or to the form if on mobile
    window.scrollTo({ top: 0, behavior: 'smooth' });
};

// 3. UPDATE DATA
window.updateItem = async function(){
    if(!selectedDocId) return alert("Please select an item from the list first");

    const updatedData = {
        name: document.getElementById("name").value.trim(),
        hsn: document.getElementById("hsn").value.trim(),
        group: document.getElementById("group").value,
        mrp: document.getElementById("mrp").value.trim(),
        sale: document.getElementById("sale").value.trim(),
        purchase: document.getElementById("purchase").value.trim(),
        gst: document.getElementById("gst").value.trim(),
        qty: document.getElementById("qty").value.trim()
    };

    try {
        const docRef = doc(db, "items", selectedDocId);
        await updateDoc(docRef, updatedData);
        alert("Item updated successfully in Cloud! ✅");
        await loadCloudData(); // Refresh list and local array
    } catch (e) {
        alert("Update Failed: " + e.message);
    }
};

// 4. DELETE DATA
window.deleteItem = async function(){
    if(!selectedDocId) return alert("Select an item first");
    if(!confirm("Are you sure you want to delete this item permanently?")) return;

    try {
        await deleteDoc(doc(db, "items", selectedDocId));
        alert("Item deleted from Cloud! 🗑️");
        
        selectedDocId = null;
        // Clear all inputs
        document.querySelectorAll(".form input").forEach(i => i.value = "");
        document.getElementById("code").disabled = false;
        
        await loadCloudData();
    } catch (e) {
        alert("Delete Failed: " + e.message);
    }
};

window.reloadSelected = function(){
    if(selectedDocId) window.selectItem(selectedDocId);
};

window.goBack = function(){
    window.location.href = "master-entry.html";
};

/* ===== INITIALIZE ===== */
loadCloudData();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Delete Sale Record | Shree Datarekha Enterprises</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --primary: #007ea7;
            --danger: #ef4444;
            --bg: #0b0f19;
            --card: #1e293b;
            --text-dim: #94a3b8;
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: white; padding: 15px; }

        .container { max-width: 500px; margin: 0 auto; }
        
        /* Mobile Header */
        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 20px; 
            padding: 10px 0;
        }
        .header h2 { font-size: 1.2rem; display: flex; align-items: center; gap: 8px; }

        /* Search Section */
        .search-card { 
            background: var(--card); 
            padding: 15px; 
            border-radius: 16px; 
            margin-bottom: 20px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .search-group { display: flex; gap: 8px; }
        input { 
            flex: 1; 
            padding: 14px; 
            border-radius: 10px; 
            border: 1px solid #334155; 
            background: #0b0f19; 
            color: white; 
            font-size: 16px; /* Prevents iOS zoom on focus */
            outline: none; 
        }
        input:focus { border-color: var(--primary); }

        /* Preview Card */
        .bill-preview { 
            display: none; 
            background: var(--card); 
            border-radius: 16px; 
            overflow: hidden;
            animation: slideUp 0.3s ease-out;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .preview-header { 
            background: rgba(239, 68, 68, 0.1); 
            padding: 15px; 
            text-align: center;
            border-bottom: 1px solid rgba(239, 68, 68, 0.2);
        }
        
        .info-row { 
            padding: 15px; 
            border-bottom: 1px solid #334155; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .info-row:last-of-type { border-bottom: none; }
        
        .label { color: var(--text-dim); font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; }
        .val { font-size: 16px; font-weight: 600; text-align: right; }

        /* Buttons */
        .btn { 
            padding: 14px 20px; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: 700; 
            font-size: 14px;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }
        .btn-search { background: var(--primary); color: white; min-width: 80px; }
        .btn-back { background: #334155; color: white; padding: 8px 15px; font-size: 12px; }
        
        .delete-container { padding: 15px; background: rgba(0,0,0,0.2); }
        .btn-delete { 
            background: var(--danger); 
            color: white; 
            width: 100%; 
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
        }
        .btn-delete:active { transform: scale(0.98); }

        .btn-confirming { background: #991b1b !important; }

    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>🗑️ Delete Sale</h2>
        <a href="add-sale.html" class="btn btn-back">Back</a>
    </div>

    <div class="search-card">
        <div class="search-group">
            <input type="text" id="deleteKey" placeholder="Bill No (e.g. 1)" inputmode="numeric">
            <button class="btn btn-search" onclick="searchForDeletion()">Find</button>
        </div>
    </div>

    <div id="deletePreview" class="bill-preview">
        <div class="preview-header">
            <span style="color: var(--danger); font-size: 14px; font-weight: bold;">Record Found</span>
        </div>

        <div class="info-row">
            <span class="label">Bill Number</span>
            <span class="val" id="dispBillNo">--</span>
        </div>
        <div class="info-row">
            <span class="label">Date</span>
            <span class="val" id="dispDate">--</span>
        </div>
        <div class="info-row">
            <span class="label">Customer</span>
            <span class="val" id="dispCust">--</span>
        </div>
        <div class="info-row">
            <span class="label">Total Amount</span>
            <span class="val" id="dispTotal" style="color: #10b981;">₹0.00</span>
        </div>

        <div class="delete-container">
            <button id="deleteBtn" class="btn btn-delete" onclick="handleDeleteClick()">
                Delete This Bill
            </button>
        </div>
    </div>
</div>

<script type="module">
import { db } from './firebase-config.js';
import { 
    collection, 
    getDocs, 
    doc, 
    deleteDoc, 
    query, 
    where, 
    limit 
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

let targetDocId = null;
let isConfirming = false;

// Search Logic
window.searchForDeletion = async function() {
    const key = document.getElementById('deleteKey').value.trim();
    if(!key) return;

    // Reset delete button state if searching again
    resetDeleteBtn();

    try {
        const salesRef = collection(db, "sales");
        const q = query(salesRef, where("billNo", "==", key), limit(1));
        const querySnapshot = await getDocs(q);

        if(!querySnapshot.empty) {
            const saleDoc = querySnapshot.docs[0];
            const sale = saleDoc.data();
            targetDocId = saleDoc.id;

            document.getElementById('dispBillNo').innerText = "#" + sale.billNo;
            document.getElementById('dispDate').innerText = sale.date;
            document.getElementById('dispCust').innerText = sale.customerName;
            
            // Handle different net total naming conventions
            const amt = sale.summary?.net || sale.netTotal || "0.00";
            document.getElementById('dispTotal').innerText = "₹" + amt;
            
            document.getElementById('deletePreview').style.display = 'block';
        } else {
            document.getElementById('deletePreview').style.display = 'none';
            alert("Bill #" + key + " not found.");
        }
    } catch (err) {
        alert("Error: " + err.message);
    }
};

// Mobile Friendly Double-Click Deletion
window.handleDeleteClick = async function() {
    const btn = document.getElementById('deleteBtn');

    if (!isConfirming) {
        // First click
        isConfirming = true;
        btn.innerText = "Are you sure? Tap again";
        btn.classList.add('btn-confirming');
        
        // Auto-reset after 3 seconds if not clicked again
        setTimeout(resetDeleteBtn, 3000);
    } else {
        // Second click (Confirmed)
        executeDeletion();
    }
};

function resetDeleteBtn() {
    const btn = document.getElementById('deleteBtn');
    isConfirming = false;
    if(btn) {
        btn.innerText = "Delete This Bill";
        btn.classList.remove('btn-confirming');
    }
}

async function executeDeletion() {
    if(!targetDocId) return;

    try {
        const btn = document.getElementById('deleteBtn');
        btn.innerText = "Deleting...";
        btn.disabled = true;

        await deleteDoc(doc(db, "sales", targetDocId));
        
        alert("Bill deleted successfully.");
        location.reload();
    } catch (err) {
        alert("Delete failed: " + err.message);
        resetDeleteBtn();
    }
}
</script>
</body>
</html>

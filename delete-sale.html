<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Sales | Shree Datarekha Enterprises</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --primary: #007ea7;
            --danger: #ef4444;
            --bg: #0b0f19;
            --card: #1e293b;
            --text-dim: #94a3b8;
            --success: #10b981;
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: white; padding: 15px; }

        .container { max-width: 600px; margin: 0 auto; }
        
        /* Mobile Header */
        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 20px; 
            padding: 10px 0;
            position: sticky;
            top: 0;
            background: var(--bg);
            z-index: 10;
        }
        .header h2 { font-size: 1.4rem; color: var(--primary); }

        /* Stats Row */
        .stats-bar {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: var(--card);
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #334155;
        }
        .stat-card span { display: block; font-size: 11px; color: var(--text-dim); text-transform: uppercase; }
        .stat-card strong { font-size: 16px; color: var(--success); }

        /* Search/Filter Bar */
        .filter-box {
            margin-bottom: 20px;
        }
        #searchInput {
            width: 100%;
            padding: 12px 15px;
            border-radius: 10px;
            border: 1px solid #334155;
            background: var(--card);
            color: white;
            outline: none;
        }

        /* Sales List */
        .sales-list { display: flex; flex-direction: column; gap: 12px; }
        
        .sale-card { 
            background: var(--card); 
            border-radius: 16px; 
            padding: 15px;
            border: 1px solid #334155;
            transition: 0.2s;
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .bill-badge { background: var(--primary); color: white; padding: 2px 8px; border-radius: 6px; font-size: 12px; font-weight: bold; }
        .date-text { color: var(--text-dim); font-size: 12px; }
        
        .cust-name { font-size: 17px; font-weight: 600; margin-bottom: 4px; display: block; }
        .amount-text { color: var(--success); font-weight: bold; font-size: 18px; }

        .card-actions { 
            margin-top: 15px; 
            padding-top: 12px; 
            border-top: 1px solid #334155;
            display: flex;
            gap: 10px;
        }

        /* Buttons */
        .btn { 
            flex: 1;
            padding: 10px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: 600; 
            font-size: 13px;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }
        .btn-del { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid var(--danger); }
        .btn-confirm { background: var(--danger) !important; color: white !important; }
        .btn-back { background: #334155; color: white; padding: 8px 15px; font-size: 12px; }

        /* Loader */
        #loader { text-align: center; padding: 20px; color: var(--text-dim); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>📊 Sales List</h2>
        <a href="add-sale.html" class="btn btn-back">Back</a>
    </div>

    <div class="stats-bar">
        <div class="stat-card">
            <span>Total Bills</span>
            <strong id="statCount">0</strong>
        </div>
        <div class="stat-card">
            <span>Today's Sale</span>
            <strong id="statTotal">₹0.00</strong>
        </div>
    </div>

    <div class="filter-box">
        <input type="text" id="searchInput" placeholder="Search by name or bill no..." oninput="filterSales()">
    </div>

    <div id="loader">Loading sales records...</div>
    <div id="salesList" class="sales-list"></div>
</div>

<script type="module">
import { db } from './firebase-config.js';
import { 
    collection, 
    getDocs, 
    doc, 
    deleteDoc, 
    query, 
    orderBy 
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

let allSales = [];

// Fetch Sales from Firestore
async function fetchSales() {
    try {
        const salesRef = collection(db, "sales");
        const q = query(salesRef, orderBy("createdAt", "desc"));
        const querySnapshot = await getDocs(q);
        
        allSales = querySnapshot.docs.map(doc => ({
            id: doc.id,
            ...doc.data(),
            confirming: false
        }));

        document.getElementById('loader').style.display = 'none';
        renderSales(allSales);
        updateStats();
    } catch (err) {
        document.getElementById('loader').innerText = "Error loading sales: " + err.message;
    }
}

// Render the List
function renderSales(data) {
    const listDiv = document.getElementById('salesList');
    listDiv.innerHTML = '';

    data.forEach(sale => {
        const amt = sale.summary?.net || sale.netTotal || "0.00";
        const card = document.createElement('div');
        card.className = 'sale-card';
        card.innerHTML = `
            <div class="card-top">
                <span class="bill-badge">#${sale.billNo}</span>
                <span class="date-text">${sale.date}</span>
            </div>
            <span class="cust-name">${sale.customerName}</span>
            <div class="amount-text">₹${amt}</div>
            
            <div class="card-actions">
                <button class="btn btn-del" id="btn-${sale.id}" onclick="confirmDelete('${sale.id}')">
                    Delete Bill
                </button>
            </div>
        `;
        listDiv.appendChild(card);
    });
}

// Stats Update
function updateStats() {
    document.getElementById('statCount').innerText = allSales.length;
    const total = allSales.reduce((acc, sale) => {
        const amt = parseFloat(sale.summary?.net || sale.netTotal || 0);
        return acc + amt;
    }, 0);
    document.getElementById('statTotal').innerText = "₹" + total.toFixed(2);
}

// Search Filter
window.filterSales = function() {
    const term = document.getElementById('searchInput').value.toLowerCase();
    const filtered = allSales.filter(s => 
        s.customerName.toLowerCase().includes(term) || 
        s.billNo.toString().includes(term)
    );
    renderSales(filtered);
};

// Double-Tap Delete Logic
window.confirmDelete = async function(id) {
    const btn = document.getElementById(`btn-${id}`);
    const sale = allSales.find(s => s.id === id);

    if (!sale.confirming) {
        // First click
        sale.confirming = true;
        btn.innerText = "Tap to Confirm";
        btn.classList.add('btn-confirm');
        
        // Reset after 3 seconds
        setTimeout(() => {
            sale.confirming = false;
            btn.innerText = "Delete Bill";
            btn.classList.remove('btn-confirm');
        }, 3000);
    } else {
        // Second click
        try {
            btn.innerText = "Deleting...";
            btn.disabled = true;
            await deleteDoc(doc(db, "sales", id));
            allSales = allSales.filter(s => s.id !== id);
            renderSales(allSales);
            updateStats();
        } catch (err) {
            alert("Error: " + err.message);
            sale.confirming = false;
            btn.innerText = "Delete Bill";
            btn.classList.remove('btn-confirm');
            btn.disabled = false;
        }
    }
};

// Initial Load
fetchSales();
</script>
</body>
</html>

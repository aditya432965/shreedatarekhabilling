<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consolidated Purchase Return | Shree Datarekha Enterprises</title>
    <style>
        :root { --brand-pink: #ff2f92; --glass: rgba(255, 255, 255, 0.05); --success: #00ff88; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #2b000f, #5c0a2e, #8e1446); color: #fff; padding: 20px; min-height: 100vh; }
        
        .container { max-width: 1200px; margin: auto; background: rgba(0, 0, 0, 0.85); border-radius: 15px; padding: 25px; border: 1px solid rgba(255, 47, 146, 0.3); }
        .header-box { border-bottom: 2px solid var(--brand-pink); padding-bottom: 15px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }
        .title { font-size: 24px; font-weight: 800; color: #ffb3d9; text-transform: uppercase; }

        .section-label { font-size: 14px; color: var(--brand-pink); margin-bottom: 15px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; background: rgba(255,255,255,0.03); padding: 20px; border-radius: 10px; }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 12px; color: #ffb3d9; font-weight: 600; }
        
        select, input {
            background: var(--glass); border: 1px solid rgba(255,255,255,0.2);
            padding: 10px; border-radius: 8px; color: white; outline: none; transition: 0.3s;
        }
        select:focus, input:focus { border-color: var(--brand-pink); background: rgba(255,255,255,0.1); }
        select option { background: #5c0a2e; }
        input:read-only { background: rgba(255,255,255,0.02); color: #aaa; cursor: not-allowed; }

        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-add { background: transparent; border: 2px solid var(--success); color: var(--success); width: 100%; margin-top: 10px; }
        .btn-add:hover { background: var(--success); color: #000; }
        .btn-save { background: var(--brand-pink); color: white; width: 100%; font-size: 16px; margin-top: 20px; box-shadow: 0 4px 15px rgba(255, 47, 146, 0.4); }
        .btn-back { background: #4a5568; color: white; text-decoration: none; font-size: 14px; }
        .btn:hover:not(:disabled) { transform: translateY(-2px); opacity: 0.9; }

        /* Basket Table */
        .basket-container { margin-top: 30px; border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; background: rgba(0,0,0,0.2); }
        th { background: rgba(255, 47, 146, 0.2); padding: 12px; font-size: 12px; text-align: left; color: #ffb3d9; }
        td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }
        .remove-btn { color: #ff4d4d; cursor: pointer; font-weight: bold; }

        .summary-bar { display: flex; justify-content: flex-end; padding: 15px; background: rgba(255,255,255,0.05); gap: 20px; align-items: center; }
        .total-text { font-size: 18px; font-weight: bold; color: var(--success); }

        .log-section { margin-top: 50px; }
        .btn-reprint { background: #4a5568; color: white; padding: 5px 12px; border-radius: 5px; font-size: 12px; border: none; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-box">
        <div class="title">Next-Gen Purchase Return</div>
        <a href="index.html" class="btn btn-back">Dashboard</a>
    </div>

    <div class="input-group" style="margin-bottom: 20px;">
        <label>1. Search Supplier</label>
        <select id="supplierSelect" onchange="initSupplierSession()" style="font-size: 16px; border-color: var(--brand-pink);">
            <option value="">-- Start by Choosing a Supplier --</option>
        </select>
    </div>

    <div id="selectionArea" style="opacity: 0.5; pointer-events: none;">
        <div class="section-label">2. Add Items to Return Basket</div>
        <div class="form-grid">
            <div class="input-group">
                <label>Original Bill No.</label>
                <select id="billSelect" onchange="loadBillProducts()">
                    <option value="MANUAL">-- Manual / Old Stock --</option>
                </select>
            </div>
            <div class="input-group">
                <label>Product</label>
                <select id="productSelect" onchange="loadProductDetails()">
                    <option value="">-- Select Product --</option>
                </select>
            </div>
            <div class="input-group">
                <label>Pur. Rate</label>
                <input type="number" id="purRate" placeholder="0.00">
            </div>
            <div class="input-group">
                <label>Qty to Return</label>
                <input type="number" id="returnQty" placeholder="Qty" oninput="updateRowTotal()">
            </div>
            <div class="input-group">
                <label>Reason</label>
                <select id="returnReason">
                    <option value="Expired">Expired</option>
                    <option value="Damaged">Damaged</option>
                    <option value="Wrong Item">Wrong Item</option>
                    <option value="Surplus">Surplus Stock</option>
                </select>
            </div>
            <div class="input-group">
                <label>Subtotal</label>
                <input type="text" id="rowTotal" readonly value="₹0.00">
            </div>
        </div>
        <button class="btn btn-add" onclick="addToBasket()">+ Add to Return List</button>
    </div>

    <div class="basket-container">
        <table>
            <thead>
                <tr>
                    <th>Product Name</th>
                    <th>Ref Bill</th>
                    <th>Reason</th>
                    <th>Qty</th>
                    <th>Rate</th>
                    <th>Total</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="basketBody">
                </tbody>
        </table>
        <div class="summary-bar">
            <span>Grand Total Refund:</span>
            <span class="total-text" id="grandTotal">₹0.00</span>
        </div>
    </div>

    <button class="btn btn-save" id="finalSubmitBtn" onclick="submitConsolidatedReturn()" disabled>
        🚀 Finalize Return & Update Inventory
    </button>

    <div class="log-section">
        <div class="section-label">Recent Consolidated Returns</div>
        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Return ID</th>
                    <th>Supplier</th>
                    <th>Items</th>
                    <th>Total</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="returnLogs"></tbody>
        </table>
    </div>
</div>

<script type="module">
    import { db } from './firebase-config.js';
    import { 
        collection, getDocs, query, where, addDoc, 
        updateDoc, doc, serverTimestamp, orderBy, limit, writeBatch 
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    let allPurchases = [];
    let basket = [];
    let currentSupplier = "";

    // Load Suppliers on Init
    async function init() {
        const snap = await getDocs(collection(db, "purchases"));
        allPurchases = snap.docs.map(d => ({ id: d.id, ...d.data() }));

        const supplierSelect = document.getElementById("supplierSelect");
        const uniqueSuppliers = [...new Set(allPurchases.map(p => p.header.supplier))];
        uniqueSuppliers.forEach(supp => {
            const opt = document.createElement("option");
            opt.value = opt.text = supp;
            supplierSelect.add(opt);
        });
        loadReturnHistory();
    }

    // Lock supplier and enable adding items
    window.initSupplierSession = function() {
        currentSupplier = document.getElementById("supplierSelect").value;
        if(!currentSupplier) return;

        document.getElementById("selectionArea").style.opacity = "1";
        document.getElementById("selectionArea").style.pointerEvents = "all";
        
        // Load Bills for this supplier
        const billSelect = document.getElementById("billSelect");
        billSelect.innerHTML = '<option value="MANUAL">-- Manual / Old Stock --</option>';
        allPurchases.filter(p => p.header.supplier === currentSupplier).forEach(p => {
            const opt = document.createElement("option");
            opt.value = p.id;
            opt.text = `Bill: ${p.header.billNo}`;
            billSelect.add(opt);
        });

        // Load all products into search (for manual returns)
        loadAllProducts();
    }

    async function loadAllProducts() {
        const snap = await getDocs(collection(db, "items"));
        const productSelect = document.getElementById("productSelect");
        productSelect.innerHTML = '<option value="">-- Select Product --</option>';
        snap.forEach(d => {
            const opt = document.createElement("option");
            opt.value = d.id;
            opt.text = d.data().name;
            productSelect.add(opt);
        });
    }

    window.loadBillProducts = function() {
        const purchaseId = document.getElementById("billSelect").value;
        if(purchaseId === "MANUAL") {
            loadAllProducts();
            return;
        }
        const purchase = allPurchases.find(p => p.id === purchaseId);
        const productSelect = document.getElementById("productSelect");
        productSelect.innerHTML = '<option value="">-- Select Bill Product --</option>';
        purchase.items.forEach((item, index) => {
            const opt = document.createElement("option");
            opt.value = `INDEX_${index}`;
            opt.text = item.name;
            productSelect.add(opt);
        });
    }

    window.loadProductDetails = function() {
        const billId = document.getElementById("billSelect").value;
        const prodVal = document.getElementById("productSelect").value;

        if(billId !== "MANUAL" && prodVal.startsWith("INDEX_")) {
            const idx = prodVal.split("_")[1];
            const purchase = allPurchases.find(p => p.id === billId);
            const item = purchase.items[idx];
            document.getElementById("purRate").value = item.rate || (item.net / item.qty).toFixed(2);
        }
    }

    window.updateRowTotal = function() {
        const q = parseFloat(document.getElementById("returnQty").value) || 0;
        const r = parseFloat(document.getElementById("purRate").value) || 0;
        document.getElementById("rowTotal").value = "₹" + (q * r).toFixed(2);
    }

    window.addToBasket = function() {
        const prodSelect = document.getElementById("productSelect");
        const qty = parseFloat(document.getElementById("returnQty").value);
        const rate = parseFloat(document.getElementById("purRate").value);
        
        if(!prodSelect.value || !qty || qty <= 0) return alert("Fill all item details correctly.");

        basket.push({
            productId: prodSelect.value,
            name: prodSelect.options[prodSelect.selectedIndex].text,
            billNo: document.getElementById("billSelect").options[document.getElementById("billSelect").selectedIndex].text,
            reason: document.getElementById("returnReason").value,
            qty: qty,
            rate: rate,
            total: qty * rate
        });

        renderBasket();
        // Reset row
        document.getElementById("returnQty").value = "";
        document.getElementById("rowTotal").value = "₹0.00";
    }

    function renderBasket() {
        const tbody = document.getElementById("basketBody");
        tbody.innerHTML = "";
        let grandTotal = 0;

        basket.forEach((item, index) => {
            grandTotal += item.total;
            tbody.innerHTML += `
                <tr>
                    <td>${item.name}</td>
                    <td>${item.billNo}</td>
                    <td>${item.reason}</td>
                    <td>${item.qty}</td>
                    <td>₹${item.rate}</td>
                    <td>₹${item.total.toFixed(2)}</td>
                    <td class="remove-btn" onclick="removeFromBasket(${index})">✕</td>
                </tr>
            `;
        });

        document.getElementById("grandTotal").innerText = "₹" + grandTotal.toFixed(2);
        document.getElementById("finalSubmitBtn").disabled = basket.length === 0;
    }

    window.removeFromBasket = function(index) {
        basket.splice(index, 1);
        renderBasket();
    }

    window.submitConsolidatedReturn = async function() {
        const btn = document.getElementById("finalSubmitBtn");
        btn.disabled = true;
        btn.innerText = "Updating Records...";

        try {
            const batch = writeBatch(db);
            const returnId = "PR-" + Date.now().toString().slice(-6);

            // 1. Create the Consolidated Return Entry
            const returnRef = doc(collection(db, "purchase_returns"));
            const returnData = {
                returnId: returnId,
                supplier: currentSupplier,
                items: basket,
                totalRefund: basket.reduce((sum, i) => sum + i.total, 0),
                date: serverTimestamp()
            };
            batch.set(returnRef, returnData);

            // 2. Logic to update individual Master Stocks
            for (const item of basket) {
                // If it's INDEX based or ID based, we find the doc in 'items'
                const itemQuery = query(collection(db, "items"), where("name", "==", item.name));
                const itemSnap = await getDocs(itemQuery);
                if(!itemSnap.empty) {
                    const itemDoc = itemSnap.docs[0];
                    const currentStock = itemDoc.data().stock || 0;
                    batch.update(doc(db, "items", itemDoc.id), {
                        stock: currentStock - item.qty
                    });
                }
            }

            await batch.commit();
            alert("Success! Stock Updated & Return Saved.");
            
            // Handle Printing
            localStorage.setItem("lastReturn", JSON.stringify({
                ...returnData,
                date: new Date().toLocaleDateString()
            }));
            window.location.href = "purchase-print.html";

        } catch (e) {
            alert("Logic Error: " + e.message);
            btn.disabled = false;
        }
    }

    async function loadReturnHistory() {
        const q = query(collection(db, "purchase_returns"), orderBy("date", "desc"), limit(10));
        const snap = await getDocs(q);
        const tbody = document.getElementById("returnLogs");
        tbody.innerHTML = "";

        snap.forEach(d => {
            const data = d.data();
            const date = data.date ? data.date.toDate().toLocaleDateString() : 'Today';
            tbody.innerHTML += `
                <tr>
                    <td>${date}</td>
                    <td style="color:var(--brand-pink)">${data.returnId}</td>
                    <td>${data.supplier}</td>
                    <td>${data.items.length} Items</td>
                    <td style="color:var(--success)">₹${data.totalRefund.toFixed(2)}</td>
                    <td><button class="btn-reprint" onclick="reprint('${d.id}')">🖨️ View</button></td>
                </tr>
            `;
        });
    }

    init();
</script>
</body>
</html>

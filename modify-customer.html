<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Modify Customer Master</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Segoe UI, Arial;
}

body{
  min-height:100vh;
  background:linear-gradient(135deg,#2b000f,#5c0a2e,#8e1446);
  display:flex;
  justify-content:center;
  padding:15px; 
  color:white;
}

.container{
  width:100%;
  max-width:1000px;
  background:rgba(0,0,0,.65);
  border-radius:22px;
  padding:20px; 
}

h1{
  text-align:center;
  margin-bottom:15px;
  font-size: 1.5rem; 
}

/* SEARCH */
.search-box{
  display:flex;
  justify-content:center;
  margin-bottom:20px;
}
.search-box input{
  width:100%;
  max-width:400px;
  padding:12px;
  border-radius:14px;
  border:none;
  outline:none;
}

/* MAIN */
.main{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

/* LIST */
.list{
  border:1px solid #ff9fc555;
  border-radius:16px;
  overflow:auto;
  max-height:350px; 
}
table{
  width:100%;
  border-collapse:collapse;
}
th,td{
  padding:10px;
  border-bottom:1px solid #ff9fc533;
  font-size:13px;
  text-align: left;
}
th{background:#ff2f92; position: sticky; top: 0;}
tr:hover{background:rgba(255,255,255,.08);cursor:pointer}

/* FORM */
.form{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
label{
  font-size:13px;
  color:#ffb3d9;
}
input{
  padding:11px;
  border:none;
  border-radius:12px;
  width: 100%; 
}
.full{grid-column:1/-1}

/* BUTTONS */
.buttons{
  grid-column:1/-1;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(100px,1fr)); 
  gap:8px;
  margin-top:10px;
}
button{
  padding:12px 8px;
  border:none;
  border-radius:14px;
  font-weight:600;
  color:white;
  cursor:pointer;
  font-size: 13px;
}
.update{background:#4CAF50}
.delete{background:#d32f2f} 
.reset{background:#777}
.back{background:#444}

@media(max-width:850px){
  .main{grid-template-columns:1fr}
  .form{grid-template-columns: 1fr} 
  .container { padding: 15px; }
}
</style>
</head>

<body>

<div class="container">

<h1>Modify Customer Master</h1>

<div class="search-box">
  <input id="search" placeholder="Search by name or contact..." oninput="filterCustomers()">
</div>

<div class="main">

<div class="list">
<table>
<thead>
<tr>
  <th>Name</th>
  <th>Contact</th>
</tr>
</thead>
<tbody id="customerList"></tbody>
</table>
</div>

<div class="form">
  <div class="full">
    <label>Customer Name</label>
    <input id="custName" placeholder="Enter name">
  </div>
  <div class="full">
    <label>Address 1</label>
    <input id="addr1">
  </div>
  <div class="full">
    <label>Address 2</label>
    <input id="addr2">
  </div>
  <div>
    <label>Contact</label>
    <input id="contact">
  </div>
  <div>
    <label>GST No</label>
    <input id="gst">
  </div>
  <div class="full">
    <label>Food Licence No</label>
    <input id="fssai">
  </div>

  <div class="buttons">
    <button class="update" onclick="updateCustomer()">Update</button>
    <button class="delete" onclick="deleteCustomer()">Delete</button>
    <button class="reset" onclick="reloadSelected()">Reset</button>
    <button class="back" onclick="goBack()">Back</button>
  </div>
</div>

</div>
</div>

<script type="module">
import { db } from './firebase-config.js';
import { 
    collection, 
    getDocs, 
    doc, 
    updateDoc, 
    deleteDoc,
    query, 
    orderBy 
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

if(localStorage.getItem("loggedIn") !== "true"){
    window.location.href = "index.html";
}

const COLL_NAME = "customers";
let customers = [];        
let selectedDocId = null;  

async function loadCustomers() {
    try {
        const q = query(collection(db, COLL_NAME), orderBy("name", "asc"));
        const querySnapshot = await getDocs(q);
        
        customers = querySnapshot.docs.map(d => ({
            id: d.id, 
            ...d.data()
        }));
        
        renderList(customers);
    } catch (err) {
        console.error("Load failed:", err);
    }
}

function renderList(list){
    const tbody = document.getElementById("customerList");
    tbody.innerHTML = "";
    
    list.forEach(c => {
        tbody.innerHTML += `
            <tr onclick="selectCustomer('${c.id}')">
                <td>${c.name}</td>
                <td>${c.contact}</td>
            </tr>`;
    });
}

window.filterCustomers = function(){
    const q = document.getElementById("search").value.toLowerCase();
    const filtered = customers.filter(c =>
        c.name.toLowerCase().includes(q) ||
        (c.contact && c.contact.includes(q))
    );
    renderList(filtered);
};

window.selectCustomer = function(id){
    const c = customers.find(x => x.id === id);
    if(!c) return;

    selectedDocId = id;
    
    document.getElementById("custName").value = c.name;
    document.getElementById("addr1").value = c.address1 || "";
    document.getElementById("addr2").value = c.address2 || "";
    document.getElementById("contact").value = c.contact;
    document.getElementById("gst").value = c.gst || "";
    document.getElementById("fssai").value = c.fssai || "";
};

window.updateCustomer = async function(){
    if(!selectedDocId){
        alert("Please select a customer from the list first");
        return;
    }

    const updatedData = {
        name: document.getElementById("custName").value.trim(),
        address1: document.getElementById("addr1").value.trim(),
        address2: document.getElementById("addr2").value.trim(),
        contact: document.getElementById("contact").value.trim(),
        gst: document.getElementById("gst").value.trim(),
        fssai: document.getElementById("fssai").value.trim()
    };

    try {
        const docRef = doc(db, COLL_NAME, selectedDocId);
        await updateDoc(docRef, updatedData);
        alert("Customer details updated successfully ✅");
        await loadCustomers();
    } catch (e) {
        alert("Update Failed: " + e.message);
    }
};

window.deleteCustomer = async function(){
    if(!selectedDocId){
        alert("Please select a customer to delete");
        return;
    }

    const confirmDel = confirm("Are you sure you want to permanently delete this customer?");
    if(!confirmDel) return;

    try {
        await deleteDoc(doc(db, COLL_NAME, selectedDocId));
        alert("Customer deleted successfully 🗑️");
        
        selectedDocId = null;
        document.querySelectorAll('.form input').forEach(input => input.value = "");
        
        await loadCustomers();
    } catch (e) {
        alert("Delete Failed: " + e.message);
    }
};

window.reloadSelected = function(){
    if(selectedDocId) window.selectCustomer(selectedDocId);
};

window.goBack = function(){
    window.location.href = "master-entry.html";
};

loadCustomers();
</script>

</body>
</html>
